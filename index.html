<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Hub v3.1 | Longitudinal System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --gamil-blue: #002D5A; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .bg-gamil { background-color: var(--gamil-blue); }
        .input-gamil { @apply w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-2 focus:ring-blue-500; }
        .label-gamil { @apply block text-[9px] font-black uppercase text-slate-400 mb-1 tracking-widest; }
        
        /* Row Longitudinal */
        .pedido-row { 
            @apply bg-white border border-slate-200 rounded-xl mb-3 flex items-center p-4 shadow-sm hover:shadow-md transition-all relative overflow-hidden;
            border-left: 8px solid #cbd5e1;
        }
        .prio-alta { border-left-color: #ef4444 !important; }
        .prio-media { border-left-color: #f59e0b !important; }
        .prio-baixa { border-left-color: #10b981 !important; }

        .main-content { overflow-y: auto; flex: 1; padding: 20px; }
        .admin-view, .auth-element { display: none; }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-2" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-widest uppercase text-blue-200">Industrial Intelligence</h1>
        </div>
        <nav class="p-4 flex-1 space-y-4">
            <div class="p-4 bg-white/5 rounded-2xl border border-white/10 text-center">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-blue-300">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2">Sair</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-3 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg hover:bg-blue-700">
                <i class="fas fa-plus"></i> <span>Novo Registo</span>
            </button>
            <button onclick="abrirModalCliente()" class="auth-element w-full p-3 hover:bg-white/5 rounded-xl flex items-center space-x-3 text-slate-400 text-xs font-bold transition">
                <i class="fas fa-users"></i> <span>Base de Clientes</span>
            </button>
        </nav>
        <div class="p-4 opacity-10 text-[7px] text-center uppercase tracking-widest italic">v3.1 ● Hamilton Junior</div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b px-8 flex justify-between items-center shadow-sm sticky top-0 z-20">
            <h2 class="text-sm font-black text-slate-800 uppercase italic tracking-tighter">Planeamento Longitudinal Geral</h2>
            <div id="status-cloud" class="text-[10px] font-black text-blue-500 uppercase italic">Sincronizado</div>
        </header>

        <div id="container-pedidos" class="main-content">
            </div>
    </main>

    <div id="modal-login" class="fixed inset-0 bg-gamil z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 uppercase italic mb-8 italic">Acesso Restrito Gamil</h3>
            <select id="login-user" class="input-gamil mb-4 h-12 text-center font-bold">
                <option value="Visitante">Apenas Consulta</option>
                <option value="Sofia">Sofia (Entrada)</option>
                <option value="Eduardo Pereira">Eduardo Pereira (Admin)</option>
                <option value="José Pedro">José Pedro (Direção)</option>
                <option value="José Castro">José Castro (Chefe)</option>
                <option value="Luís Silva">Luís Silva (Chefe)</option>
                <option value="Paulo Abreu">Paulo Abreu (Chefe)</option>
            </select>
            <input type="password" id="login-pass" placeholder="PASSWORD" class="input-gamil mb-6 h-12 text-center">
            <button onclick="tentarLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-xl hover:bg-blue-700 transition-all">Entrar</button>
        </div>
    </div>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-6 bg-slate-50 border-b flex justify-between items-center"><h3 class="font-black uppercase text-sm italic">Base de Clientes</h3><button onclick="fecharModal()" class="text-2xl">&times;</button></div>
            <div class="p-6 border-b admin-view sofia-only"><form id="form-cliente" class="space-y-3"><input id="c-cod" required type="text" class="input-gamil" placeholder="CÓDIGO"><input id="c-nome" required type="text" class="input-gamil" placeholder="NOME EMPRESA"><button type="submit" class="w-full bg-gamil text-white py-3 rounded-lg font-black uppercase text-xs">Guardar</button></form></div>
            <div id="lista-clientes-db" class="flex-1 overflow-y-auto p-6 space-y-2 bg-slate-50/50 italic"></div>
        </div>
    </div>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="p-6 bg-gamil text-white flex justify-between items-center"><h3 id="modal-titulo" class="font-black uppercase italic text-xs tracking-widest">Gestão de Registo</h3><button onclick="fecharModal()" class="text-2xl">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Cliente</label><select id="p-cliente" required class="input-gamil"></select></div>
                <div><label class="label-gamil">Nº Pedido</label><input id="p-pedido" required type="text" class="input-gamil"></div>
                <div><label class="label-gamil">Peso (Kg)</label><input id="p-peso" required type="number" step="0.01" class="input-gamil"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" type="date" class="input-gamil"></div>
                <div><label class="label-gamil">Prioridade</label><select id="p-prio" class="input-gamil"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                
                <div class="admin-view col-span-2 grid grid-cols-2 gap-4 border-t pt-4">
                    <div><label class="label-gamil">Montagem</label><input id="p-montagem" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil">Entrega</label><input id="p-saida" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil">Localização</label><input id="p-local" type="text" class="input-gamil"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                        <div><label class="label-gamil">Furos?</label><select id="p-furos" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                    </div>
                </div>
                <div class="col-span-2"><label class="label-gamil">Observações</label><textarea id="p-obs" class="input-gamil h-16"></textarea></div>
                <button type="submit" class="col-span-2 bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg mt-2">Salvar no Planeamento</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                localStorage.setItem('gamil_sofia', (user === "Sofia" || user === "José Pedro"));
                checkPermissions();
            } else alert("Acesso negado.");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isSofia = localStorage.getItem('gamil_sofia') === 'true';
            document.querySelectorAll('.admin-view').forEach(el => el.style.display = isAdmin ? 'grid' : 'none');
            document.querySelectorAll('.auth-element').forEach(el => el.style.display = (isAdmin || isSofia) ? 'block' : 'none');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };

        onSnapshot(colClientes, (snap) => {
            const select = document.getElementById('p-cliente');
            const listaDB = document.getElementById('lista-clientes-db');
            select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>';
            listaDB.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                select.innerHTML += `<option value="${c.codigo} | ${c.nome}">${c.codigo} - ${c.nome}</option>`;
                listaDB.innerHTML += `<div class="p-2 bg-white rounded border text-[10px] font-bold italic">${c.codigo} - ${c.nome}</div>`;
            });
        });

        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(colClientes, { codigo: document.getElementById('c-cod').value, nome: document.getElementById('c-nome').value.toUpperCase() });
            e.target.reset();
        };

        document.getElementById('form-pedido').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                cliente: document.getElementById('p-cliente').value,
                pedido: document.getElementById('p-pedido').value,
                peso: document.getElementById('p-peso').value,
                entrada: document.getElementById('p-entrada').value,
                prio: document.getElementById('p-prio').value,
                pesar: document.getElementById('p-pesar').value,
                furos: document.getElementById('p-furos').value,
                montagem: document.getElementById('p-montagem').value,
                saida: document.getElementById('p-saida').value,
                local: document.getElementById('p-local').value.toUpperCase(),
                obs: document.getElementById('p-obs').value.toUpperCase()
            };
            if (id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data);
            else await addDoc(colPedidos, { ...data, progresso: 0, timestamp: new Date() });
            fecharModal();
        };

        onSnapshot(query(colPedidos, orderBy("timestamp", "desc")), (snap) => {
            const container = document.getElementById('container-pedidos');
            container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isSofia = localStorage.getItem('gamil_sofia') === 'true';

            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const row = document.createElement('div');
                row.className = `pedido-row prio-${p.prio} grid grid-cols-12 gap-4 items-center`;
                
                row.innerHTML = `
                    <div class="col-span-3 border-r pr-4">
                        <div class="flex items-center space-x-2"><span class="bg-blue-100 text-blue-800 text-[10px] font-black px-2 rounded uppercase italic">Ref: ${p.pedido}</span><span class="text-[9px] text-slate-400 font-bold">${p.entrada}</span></div>
                        <h4 class="text-xs font-black text-slate-800 uppercase truncate mt-1">${p.cliente}</h4>
                    </div>
                    <div class="col-span-2 flex justify-around text-center border-r pr-4">
                        <div><p class="text-[8px] font-black text-slate-400 uppercase">Peso</p><p class="text-xs font-black italic">${p.peso}kg</p></div>
                        <div><p class="text-[8px] font-black text-slate-400 uppercase">Pesar</p><p class="text-[10px] font-black ${p.pesar === 'SIM' ? 'text-orange-600' : 'text-slate-300'}">${p.pesar}</p></div>
                        <div><p class="text-[8px] font-black text-slate-400 uppercase">Furos</p><p class="text-[10px] font-black ${p.furos === 'SIM' ? 'text-orange-600' : 'text-slate-300'}">${p.furos}</p></div>
                    </div>
                    
                    ${isAdmin ? `
                    <div class="col-span-4 flex justify-around border-r pr-4">
                        <div class="text-center"><p class="text-[8px] font-black text-blue-400 uppercase italic">Montagem</p><p class="text-[10px] font-black text-blue-700">${p.montagem || '--'}</p></div>
                        <div class="text-center"><p class="text-[8px] font-black text-orange-400 uppercase italic">Entrega</p><p class="text-[10px] font-black text-orange-600">${p.saida || '--'}</p></div>
                        <div class="bg-green-500 text-white px-3 py-1 rounded-lg text-center"><p class="text-[7px] font-black uppercase tracking-tighter opacity-70">Local</p><p class="text-[10px] font-black uppercase">${p.local || '...'}</p></div>
                    </div>
                    <div class="col-span-2 border-r pr-4">
                        <p class="text-[8px] font-black text-slate-400 uppercase">Observações</p>
                        <p class="text-[9px] font-bold text-slate-600 truncate italic uppercase">${p.obs || 'Nenhuma nota'}</p>
                    </div>
                    ` : '<div class="col-span-7 italic text-[10px] text-slate-300">Aguardando Planeamento...</div>'}

                    <div class="col-span-1 flex justify-end space-x-2 no-print">
                        <button onclick="preparaEdicao('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="${(isAdmin || isSofia) ? 'block' : 'hidden'} text-blue-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                        <button onclick="apagar('${id}')" class="${isAdmin ? 'block' : 'hidden'} text-red-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
            checkPermissions();
        });

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id;
            document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido;
            document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-entrada').value = p.entrada;
            document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos;
            document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida;
            document.getElementById('p-local').value = p.local;
            document.getElementById('p-obs').value = p.obs;
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.apagar = async (id) => { if(confirm("Eliminar permanentemente?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');

        checkPermissions();
    </script>
</body>
</html>
