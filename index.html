<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Hub v7.4 | Uniformidade Visual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="clientes_base.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --gamil-blue: #1a2a3a; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-content { overflow-x: auto; overflow-y: auto; flex: 1; padding: 25px 40px; }
        
        /* TABELA PREMIUM UNIFORME */
        .gamil-table { min-width: 1550px; border-separate: border-spacing-y(12px); width: 100%; border-collapse: separate; table-layout: fixed; }
        .gamil-thead th { @apply text-[10px] font-black uppercase text-slate-400 tracking-widest px-2 py-2 text-left; }
        
        .pedido-row { @apply bg-white shadow-sm hover:shadow-md transition-all duration-300; }
        
        /* TEXTO PADRONIZADO EM 11PX PARA TODA A LINHA */
        .pedido-row td { @apply py-5 px-4 text-[11px] font-bold text-slate-600 first:rounded-l-2xl last:rounded-r-2xl border-y border-slate-100; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Ajuste fino para a Pos e Ref ficarem iguais aos outros */
        .pos-text { @apply text-[11px] font-bold text-slate-500 text-center; }
        .ref-text { @apply text-[11px] font-extrabold text-blue-600 uppercase; }
        
        .status-strip { width: 6px; height: 45px; border-radius: 20px; }
        
        /* VISIBILIDADE */
        .admin-view, .encarregado-view, .sofia-view, .auth-element { display: none !important; }
        body.admin-mode .admin-view, body.admin-mode .encarregado-view { display: table-cell !important; }
        body.encarregado-mode .encarregado-view { display: table-cell !important; }
        body.sofia-mode .sofia-view { display: table-cell !important; }
        body.admin-mode th.admin-view, body.admin-mode th.encarregado-view { display: table-cell !important; }
        body.encarregado-mode th.encarregado-view { display: table-cell !important; }
        body.sofia-mode th.sofia-view { display: table-cell !important; }
        body.admin-mode .auth-element, body.sofia-mode .auth-element { display: block !important; }

        /* EDIÇÃO INLINE */
        .editable-cell { cursor: pointer; transition: all 0.2s; border-radius: 8px; }
        body.can-edit .editable-cell:hover { background-color: #f0f9ff; color: #2563eb; }
        
        .inline-edit-container { 
            display: flex; align-items: center; gap: 8px; background: white; padding: 4px 8px; 
            border-radius: 10px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); border: 2px solid #3b82f6; 
            width: fit-content; position: absolute; z-index: 50; transform: translateX(-10px);
        }
        .inline-input { font-size: 11px; border: none; outline: none; font-weight: 800; color: #1e40af; background: transparent; }
        .btn-confirm-inline { @apply bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-sm active:scale-90; }

        .input-gamil { @apply w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-4 focus:ring-blue-100; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-500 mb-1 ml-2; }
        .btn-premium-gamil { @apply w-full bg-[#1a2a3a] hover:bg-black text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 tracking-widest; }

        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background: white !important; overflow: visible !important; display: block !important; }
            aside, header, .no-print, button { display: none !important; }
            .gamil-table { min-width: 100% !important; border-spacing: 0 !important; }
            .pedido-row td { border: 1px solid #eee !important; border-radius: 0 !important; font-size: 10px !important; }
        }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-[#1a2a3a] text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-3" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-widest uppercase text-blue-300">Hub v7.4 Master</h1>
        </div>
        <nav class="p-4 flex-1 space-y-4">
            <div id="user-info" class="p-5 bg-white/5 rounded-3xl border border-white/10 text-center mb-4">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-blue-100">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2 tracking-widest">Sair</button>
            </div>
            
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg hover:bg-blue-700 transition-all">
                <i class="fas fa-plus"></i> <span>Novo Registo</span>
            </button>

            <button onclick="window.print()" class="w-full p-4 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase transition-all">
                <i class="fas fa-print text-blue-400"></i> <span>Imprimir Lista</span>
            </button>

            <button onclick="abrirModalCliente()" class="auth-element w-full p-4 bg-white/5 hover:bg-white/10 rounded-xl flex items-center space-x-3 text-slate-300 text-[10px] font-bold transition">
                <i class="fas fa-users text-blue-400"></i> <span>Base de Clientes</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b border-slate-200 px-10 flex justify-between items-center no-print">
            <h2 class="text-xs font-black text-slate-800 uppercase italic tracking-widest">Planeamento Geral de Produção</h2>
            <div class="flex items-center space-x-2 bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-black text-blue-600 uppercase">Live Sync</span>
            </div>
        </header>

        <div class="main-content">
            <table class="gamil-table">
                <thead class="gamil-thead">
                    <tr>
                        <th style="width: 45px">Pos</th>
                        <th style="width: 15px"></th>
                        <th style="width: 140px">Ref / Pedido</th>
                        <th style="width: 320px">Cliente Gamil</th>
                        <th class="text-center" style="width: 110px">Entrada</th>
                        <th class="text-center" style="width: 90px">Peso</th>
                        <th class="text-center" style="width: 120px">Serviços</th>
                        <th class="text-center encarregado-view admin-view" style="width: 120px">Montagem</th>
                        <th class="text-center encarregado-view admin-view sofia-view" style="width: 120px">Entrega</th>
                        <th class="text-center" style="width: 180px">Progresso / Log</th>
                        <th class="admin-view" style="width: 250px">Observações Eduardo</th>
                        <th class="text-right pr-6 no-print" style="width: 120px">Ações</th>
                    </tr>
                </thead>
                <tbody id="container-pedidos"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-[#1a2a3a] text-white flex justify-between items-center font-black uppercase text-xs"><span>Registo de Pedido</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 max-h-[85vh] overflow-y-auto text-left">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Cliente</label><select id="p-cliente" required class="input-gamil bg-white border border-slate-200 rounded-xl p-3 font-semibold text-slate-700 text-xs"></select></div>
                <div><label class="label-gamil">Nº Pedido</label><input id="p-pedido" required type="text" class="input-gamil bg-white p-3"></div>
                <div><label class="label-gamil">Prioridade</label><select id="p-prio" class="input-gamil bg-white p-3"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="label-gamil">Ranking Fila</label><input id="p-pos" type="number" class="input-gamil bg-white p-3" placeholder="Ex: 1"></div>
                <div><label class="label-gamil">Peso (Kg)</label><input id="p-peso" required type="number" step="0.01" class="input-gamil bg-white p-3"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" type="date" class="input-gamil bg-white p-3"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="input-gamil bg-white p-3"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                    <div><label class="label-gamil">Furos?</label><select id="p-furos" class="input-gamil bg-white p-3"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>
                <div class="col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2" id="fields-admin-only">
                    <div><label class="label-gamil text-blue-600 font-bold">Data Montagem</label><input id="p-montagem" type="date" class="input-gamil bg-white p-3"></div>
                    <div><label class="label-gamil text-orange-600 font-bold">Data Entrega</label><input id="p-saida" type="date" class="input-gamil bg-white p-3"></div>
                    <div class="col-span-2 admin-view-only"><label class="label-gamil text-blue-600 font-bold">Observações de Fábrica</label><textarea id="p-obs-edu" class="input-gamil bg-white p-3 h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 btn-premium-gamil mt-4">Guardar Registo</button>
            </form>
        </div>
    </div>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-md shadow-2xl flex flex-col h-[80vh] overflow-hidden">
            <div class="p-8 bg-slate-50 border-b flex justify-between items-center"><h3 class="font-black uppercase italic text-slate-800 text-sm tracking-tight">Base de Clientes</h3><button onclick="fecharModal()" class="text-2xl text-slate-400">&times;</button></div>
            <div class="p-8 border-b bg-white auth-element"><form id="form-cliente" class="space-y-4"><input id="c-cod" required type="text" class="input-gamil bg-slate-50 p-3" placeholder="CÓDIGO"><input id="c-nome" required type="text" class="input-gamil bg-slate-50 p-3" placeholder="NOME EMPRESA"><button type="submit" class="w-full bg-[#1a2a3a] text-white py-3 rounded-xl font-bold uppercase text-[10px]">Guardar Cliente</button></form></div>
            <div id="lista-clientes-db" class="flex-1 overflow-y-auto p-8 text-[10px] font-bold text-slate-400 uppercase italic"></div>
        </div>
    </div>

    <div id="modal-logs" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[60] flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl text-center"><h3 class="text-xs font-black text-slate-800 uppercase italic border-b pb-4 mb-6 tracking-widest">Histórico</h3><div id="logs-content" class="space-y-3 max-h-96 overflow-y-auto text-left"></div><button onclick="fecharModal()" class="w-full mt-8 bg-slate-100 py-4 rounded-2xl text-[10px] font-black uppercase text-slate-500">Fechar</button></div>
    </div>

    <div id="modal-progresso" class="hidden fixed inset-0 bg-blue-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-sm p-10 shadow-2xl text-center"><h3 id="prog-nome" class="text-sm font-black text-slate-800 uppercase mb-8 border-b pb-4 italic tracking-tight"></h3><input type="hidden" id="prog-id"><div class="space-y-5"><div><label class="label-gamil">Progresso: <span id="prog-perc-val" class="text-blue-600 font-black text-2xl">0</span>%</label><input type="range" id="prog-range" min="0" max="100" step="5" class="w-full h-2 accent-blue-600 mt-4" oninput="document.getElementById('prog-perc-val').innerText = this.value"></div><textarea id="prog-obs" class="input-gamil h-28" placeholder="Comentário do turno..."></textarea><button onclick="salvarProgresso()" class="btn-premium-gamil">Confirmar Reporte</button></div></div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-[#1a2a3a] z-[100] flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-sm p-12 text-center shadow-2xl border-t-8 border-blue-500">
            <h3 class="text-xl font-black text-slate-800 uppercase italic mb-8">Login Gamil</h3>
            <div class="space-y-4">
                <select id="login-user" class="input-gamil h-14 text-center font-bold text-sm bg-slate-50 border-none">
                    <option value="Visitante">Consulta Geral</option>
                    <option value="Sofia">Sofia</option>
                    <option value="Eduardo Pereira">Eduardo Pereira</option>
                    <option value="José Pedro">José Pedro</option>
                    <option value="José Castro">José Castro</option>
                    <option value="Luís Silva">Luís Silva</option>
                    <option value="Paulo Abreu">Paulo Abreu</option>
                </select>
                <input type="password" id="login-pass" placeholder="PASSWORD" class="input-gamil h-14 text-center tracking-[0.4em] bg-slate-50 border-none">
                <button onclick="tentarLogin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-black transition-all">Entrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA", authDomain: "planeamento-cf642.firebaseapp.com", projectId: "planeamento-cf642", storageBucket: "planeamento-cf642.firebasestorage.app", messagingSenderId: "438224213205", appId: "1:438224213205:web:2205b5a879ec384c62be5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientesFirebase = collection(db, "clientes_gamil");

        let clientesFirebase = [];

        const formatarDataBR = (str) => {
            if (!str || str === '--') return '--';
            const pts = str.split('-'); 
            return pts.length === 3 ? `${pts[2]}-${pts[1]}-${pts[0]}` : str;
        };

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                localStorage.setItem('gamil_sofia', (user === "Sofia"));
                localStorage.setItem('gamil_encarregado', (user === "José Castro" || user === "Luís Silva" || user === "Paulo Abreu"));
                document.getElementById('modal-login').classList.add('hidden');
                checkPermissions();
                setTimeout(atualizarInterfaceClientes, 300);
            } else alert("Credenciais erradas.");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user'); if (!user) return;
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isSofia = localStorage.getItem('gamil_sofia') === 'true';
            const isEnc = localStorage.getItem('gamil_encarregado') === 'true';
            document.body.classList.remove('admin-mode', 'sofia-mode', 'encarregado-mode', 'can-edit');
            if (isAdmin) document.body.classList.add('admin-mode', 'can-edit');
            if (isSofia) document.body.classList.add('sofia-mode');
            if (isEnc) document.body.classList.add('encarregado-mode');
            document.getElementById('fields-admin-only').style.display = (isAdmin || isSofia || isEnc) ? 'grid' : 'none';
            document.querySelectorAll('.admin-view-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            document.querySelectorAll('.auth-element').forEach(el => el.style.display = (isAdmin || isSofia) ? 'block' : 'none');
        };

        // EDIÇÕES RÁPIDAS
        window.editPosInline = (id, el) => {
            if (localStorage.getItem('gamil_admin') !== 'true') return;
            if (el.querySelector('input')) return;
            const val = el.innerText === '--' ? '' : el.innerText.replace('º', '');
            el.innerHTML = `<div class="inline-edit-container no-print"><input type="number" class="inline-input w-12" value="${val}"><button class="btn-confirm-inline" onclick="confirmarPosInline('${id}', this)"><i class="fas fa-check text-[10px]"></i></button></div>`;
            el.querySelector('input').focus();
        };

        window.confirmarPosInline = async (id, btn) => {
            const val = btn.parentElement.querySelector('input').value;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { ranking: val ? parseInt(val) : '' });
        };

        window.editDataInline = (id, campo, el) => {
            if (localStorage.getItem('gamil_admin') !== 'true') return;
            if (el.querySelector('input')) return;
            const raw = el.getAttribute('data-raw') || '';
            el.innerHTML = `<div class="inline-edit-container no-print" style="width:165px"><input type="date" class="inline-input w-28" value="${raw}"><button class="btn-confirm-inline" onclick="confirmarDataInline('${id}', '${campo}', this)"><i class="fas fa-check text-[10px]"></i></button></div>`;
            el.querySelector('input').focus();
        };

        window.confirmarDataInline = async (id, campo, btn) => {
            const val = btn.parentElement.querySelector('input').value;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { [campo]: val });
        };

        window.toggleServico = async (id, campo, val) => {
            if (localStorage.getItem('gamil_admin') !== 'true') return;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { [campo]: val === 'SIM' ? 'NÃO' : 'SIM' });
        };

        // CLIENTES
        onSnapshot(query(colClientesFirebase, orderBy("nome")), snap => {
            clientesFirebase = []; snap.forEach(d => clientesFirebase.push(d.data())); atualizarInterfaceClientes();
        });

        function atualizarInterfaceClientes() {
            const select = document.getElementById('p-cliente'); if(!select) return;
            const estaticos = (typeof CLIENTES_ESTATICOS !== 'undefined') ? CLIENTES_ESTATICOS : [];
            const completa = [...estaticos, ...clientesFirebase].sort((a,b) => a.nome.localeCompare(b.nome));
            select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>' + completa.map(c => `<option value="${c.codigo} | ${c.nome}">${c.codigo} | ${c.nome}</option>`).join('');
            const listaDB = document.getElementById('lista-clientes-db');
            if(listaDB) listaDB.innerHTML = completa.map(c => `<div class="p-2 border-b border-slate-50 uppercase text-[10px] font-bold text-slate-500">● ${c.codigo} | ${c.nome}</div>`).join('');
        }

        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(colClientesFirebase, { codigo: document.getElementById('c-cod').value, nome: document.getElementById('c-nome').value.toUpperCase() });
            e.target.reset(); alert("Cliente guardado!");
        };

        // PEDIDOS COM ORDENAÇÃO
        onSnapshot(colPedidos, snap => {
            const container = document.getElementById('container-pedidos'); container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isSofia = localStorage.getItem('gamil_sofia') === 'true';
            let lista = []; snap.forEach(d => lista.push({ id: d.id, ...d.data() }));

            const pesoPrio = { 'alta': 1, 'media': 2, 'baixa': 3 };
            lista.sort((a, b) => {
                const rA = a.ranking || 999999; const rB = b.ranking || 999999;
                if (rA !== rB) return rA - rB;
                if (pesoPrio[a.prio] !== pesoPrio[b.prio]) return pesoPrio[a.prio] - pesoPrio[b.prio];
                return (a.montagem || '9999-99-99').localeCompare(b.montagem || '9999-99-99');
            });

            lista.forEach(p => {
                const id = p.id;
                const perc = p.progresso || 0;
                const lastLog = p.historico && p.historico.length > 0 ? p.historico[p.historico.length-1] : 'Sem reporte';
                const color = p.prio === 'alta' ? 'bg-red-500' : p.prio === 'media' ? 'bg-orange-400' : 'bg-green-500';
                const tr = document.createElement('tr'); tr.className = "pedido-row";
                tr.innerHTML = `
                    <td class="pos-text ${isAdmin ? 'editable-cell' : ''}" onclick="editPosInline('${id}', this)">${p.ranking ? p.ranking + 'º' : '--'}</td>
                    <td style="width: 15px"><div class="status-strip ${color}"></div></td>
                    <td class="ref-text">#${p.pedido}</td>
                    <td><div class="text-[11px] font-black uppercase text-slate-800 truncate">${p.cliente}</div></td>
                    <td class="text-center italic text-slate-400 text-[10px]">${formatarDataBR(p.entrada)}</td>
                    <td class="text-center text-xs font-black text-slate-600">${p.peso}kg</td>
                    <td class="text-center text-[9px] font-black">
                        <span onclick="toggleServico('${id}', 'pesar', '${p.pesar}')" class="${isAdmin ? 'editable-cell p-1' : ''} ${p.pesar === 'SIM' ? 'text-orange-500 font-black' : 'text-slate-300'}">PES</span> | 
                        <span onclick="toggleServico('${id}', 'furos', '${p.furos}')" class="${isAdmin ? 'editable-cell p-1' : ''} ${p.furos === 'SIM' ? 'text-orange-500 font-black' : 'text-slate-300'}">FUR</span>
                    </td>
                    <td class="admin-view encarregado-view text-center text-[10px] font-black text-blue-900/80 ${isAdmin ? 'editable-cell' : ''}" data-raw="${p.montagem || ''}" onclick="editDataInline('${id}', 'montagem', this)">${formatarDataBR(p.montagem)}</td>
                    <td class="admin-view encarregado-view sofia-view text-center text-[10px] font-black text-orange-600 ${isAdmin ? 'editable-cell' : ''}" data-raw="${p.saida || ''}" onclick="editDataInline('${id}', 'saida', this)">${formatarDataBR(p.saida)}</td>
                    <td class="cursor-pointer" onclick='verLogs(${JSON.stringify(p.historico)})'>
                        <div class="flex items-center space-x-2"><div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-blue-600 transition-all duration-700" style="width: ${perc}%"></div></div><span class="text-[10px] font-black text-slate-700">${perc}%</span></div>
                        <div class="text-[7px] font-bold text-slate-400 truncate mt-1 italic no-print">● ${lastLog}</div>
                    </td>
                    <td class="admin-view text-[9px] font-bold text-slate-400 italic uppercase truncate border-l border-slate-100 pl-3">${p.obs_edu || ''}</td>
                    <td class="text-right pr-6 no-print">
                        <div class="flex justify-end space-x-2">
                             <button onclick="abrirProgresso('${id}', '${p.cliente}', ${perc})" class="text-green-500 hover:scale-125 transition"><i class="fas fa-check-circle text-xl"></i></button>
                             ${(isAdmin || isSofia) ? `<button onclick="preparaEdicao('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="text-orange-400 hover:scale-125 transition"><i class="fas fa-pencil-alt text-xl"></i></button>` : ''}
                             ${isAdmin ? `<button onclick="apagarPedido('${id}')" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt text-xl"></i></button>` : ''}
                        </div>
                    </td>
                `; container.appendChild(tr);
            }); checkPermissions();
        });

        document.getElementById('form-pedido').onsubmit = async (e) => {
            e.preventDefault(); const id = document.getElementById('p-id').value;
            const data = { cliente: document.getElementById('p-cliente').value, pedido: document.getElementById('p-pedido').value, prio: document.getElementById('p-prio').value, ranking: parseInt(document.getElementById('p-pos').value) || '', peso: document.getElementById('p-peso').value, entrada: document.getElementById('p-entrada').value, pesar: document.getElementById('p-pesar').value, furos: document.getElementById('p-furos').value, montagem: document.getElementById('p-montagem').value, saida: document.getElementById('p-saida').value, obs_edu: document.getElementById('p-obs-edu').value.toUpperCase(), timestamp: new Date() };
            if (id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data); else await addDoc(colPedidos, { ...data, progresso: 0, historico: [] });
            fecharModal();
        };

        window.salvarProgresso = async () => {
            const id = document.getElementById('prog-id').value; const perc = parseInt(document.getElementById('prog-range').value); const obs = document.getElementById('prog-obs').value.toUpperCase();
            const log = `${localStorage.getItem('gamil_user')}: ${perc}% ${obs ? '-> '+obs : ''} [${new Date().toLocaleString('pt-PT')}]`;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { progresso: perc, historico: arrayUnion(log) }); fecharModal();
        };

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id; document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido; document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-pos').value = p.ranking || ''; document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-entrada').value = p.entrada; document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos; document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida; document.getElementById('p-obs-edu').value = p.obs_edu || '';
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('p-entrada').value = new Date().toISOString().split('T')[0]; document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        window.abrirProgresso = (id, n, p) => { document.getElementById('prog-id').value = id; document.getElementById('prog-nome').innerText = n; document.getElementById('prog-range').value = p; document.getElementById('prog-perc-val').innerText = p + "%"; document.getElementById('prog-obs').value = ""; document.getElementById('modal-progresso').classList.remove('hidden'); };
        window.apagarPedido = async id => { if(confirm("Eliminar registo?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.verLogs = logs => { document.getElementById('logs-content').innerHTML = logs && logs.length > 0 ? logs.map(l => `<div class="p-4 bg-slate-50 rounded-2xl border mb-2 text-[10px] font-bold shadow-sm">${l}</div>`).join('') : '<p class="text-center italic py-4">Vazio</p>'; document.getElementById('modal-logs').classList.remove('hidden'); };

        window.onload = () => { if (localStorage.getItem('gamil_user')) { document.getElementById('modal-login').classList.add('hidden'); checkPermissions(); setTimeout(atualizarInterfaceClientes, 300); } };
    </script>
</body>
</html>
