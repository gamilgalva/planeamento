<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamil Hub v10 | Matrix Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="clientes_base.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --gamil-blue: #1a2a3a; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: row; overflow: hidden; margin: 0; }
        
        .sidebar { width: 260px; background-color: #1a2a3a; color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; z-index: 40; box-shadow: 4px 0 15px rgba(0,0,0,0.2); transition: all 0.3s ease; }
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: #f1f5f9; height: 100vh; }
        .main-content { flex: 1; overflow: auto; padding: 25px 40px; }

        .gamil-table { min-width: 1550px; border-separate: border-spacing-y(12px); width: 100%; border-collapse: separate; table-layout: fixed; }
        .gamil-thead th { @apply text-[10px] font-black uppercase text-slate-400 tracking-widest px-4 py-2 text-left; }
        .pedido-row td { @apply py-5 px-4 first:rounded-l-2xl last:rounded-r-2xl border-y border-slate-100 bg-white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* FONTES MATRIX */
        .pos-text { font-size: 10px !important; @apply font-black text-slate-400 text-center; width: 45px; }
        .ref-text { font-size: 10px !important; color: #2563eb !important; font-weight: 800 !important; @apply uppercase italic; }
        .client-text { font-size: 10px !important; font-weight: 800 !important; @apply uppercase text-slate-800 tracking-tighter; }
        .other-row-text { font-size: 10px !important; @apply font-bold text-slate-600; }
        .status-strip { width: 5px; height: 35px; border-radius: 20px; }

        /* LOGIN */
        #modal-login { position: fixed; inset: 0; background-color: #1a2a3a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; width: 100%; max-width: 380px; padding: 3.5rem; border-radius: 3rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); border-top: 10px solid #3b82f6; }

        /* VISIBILIDADE */
        .admin-view, .encarregado-view, .sofia-view, .auth-element { display: none !important; }
        body.admin-mode .admin-view, body.admin-mode .encarregado-view, body.encarregado-mode .encarregado-view, body.sofia-mode .sofia-view { display: table-cell !important; }
        body.admin-mode th.admin-view, body.admin-mode th.encarregado-view, body.encarregado-mode th.encarregado-view, body.sofia-mode th.sofia-view { display: table-cell !important; }
        body.admin-mode .auth-element, body.sofia-mode .auth-element { display: block !important; }

        /* EDIÇÃO INLINE */
        .editable-cell { cursor: pointer; transition: all 0.2s; border-radius: 8px; }
        body.can-edit .editable-cell:hover { background-color: #f0f9ff; box-shadow: inset 0 0 0 1px #bfdbfe; }
        .inline-edit-container { display: flex; align-items: center; gap: 8px; background: white; padding: 4px 8px; border-radius: 10px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); border: 2px solid #3b82f6; width: fit-content; position: absolute; z-index: 100; transform: translateX(-10px); }

        @media (max-width: 1024px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { padding: 15px; }
            .gamil-table { min-width: 1200px; }
        }

        .modal-input { @apply w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-4 focus:ring-blue-100; }
        .btn-premium-gamil { @apply w-full bg-[#1a2a3a] hover:bg-black text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 tracking-widest; }
    </style>
</head>
<body>

    <div id="modal-login" class="no-print">
        <div class="login-card">
            <img src="logo-gamil.png" alt="Gamil" class="w-36 mx-auto mb-8" onerror="this.style.display='none'">
            <div class="space-y-4">
                <select id="login-user" class="modal-input bg-white">
                    <option value="Visitante">Consulta</option>
                    <option value="Sofia">Sofia Meira</option>
                    <option value="Eduardo Pereira">Eduardo Pereira</option>
                    <option value="José Pedro">José Pedro</option>
                    <option value="José Castro">José Castro</option>
                    <option value="Luís Silva">Luís Silva</option>
                    <option value="Paulo Abreu">Paulo Abreu</option>
                </select>
                <input type="password" id="login-pass" placeholder="PASSWORD" class="modal-input bg-white text-center tracking-[0.5em]">
                <button onclick="tentarLogin()" class="btn-premium-gamil bg-blue-600">Entrar</button>
            </div>
        </div>
    </div>

    <aside class="sidebar no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-3" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-widest uppercase text-blue-300">Hub v10 Matrix</h1>
        </div>
        <nav class="p-4 flex-1 space-y-4 overflow-y-auto">
            <div id="user-info" class="p-5 bg-white/5 rounded-3xl border border-white/10 text-center">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-blue-100 tracking-tighter">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2 tracking-widest">Sair</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg hover:bg-blue-700 transition-all"><i class="fas fa-plus"></i> <span>Novo Registo</span></button>
            <button onclick="window.print()" class="w-full p-4 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase transition-all"><i class="fas fa-print text-blue-400"></i> <span>Imprimir</span></button>
            <button onclick="abrirModalCliente()" class="auth-element w-full p-4 bg-white/5 hover:bg-white/10 rounded-xl flex items-center space-x-3 text-slate-300 text-[10px] font-bold transition"><i class="fas fa-users text-blue-400"></i> <span>Clientes</span></button>
        </nav>
    </aside>

    <main class="main-container">
        <header class="h-16 bg-white border-b border-slate-200 px-10 flex justify-between items-center no-print">
            <h2 class="text-xs font-black text-slate-800 uppercase italic tracking-widest">Planeamento Geral</h2>
            <div class="bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100 italic font-black text-[9px] text-blue-600 uppercase">Live Master v10</div>
        </header>

        <div class="main-content">
            <table class="gamil-table">
                <thead class="gamil-thead">
                    <tr><th style="width: 55px">Pos</th><th style="width: 15px"></th><th style="width: 140px">Ref / Pedido</th><th style="width: 380px">Cliente Gamil</th><th class="text-center" style="width: 110px">Entrada</th><th class="text-center" style="width: 90px">Peso</th><th class="text-center" style="width: 120px">Serviços</th><th class="text-center encarregado-view admin-view" style="width: 120px">Montagem</th><th class="text-center encarregado-view admin-view sofia-view" style="width: 120px">Entrega</th><th class="text-center" style="width: 180px">Progresso</th><th class="admin-view" style="width: 250px">Observações</th><th class="text-right pr-6 no-print" style="width: 120px">Ações</th></tr>
                </thead>
                <tbody id="container-pedidos"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col h-[85vh]">
            <div class="p-6 bg-[#1a2a3a] text-white flex justify-between items-center font-black uppercase text-xs"><span>Ficha de Pedido</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Cliente</label><select id="p-cliente" required class="modal-input bg-white"></select></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Pedido #</label><input id="p-pedido" required type="text" class="modal-input"></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Urgência</label><select id="p-prio" class="modal-input"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Ranking</label><input id="p-pos" type="number" class="modal-input"></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Peso Kg</label><input id="p-peso" required type="number" step="0.01" class="modal-input"></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Data Entrada</label><input id="p-entrada" type="date" class="modal-input"></div>
                <div class="grid grid-cols-2 gap-2"><div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Pesar?</label><select id="p-pesar" class="modal-input"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div><div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Furos?</label><select id="p-furos" class="modal-input"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div></div>
                
                <div id="form-admin-fields" class="col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2" style="display: none;">
                    <div><label class="block text-[10px] font-black text-blue-600 uppercase ml-2">Montagem</label><input id="p-montagem" type="date" class="modal-input"></div>
                    <div><label class="block text-[10px] font-black text-orange-600 uppercase ml-2">Entrega</label><input id="p-saida" type="date" class="modal-input"></div>
                    <div class="col-span-2"><label class="block text-[10px] font-black text-blue-600 uppercase ml-2">Notas Eduardo</label><textarea id="p-obs-edu" class="modal-input h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 btn-premium-gamil mt-4">Guardar</button>
            </form>
        </div>
    </div>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-md shadow-2xl flex flex-col h-[85vh] overflow-hidden">
            <div class="p-8 bg-slate-50 border-b flex justify-between items-center"><h3 class="font-black uppercase text-sm italic">Base de Clientes</h3><button onclick="fecharModal()">&times;</button></div>
            <div class="p-8 border-b bg-white auth-element"><form id="form-cliente" class="space-y-4"><input id="c-cod" required type="text" class="modal-input" placeholder="CÓDIGO"><input id="c-nome" required type="text" class="modal-input" placeholder="NOME"><button type="submit" class="btn-premium-gamil">Adicionar</button></form></div>
            <div id="lista-clientes-db" class="flex-1 overflow-y-auto p-8 text-[10px] font-bold text-slate-400"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA", authDomain: "planeamento-cf642.firebaseapp.com", projectId: "planeamento-cf642", storageBucket: "planeamento-cf642.firebasestorage.app", messagingSenderId: "438224213205", appId: "1:438224213205:web:2205b5a879ec384c62be5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        const formatarDataBR = (s) => { if(!s||s=='--')return'--'; const p=s.split('-'); return p.length==3?`${p[2]}-${p[1]}-${p[0]}`:s; };

        window.tentarLogin = () => {
            const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value;
            const c = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (u === "Visitante" || (c[u] && p === c[u])) {
                localStorage.setItem('gamil_user', u);
                localStorage.setItem('gamil_admin', (u.includes("Eduardo") || u.includes("Pedro")));
                localStorage.setItem('gamil_sofia', u === "Sofia");
                localStorage.setItem('gamil_encarregado', ["José Castro", "Luís Silva", "Paulo Abreu"].includes(u));
                checkPermissions();
                setTimeout(carregarClientes, 300);
            } else alert("Incorreto");
        };

        const checkPermissions = () => {
            const u = localStorage.getItem('gamil_user'); if(!u){document.getElementById('modal-login').style.display='flex'; return;}
            document.getElementById('modal-login').style.display='none'; document.getElementById('nome-logado').innerText = u;
            const adm = localStorage.getItem('gamil_admin') === 'true';
            const sof = localStorage.getItem('gamil_sofia') === 'true';
            const enc = localStorage.getItem('gamil_encarregado') === 'true';
            document.body.className = `${adm?'admin-mode can-edit':''} ${sof?'sofia-mode':''} ${enc?'encarregado-mode':''}`;
            document.getElementById('form-admin-fields').style.display = adm ? 'grid' : 'none';
        };

        // RESTAURAÇÃO DAS FUNÇÕES DE CLIQUE (EDUARDO/PEDRO)
        window.editPosInline = (id, el) => { if (localStorage.getItem('gamil_admin') !== 'true') return; if (el.querySelector('input')) return; const val = el.innerText.replace('º','').trim(); el.innerHTML = `<input type="number" class="w-12 text-xs p-1 border" value="${val}" onblur="confirmarPosInline('${id}', this)">`; el.querySelector('input').focus(); };
        window.confirmarPosInline = async (id, input) => { await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { ranking: parseInt(input.value) || '' }); };
        window.toggleServico = async (id, campo, val) => { if (localStorage.getItem('gamil_admin') !== 'true') return; await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { [campo]: val === 'SIM' ? 'NÃO' : 'SIM' }); };

        function carregarClientes() {
            onSnapshot(query(colClientes, orderBy("nome")), snap => {
                const select = document.getElementById('p-cliente'); if(!select) return;
                let html = '<option value="">-- SELECIONAR --</option>';
                snap.forEach(d => { html += `<option value="${d.data().codigo} | ${d.data().nome}">${d.data().codigo} | ${d.data().nome}</option>`; });
                select.innerHTML = html;
            });
        }

        onSnapshot(query(colPedidos, orderBy("ranking")), snap => {
            const container = document.getElementById('container-pedidos'); container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isSofia = localStorage.getItem('gamil_sofia') === 'true';
            snap.forEach(d => {
                const p = d.data(), id = d.id;
                const color = p.prio === 'alta' ? 'bg-red-500' : p.prio === 'media' ? 'bg-orange-400' : 'bg-green-500';
                const tr = document.createElement('tr'); tr.className = "pedido-row";
                tr.innerHTML = `
                    <td class="pos-text ${isAdmin?'editable-cell':''}" onclick="editPosInline('${id}', this)">${p.ranking||'--'}º</td>
                    <td style="width:15px"><div class="status-strip ${color}"></div></td>
                    <td class="ref-text">#${p.pedido}</td>
                    <td class="client-text">${p.cliente}</td>
                    <td class="text-center italic text-slate-400 other-row-text">${formatarDataBR(p.entrada)}</td>
                    <td class="text-center other-row-text">${p.peso}kg</td>
                    <td class="text-center font-black other-row-text">
                        <span class="${isAdmin?'editable-cell':''} ${p.pesar==='SIM'?'text-orange-500':'text-slate-300'}" onclick="toggleServico('${id}','pesar','${p.pesar}')">PES</span> | 
                        <span class="${isAdmin?'editable-cell':''} ${p.furos==='SIM'?'text-orange-500':'text-slate-300'}" onclick="toggleServico('${id}','furos','${p.furos}')">FUR</span>
                    </td>
                    <td class="admin-view encarregado-view text-center other-row-text">${formatarDataBR(p.montagem)}</td>
                    <td class="admin-view encarregado-view sofia-view text-center other-row-text">${formatarDataBR(p.saida)}</td>
                    <td class="other-row-text text-center">${p.progresso||0}%</td>
                    <td class="admin-view italic truncate other-row-text">${p.obs_edu||''}</td>
                    <td class="text-right pr-6 no-print">
                        <div class="flex justify-end space-x-2">
                            ${(isAdmin || isSofia) ? `<button onclick="preparaEdicao('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="text-orange-400"><i class="fas fa-pencil-alt"></i></button>` : ''}
                            ${isAdmin ? `<button onclick="apagarPedido('${id}')" class="text-red-400"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </td>
                `; container.appendChild(tr);
            });
        });

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id; document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido; document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-pos').value = p.ranking || ''; document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-entrada').value = p.entrada; document.getElementById('p-pesar').value = p.pesar || 'NÃO';
            document.getElementById('p-furos').value = p.furos || 'NÃO'; document.getElementById('p-montagem').value = p.montagem || '';
            document.getElementById('p-saida').value = p.saida || ''; document.getElementById('p-obs-edu').value = p.obs_edu || '';
            document.getElementById('modal-pedido').classList.remove('hidden');
            checkPermissions();
        };

        window.apagarPedido = async id => { if(confirm("Apagar?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        document.getElementById('form-pedido').onsubmit = async e => {
            e.preventDefault(); const id = document.getElementById('p-id').value;
            const data = { cliente: document.getElementById('p-cliente').value, pedido: document.getElementById('p-pedido').value, prio: document.getElementById('p-prio').value, ranking: parseInt(document.getElementById('p-pos').value) || '', peso: document.getElementById('p-peso').value, entrada: document.getElementById('p-entrada').value, pesar: document.getElementById('p-pesar').value, furos: document.getElementById('p-furos').value, montagem: document.getElementById('p-montagem').value, saida: document.getElementById('p-saida').value, obs_edu: document.getElementById('p-obs-edu').value.toUpperCase() };
            if(id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data); else await addDoc(colPedidos, {...data, progresso:0});
            fecharModal();
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('modal-pedido').classList.remove('hidden'); checkPermissions(); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        window.onload = () => { checkPermissions(); carregarClientes(); };
    </script>
</body>
</html>
