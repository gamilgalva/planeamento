<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Hub v5.0 | Industrial Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --gamil-blue: #1a2a3a; /* Azul marinho estilo Académicos */
            --bg-page: #cbd5e0;    /* Fundo original do site de jogos */
            --box-white: #f1f3f5;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-page); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* CARD ESTILO JOGOS ACADÉMICOS */
        .pedido-card { 
            display: grid; 
            grid-template-columns: 8px 120px 2fr 100px 80px 120px 100px 100px 120px 1fr 100px;
            align-items: center; 
            gap: 12px;
            @apply bg-white rounded-xl mb-3 shadow-sm hover:shadow-lg transition-all relative overflow-hidden;
            min-width: 1200px;
            min-height: 70px;
        }

        /* CABEÇALHO DE TABELA PRO */
        .header-row { 
            display: grid; 
            grid-template-columns: 8px 120px 2fr 100px 80px 120px 100px 100px 120px 1fr 100px;
            gap: 12px;
            @apply px-4 py-2 mb-2 text-[10px] font-black uppercase text-slate-500 tracking-widest border-b border-slate-300;
            min-width: 1200px;
        }

        .status-bar { width: 8px; height: 100%; position: absolute; left: 0; top: 0; }
        .main-content { overflow-y: auto; flex: 1; padding: 20px 30px; }
        
        /* CORES DE STATUS (Prioridades) */
        .prio-alta { background-color: #e74c3c !important; }
        .prio-media { background-color: #e67e22 !important; }
        .prio-baixa { background-color: #27ae60 !important; }

        .admin-view, .auth-element { display: none; }
        
        .input-gamil { @apply w-full border border-slate-300 rounded-lg p-2 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-2 focus:ring-blue-500; }
        .label-gamil { @apply block text-[10px] font-bold text-slate-500 mb-1; }

        @media print {
            aside, header, button, .no-print { display: none !important; }
            body { background: white !important; display: block !important; }
            .main-content { padding: 0 !important; }
            .pedido-card { border: 1px solid #ddd !important; grid-template-columns: 5px 80px 1fr 80px 60px 80px 80px 80px 80px 1fr 0px !important; }
            .admin-view { display: block !important; }
        }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-[#1a2a3a] text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-8 text-center border-b border-white/5">
            <img src="logo-gamil.png" alt="Gamil" class="max-w-[150px] mx-auto mb-2">
            <h1 class="text-[11px] font-black tracking-widest uppercase opacity-50">FC Académicos Hub</h1>
        </div>
        <nav class="p-4 flex-1 space-y-4">
            <div class="p-5 bg-white/5 rounded-xl border border-white/10 text-center">
                <p id="nome-logado" class="text-xs font-black uppercase italic">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2">Sair</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-[#3498db] hover:bg-blue-400 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg transition-all">
                <i class="fas fa-plus"></i> <span>Novo Registo</span>
            </button>
            <button onclick="window.print()" class="w-full p-3 bg-white/5 hover:bg-white/10 rounded-xl flex items-center justify-center space-x-2 text-[10px] font-black uppercase">
                <i class="fas fa-print text-blue-400"></i> <span>Exportar PDF</span>
            </button>
            <button onclick="abrirModalCliente()" class="auth-element w-full p-3 hover:bg-white/5 rounded-xl flex items-center space-x-3 text-slate-400 text-[10px] font-bold">
                <i class="fas fa-users"></i> <span>Base de Clientes</span>
            </button>
        </nav>
        <div class="p-4 opacity-20 text-[7px] text-center uppercase font-bold">Gamil Management 2026</div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-[#f1f3f5] border-b border-slate-300 px-10 flex justify-between items-center no-print">
            <h2 class="text-sm font-black text-[#1a2a3a] uppercase italic">R.030.01 - Planeamento de Produção</h2>
            <div id="sync-tag" class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">Sincronizado</div>
        </header>

        <div class="main-content">
            <div class="header-row no-print">
                <div></div>
                <div class="pl-2">Ref / Pedido</div>
                <div>Cliente Gamil</div>
                <div class="text-center">Entrada</div>
                <div class="text-center">Peso</div>
                <div class="text-center">Serviços</div>
                <div class="admin-view text-center">Montagem</div>
                <div class="admin-view text-center">Entrega</div>
                <div class="admin-view text-center">Local</div>
                <div class="text-center">Progresso / Log</div>
                <div class="text-right pr-6">Ações</div>
            </div>
            
            <div id="container-pedidos"></div>
        </div>
    </main>

    <div id="modal-logs" class="hidden fixed inset-0 bg-[#1a2a3a]/90 backdrop-blur-md z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-xs font-black text-slate-800 uppercase italic border-b pb-4 mb-4">Registo de Atividade</h3>
            <div id="logs-content" class="space-y-3 max-h-96 overflow-y-auto"></div>
            <button onclick="fecharModal()" class="w-full mt-6 bg-slate-100 py-3 rounded-lg text-[10px] font-black uppercase">Fechar</button>
        </div>
    </div>

    <div id="modal-progresso" class="hidden fixed inset-0 bg-[#1a2a3a]/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-sm p-8 shadow-2xl">
            <h3 id="prog-nome" class="text-xs font-black text-slate-800 uppercase mb-8 text-center italic"></h3>
            <input type="hidden" id="prog-id">
            <div class="space-y-6 text-center">
                <div>
                    <label class="label-gamil">Percentagem: <span id="prog-perc-val" class="text-blue-600 font-black text-xl">0</span>%</label>
                    <input type="range" id="prog-range" min="0" max="100" step="5" class="w-full accent-blue-600 mt-4" oninput="document.getElementById('prog-perc-val').innerText = this.value">
                </div>
                <textarea id="prog-obs" class="input-gamil h-24" placeholder="Alguma observação do turno?"></textarea>
                <button onclick="salvarProgresso()" class="w-full bg-[#3498db] text-white py-4 rounded-lg font-black uppercase shadow-lg hover:bg-blue-600">Gravar Reporte</button>
            </div>
        </div>
    </div>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-[#1a2a3a]/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden">
            <div class="p-6 bg-[#1a2a3a] text-white flex justify-between items-center font-black uppercase text-xs"><span>Ficha de Produção</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 max-h-[85vh] overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Nome do Cliente</label><select id="p-cliente" required class="input-gamil"></select></div>
                <div><label class="label-gamil">Pedido Nº</label><input id="p-pedido" required type="text" class="input-gamil"></div>
                <div><label class="label-gamil">Prioridade</label><select id="p-prio" class="input-gamil"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="label-gamil">Peso (Kg)</label><input id="p-peso" required type="number" step="0.01" class="input-gamil"></div>
                <div><label class="label-gamil">Entrada</label><input id="p-entrada" type="date" class="input-gamil"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                    <div><label class="label-gamil">Furos?</label><select id="p-furos" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>
                <div class="admin-view col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2">
                    <div><label class="label-gamil text-blue-600">Data Montagem</label><input id="p-montagem" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil text-orange-600">Data Entrega</label><input id="p-saida" type="date" class="input-gamil"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600">Local (Rack/Pátio)</label><input id="p-local" type="text" class="input-gamil"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600">Notas Eduardo (Impressão)</label><textarea id="p-obs-edu" class="input-gamil h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 bg-[#1a2a3a] text-white py-4 rounded-lg font-black uppercase shadow-lg mt-4">Guardar Dados</button>
            </form>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-[#1a2a3a] z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-10 text-center shadow-2xl border-t-8 border-[#3498db]">
            <img src="logo-gamil.png" class="max-w-[120px] mx-auto mb-10">
            <select id="login-user" class="input-gamil mb-4 h-12 text-center font-bold">
                <option value="Visitante">Apenas Consulta</option>
                <option value="Sofia">Sofia</option>
                <option value="Eduardo Pereira">Eduardo</option>
                <option value="José Pedro">José Pedro</option>
                <option value="José Castro">José Castro</option>
                <option value="Luís Silva">Luís Silva</option>
                <option value="Paulo Abreu">Paulo Abreu</option>
            </select>
            <input type="password" id="login-pass" placeholder="PASSWORD" class="input-gamil mb-8 h-12 text-center tracking-widest">
            <button onclick="tentarLogin()" class="w-full bg-[#1a2a3a] text-white py-4 rounded-lg font-black uppercase shadow-xl hover:bg-black transition-all">Entrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro" || user === "Sofia"));
                localStorage.setItem('gamil_view_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                checkPermissions();
            } else alert("Senha Incorreta!");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const viewAdmin = localStorage.getItem('gamil_view_admin') === 'true';
            document.querySelectorAll('.admin-view').forEach(el => el.style.display = viewAdmin ? 'block' : 'none');
            document.querySelectorAll('.auth-element').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            if(viewAdmin) document.querySelectorAll('form .admin-view').forEach(el => el.style.display = 'grid');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };

        onSnapshot(colClientes, (snap) => {
            const select = document.getElementById('p-cliente');
            select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>';
            snap.forEach(d => { select.innerHTML += `<option value="${d.data().codigo} | ${d.data().nome}">${d.data().codigo} - ${d.data().nome}</option>`; });
        });

        document.getElementById('form-pedido').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                cliente: document.getElementById('p-cliente').value,
                pedido: document.getElementById('p-pedido').value,
                prio: document.getElementById('p-prio').value,
                peso: document.getElementById('p-peso').value,
                entrada: document.getElementById('p-entrada').value,
                pesar: document.getElementById('p-pesar').value,
                furos: document.getElementById('p-furos').value,
                montagem: document.getElementById('p-montagem').value,
                saida: document.getElementById('p-saida').value,
                local: document.getElementById('p-local').value.toUpperCase(),
                obs_edu: document.getElementById('p-obs-edu').value.toUpperCase(),
                timestamp: new Date()
            };
            if (id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data);
            else await addDoc(colPedidos, { ...data, progresso: 0, historico: [] });
            fecharModal();
        };

        window.salvarProgresso = async () => {
            const id = document.getElementById('prog-id').value;
            const perc = parseInt(document.getElementById('prog-range').value);
            const obs = document.getElementById('prog-obs').value.toUpperCase();
            const user = localStorage.getItem('gamil_user');
            const log = `${user}: ${perc}% ${obs ? '-> '+obs : ''} [${new Date().toLocaleTimeString('pt-PT')}]`;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { progresso: perc, historico: arrayUnion(log) });
            fecharModal();
        };

        onSnapshot(query(colPedidos, orderBy("timestamp", "desc")), (snap) => {
            const container = document.getElementById('container-pedidos');
            container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const viewAdmin = localStorage.getItem('gamil_view_admin') === 'true';

            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const perc = p.progresso || 0;
                const colorClass = p.prio === 'alta' ? 'prio-alta' : p.prio === 'media' ? 'prio-media' : 'prio-baixa';
                const lastLog = p.historico && p.historico.length > 0 ? p.historico[p.historico.length - 1] : 'Ver histórico';

                const div = document.createElement('div');
                div.className = "pedido-card";
                div.innerHTML = `
                    <div class="status-bar ${colorClass}"></div>
                    <div class="pl-4 text-blue-600 font-bold italic text-[11px]">#${p.pedido}</div>
                    <div class="text-[11px] font-bold uppercase text-slate-700 truncate pr-2">${p.cliente}</div>
                    <div class="text-center text-[10px] font-semibold text-slate-400 italic">${p.entrada}</div>
                    <div class="text-center text-[11px] font-black text-slate-600">${p.peso} KG</div>
                    <div class="text-center flex justify-center space-x-1">
                        <span class="px-2 py-0.5 rounded text-[9px] font-black ${p.pesar === 'SIM' ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-300'}">PES</span>
                        <span class="px-2 py-0.5 rounded text-[9px] font-black ${p.furos === 'SIM' ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-300'}">FUR</span>
                    </div>
                    
                    <div class="admin-view text-center text-[10px] font-black text-[#1a2a3a]">${p.montagem || '--'}</div>
                    <div class="admin-view text-center text-[10px] font-black text-orange-600">${p.saida || '--'}</div>
                    <div class="admin-view text-center"><span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-[9px] font-black uppercase border border-blue-100">${p.local || '--'}</span></div>

                    <div class="px-3 cursor-pointer" onclick='verLogs(${JSON.stringify(p.historico)})'>
                        <div class="flex items-center space-x-2">
                            <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                <div class="h-full bg-[#3498db] transition-all duration-700" style="width: ${perc}%"></div>
                            </div>
                            <span class="text-[10px] font-black text-slate-800">${perc}%</span>
                        </div>
                        <div class="text-[7px] font-bold text-slate-400 truncate mt-1.5 italic hover:text-blue-600">● ${lastLog}</div>
                    </div>

                    <div class="admin-view text-[9px] font-bold text-slate-400 italic uppercase truncate border-l border-slate-100 pl-3 pr-2">${p.obs_edu || '---'}</div>
                    
                    <div class="text-right pr-6 flex justify-end space-x-2 no-print">
                        <button onclick="abrirProgresso('${id}', '${p.cliente}', ${perc})" class="w-8 h-8 flex items-center justify-center bg-green-50 text-green-500 rounded-lg hover:bg-green-500 hover:text-white transition-all"><i class="fas fa-check-circle"></i></button>
                        ${isAdmin ? `<button onclick="preparaEdicao('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="w-8 h-8 flex items-center justify-center bg-orange-50 text-orange-500 rounded-lg hover:bg-orange-500 hover:text-white transition-all"><i class="fas fa-pencil-alt text-[10px]"></i></button>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
            checkPermissions();
        });

        window.verLogs = (logs) => {
            const content = document.getElementById('logs-content');
            content.innerHTML = logs && logs.length > 0 ? logs.map(l => `<div class="p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] font-bold text-slate-600 leading-relaxed shadow-sm"> ${l}</div>`).join('') : '<p class="text-xs italic text-center py-10 text-slate-400">Sem histórico.</p>';
            document.getElementById('modal-logs').classList.remove('hidden');
        };

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id;
            document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido;
            document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-entrada').value = p.entrada;
            document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos;
            document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida;
            document.getElementById('p-local').value = p.local;
            document.getElementById('p-obs-edu').value = p.obs_edu || '';
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.abrirProgresso = (id, nome, perc) => {
            document.getElementById('prog-id').value = id;
            document.getElementById('prog-nome').innerText = nome;
            document.getElementById('prog-range').value = perc;
            document.getElementById('prog-perc-val').innerText = perc + "%";
            document.getElementById('prog-obs').value = "";
            document.getElementById('modal-progresso').classList.remove('hidden');
        };

        window.apagar = async (id) => { if(confirm("Apagar registo permanentemente?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        checkPermissions();
    </script>
</body>
</html>
