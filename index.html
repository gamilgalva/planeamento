<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeamento Gamil v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; }
        .bg-gamil { background-color: #002D5A; }
        .input-gamil { @apply w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-semibold text-slate-700 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none uppercase text-sm; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-500 mb-1 ml-1; }
        .main-content { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
        /* Transição suave de cores */
        .progress-bar { transition: width 0.5s ease, background-color 0.5s ease; }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-72 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-20 md:h-screen">
        <div class="p-8 border-b border-white/5 text-center relative">
            <div class="text-[9px] font-black text-blue-400/50 absolute top-2 right-4 tracking-tighter uppercase">v2.3</div>
            <div class="mb-4 flex justify-center">
                 <img src="logo-gamil.png" alt="Gamil Logo" class="w-24 h-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                 <div class="w-16 h-16 bg-white rounded-2xl hidden items-center justify-center text-gamil font-black text-2xl">G</div>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none text-blue-50">Planeamento Gamil</h1>
        </div>
        
        <nav class="p-4 flex-1 space-y-4">
            <button onclick="window.location.reload()" class="w-full p-4 bg-white/10 rounded-xl font-bold flex items-center space-x-3 hover:bg-white/20 transition">
                <i class="fas fa-sync-alt text-blue-400"></i> <span>Sincronizar</span>
            </button>
            <button onclick="verificarAcesso(abrirModalCliente)" class="w-full p-4 hover:bg-white/5 rounded-xl font-bold flex items-center space-x-3 text-slate-400 transition text-sm">
                <i class="fas fa-users-cog"></i> <span>Base de Clientes</span>
            </button>
        </nav>

        <div class="p-4 opacity-10 hover:opacity-100 transition-opacity">
            <p class="text-[8px] font-medium text-slate-500 uppercase text-center tracking-[0.2em]">Dev: Hamilton Junior</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 main-content">
        <header class="h-20 bg-white border-b border-slate-200 px-6 md:px-10 flex justify-between items-center shadow-sm sticky top-0 z-10">
            <div class="flex items-center space-x-4">
                <div class="h-8 w-1.5 bg-blue-600 rounded-full"></div>
                <h2 class="text-lg font-black text-slate-800 uppercase italic">Produção em Tempo Real</h2>
            </div>
            <button onclick="verificarAcesso(abrirModalPedido)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-black shadow-lg transition-all text-xs flex items-center">
                <i class="fas fa-plus-circle mr-2"></i> LANÇAR PEDIDO
            </button>
        </header>

        <div id="container-pedidos" class="p-4 md:p-8 grid grid-cols-1 xl:grid-cols-2 gap-6 pb-20"></div>
    </main>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-3xl w-full max-w-lg my-auto shadow-2xl">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-3xl">
                <h3 id="modal-pedido-titulo" class="text-xl font-black text-slate-800 uppercase italic italic">Lançar Pedido</h3>
                <button onclick="fecharModal()" class="text-slate-300 text-3xl">&times;</button>
            </div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4">
                <input type="hidden" id="p-id-edit">
                <div class="col-span-2">
                    <label class="label-gamil">Número do Pedido</label>
                    <input id="p-numero" required type="text" class="input-gamil">
                </div>
                <div class="col-span-2">
                    <label class="label-gamil">Cliente</label>
                    <select id="p-cliente-select" required class="input-gamil"></select>
                </div>
                <div><label class="label-gamil">Qtd Total</label><input id="p-qtd" required type="number" class="input-gamil"></div>
                <div><label class="label-gamil">Artigo</label><input id="p-art" required type="text" class="input-gamil"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" required type="date" class="input-gamil"></div>
                <div><label class="label-gamil">Previsão Saída</label><input id="p-saida" required type="date" class="input-gamil"></div>
                <button type="submit" class="col-span-2 bg-gamil text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl mt-4">Guardar no Sistema</button>
            </form>
        </div>
    </div>

    <div id="modal-update" class="hidden fixed inset-0 bg-blue-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl">
            <h3 id="update-title" class="text-lg font-black text-slate-800 uppercase mb-6 text-center italic"></h3>
            <input type="hidden" id="update-id">
            <div class="space-y-6">
                <div>
                    <label class="label-gamil">Responsável pelo Turno</label>
                    <select id="update-chefe" class="input-gamil">
                        <optgroup label="Direção e Liderança">
                            <option value="Eduardo Pereira">Eduardo Pereira</option>
                            <option value="José Pedro">José Pedro</option>
                        </optgroup>
                        <optgroup label="Chefes de Equipa">
                            <option value="José Castro">José Castro</option>
                            <option value="Luís Silva">Luís Silva</option>
                            <option value="Paulo Abreu">Paulo Abreu</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label class="label-gamil">Percentagem: <span id="perc-val" class="text-blue-600 text-lg">0</span>%</label>
                    <input type="range" id="update-perc" min="0" max="100" step="5" class="w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="document.getElementById('perc-val').innerText = this.value">
                </div>
                <button onclick="salvarUpdate()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Confirmar Progresso</button>
                <button onclick="fecharModal()" class="w-full text-slate-400 font-bold text-[10px] uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 uppercase italic mb-6">Registo de Clientes Gamil</h3>
            <form id="form-cliente" class="space-y-4">
                <div><label class="label-gamil">Código Interno</label><input id="c-cod" required type="text" class="input-gamil" placeholder="Ex: 1050"></div>
                <div><label class="label-gamil">Nome Empresa</label><input id="c-nome" required type="text" class="input-gamil"></div>
                <button type="submit" class="w-full bg-gamil text-white py-4 rounded-xl font-black uppercase shadow-lg">Salvar Cliente</button>
                <button type="button" onclick="fecharModal()" class="w-full text-slate-400 font-bold text-xs uppercase pt-4">Fechar Janela</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_producao");
        const colClientes = collection(db, "clientes_gamil");

        // SEGURANÇA
        window.verificarAcesso = (callback) => {
            const pass = prompt("Introduza a senha de acesso:");
            if(pass === "eduardo1234") callback();
            else alert("Acesso negado!");
        };

        window.abrirModalPedido = () => {
            document.getElementById('modal-pedido-titulo').innerText = "Lançar Pedido";
            document.getElementById('p-id-edit').value = "";
            document.getElementById('form-pedido').reset();
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        window.fecharModal = () => document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));

        // CRUD CLIENTES
        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(colClientes, { codigo: document.getElementById('c-cod').value, nome: document.getElementById('c-nome').value.toUpperCase() });
            e.target.reset(); alert("Cliente registado com sucesso!");
        };

        onSnapshot(colClientes, (snap) => {
            const select = document.getElementById('p-cliente-select');
            select.innerHTML = '<option value="">-- SELECIONE O CLIENTE --</option>';
            snap.forEach(d => {
                const c = d.data();
                select.innerHTML += `<option value="${c.codigo} - ${c.nome}">${c.codigo} | ${c.nome}</option>`;
            });
        });

        // CRUD PEDIDOS (SAVE/UPDATE)
        document.getElementById('form-pedido').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id-edit').value;
            const data = {
                numero: document.getElementById('p-numero').value.toUpperCase(),
                cliente: document.getElementById('p-cliente-select').value,
                qtd: document.getElementById('p-qtd').value,
                artigo: document.getElementById('p-art').value.toUpperCase(),
                entrada: document.getElementById('p-entrada').value,
                saida: document.getElementById('p-saida').value
            };

            if(id) {
                await updateDoc(doc(db, "pedidos_producao", id), data);
            } else {
                await addDoc(colPedidos, { ...data, progresso: 0, historico: [], timestamp: new Date() });
            }
            fecharModal();
        };

        window.editarPedido = (id, data) => {
            verificarAcesso(() => {
                const p = JSON.parse(decodeURIComponent(data));
                document.getElementById('modal-pedido-titulo').innerText = "Editar Pedido";
                document.getElementById('p-id-edit').value = id;
                document.getElementById('p-numero').value = p.numero;
                document.getElementById('p-cliente-select').value = p.cliente;
                document.getElementById('p-qtd').value = p.qtd;
                document.getElementById('p-art').value = p.artigo;
                document.getElementById('p-entrada').value = p.entrada;
                document.getElementById('p-saida').value = p.saida;
                document.getElementById('modal-pedido').classList.remove('hidden');
            });
        };

        // UPDATE PROGRESSO
        window.prepararUpdate = (id, nome, perc) => {
            document.getElementById('update-id').value = id;
            document.getElementById('update-title').innerText = nome;
            document.getElementById('update-perc').value = perc;
            document.getElementById('perc-val').innerText = perc;
            document.getElementById('modal-update').classList.remove('hidden');
        };

        window.salvarUpdate = async () => {
            const id = document.getElementById('update-id').value;
            const perc = parseInt(document.getElementById('update-perc').value);
            const chefe = document.getElementById('update-chefe').value;
            const logEntry = `${chefe} ➔ ${perc}% (${new Date().toLocaleDateString('pt-PT')} ${new Date().toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'})})`;

            await updateDoc(doc(db, "pedidos_producao", id), {
                progresso: perc,
                ultimo_chefe: chefe,
                historico: arrayUnion(logEntry)
            });
            fecharModal();
        };

        // RENDERIZAÇÃO
        onSnapshot(query(colPedidos, orderBy("timestamp", "desc")), (snapshot) => {
            const container = document.getElementById('container-pedidos');
            container.innerHTML = "";
            snapshot.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                
                // Cor Dinâmica
                let colorClass = "bg-red-500";
                if(p.progresso > 30) colorClass = "bg-orange-400";
                if(p.progresso > 70) colorClass = "bg-blue-600";
                if(p.progresso == 100) colorClass = "bg-green-500";

                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] p-6 shadow-sm border border-slate-200 relative group";
                
                const dataString = encodeURIComponent(JSON.stringify(p));

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-tight italic">PEDIDO: ${p.numero}</span>
                            <h4 class="text-lg font-black text-slate-800 leading-tight uppercase truncate max-w-[200px]">${p.cliente}</h4>
                        </div>
                        <div class="flex space-x-1">
                            <button onclick="editarPedido('${id}', '${dataString}')" class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:text-blue-600 transition-colors"><i class="fas fa-edit text-xs"></i></button>
                            <button onclick="verificarAcesso(() => apagarPedido('${id}'))" class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                            <span class="text-[8px] font-bold text-slate-400 block uppercase mb-1">Entrada</span>
                            <span class="text-[10px] font-black text-slate-600 block italic">${p.entrada}</span>
                        </div>
                        <div class="bg-orange-50 p-3 rounded-2xl border border-orange-100">
                            <span class="text-[8px] font-bold text-orange-400 block uppercase mb-1">Previsão</span>
                            <span class="text-[10px] font-black text-orange-600 block italic">${p.saida}</span>
                        </div>
                    </div>

                    <div class="mb-6">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-[9px] font-black text-slate-400 uppercase italic">Andamento</span>
                            <span class="text-2xl font-black text-slate-800">${p.progresso}%</span>
                        </div>
                        <div class="w-full h-4 bg-slate-100 rounded-full overflow-hidden">
                            <div class="progress-bar h-full ${colorClass}" style="width: ${p.progresso}%"></div>
                        </div>
                    </div>

                    <div class="bg-slate-50/50 p-3 rounded-xl mb-6">
                        <p class="text-[8px] font-black text-slate-400 uppercase mb-2">Últimas Atualizações:</p>
                        <div class="space-y-1">
                            ${(p.historico || []).slice(-2).map(log => `<div class="text-[9px] font-semibold text-slate-500">● ${log}</div>`).join('') || '<div class="text-[9px] italic text-slate-300">Sem registo inicial</div>'}
                        </div>
                    </div>

                    <button onclick="prepararUpdate('${id}', '${p.cliente}', ${p.progresso})" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-blue-600 transition-all shadow-lg active:scale-95">
                        <i class="fas fa-tasks mr-2"></i> Reportar Progresso
                    </button>
                `;
                container.appendChild(card);
            });
        });

        window.apagarPedido = async (id) => {
            if(confirm("Deseja eliminar permanentemente este registo?")) await deleteDoc(doc(db, "pedidos_producao", id));
        };
    </script>
</body>
</html>
