<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeamento Gamil v2.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --gamil-blue: #002D5A; --gamil-light: #00B0F0; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-gamil { background-color: var(--gamil-blue); }
        .bg-sofia { background-color: var(--gamil-light); }
        .input-gamil { @apply w-full bg-white border border-slate-200 rounded-lg p-2 font-semibold text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none uppercase text-xs; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-500 mb-1; }
        .table-container { overflow-x: auto; overflow-y: auto; flex: 1; }
        th { @apply p-3 text-[10px] font-black uppercase tracking-wider sticky top-0 z-20 text-white border-x border-white/10; }
        td { @apply p-2 text-[11px] font-bold border-b border-slate-100 whitespace-nowrap; }
        .admin-only, .sofia-only { display: none; }
        @media print { .no-print { display: none !important; } body { display: block; } .table-container { overflow: visible; } }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-6 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil Logo" class="w-32 mx-auto mb-4" onerror="this.style.display='none'">
            <h1 class="text-xs font-black tracking-widest uppercase text-blue-200">Planeamento Geral</h1>
        </div>
        <nav class="p-4 flex-1 space-y-4">
            <div id="user-info" class="p-4 bg-white/5 rounded-xl border border-white/10 text-center">
                <p id="nome-logado" class="text-xs font-black italic uppercase">Visitante</p>
                <button onclick="logout()" class="text-[9px] font-bold text-red-400 mt-2 uppercase underline">Sair</button>
            </div>
            <button onclick="abrirModalCliente()" class="admin-only sofia-only w-full p-3 hover:bg-white/5 rounded-xl flex items-center space-x-3 text-slate-400 transition text-xs font-bold">
                <i class="fas fa-users"></i> <span>Base de Clientes</span>
            </button>
            <button onclick="window.print()" class="w-full p-3 hover:bg-white/5 rounded-xl flex items-center space-x-3 text-slate-400 transition text-xs font-bold">
                <i class="fas fa-print"></i> <span>Imprimir Lista</span>
            </button>
        </nav>
        <div class="p-4 opacity-10 text-[8px] text-center uppercase tracking-widest">Dev: Hamilton Junior</div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b px-6 flex justify-between items-center shadow-sm no-print">
            <h2 class="text-sm font-black text-slate-800 uppercase italic">R.030.01 - Fluxo de Produção</h2>
            <div class="flex space-x-2">
                <button onclick="abrirModalPedido()" class="sofia-only bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-md transition-all">
                    <i class="fas fa-plus mr-1"></i> Sofia: Novo Pedido
                </button>
            </div>
        </header>

        <div class="table-container bg-white">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-gamil">
                        <th class="bg-sofia w-20">Nº Cliente</th>
                        <th class="bg-sofia w-20">Pedido</th>
                        <th class="bg-sofia">Nome Cliente</th>
                        <th class="bg-sofia w-28">Entrada</th>
                        <th class="bg-sofia w-24">Peso (Kg)</th>
                        <th class="bg-blue-600 w-28 italic">Montagem</th>
                        <th class="bg-blue-600 w-28 italic">Desmontagem</th>
                        <th class="bg-green-600 w-24 italic">Local</th>
                        <th class="bg-blue-800">Observações</th>
                        <th class="bg-blue-900 w-28 italic">Expedição</th>
                        <th class="bg-blue-900 w-16 italic">Pesar</th>
                        <th class="bg-blue-900 w-16 italic">Furos</th>
                        <th class="no-print bg-slate-800 w-20 italic">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-login" class="fixed inset-0 bg-gamil z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-10 text-center shadow-2xl">
            <img src="logo-gamil.png" class="w-40 mx-auto mb-8">
            <select id="login-user" class="input-gamil mb-4 h-12">
                <option value="Visitante">Apenas Consulta</option>
                <option value="Sofia">Sofia (Entrada Material)</option>
                <option value="Eduardo Pereira">Eduardo Pereira (Planeamento)</option>
                <option value="José Pedro">José Pedro (Direção)</option>
                <option value="José Castro">José Castro (Turno Manhã)</option>
                <option value="Luís Silva">Luís Silva (Turno Noite)</option>
            </select>
            <input type="password" id="login-pass" placeholder="PASSWORD" class="input-gamil mb-6 h-12">
            <button onclick="tentarLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-xl hover:bg-blue-700 transition-all">Entrar</button>
        </div>
    </div>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-6 bg-sofia text-white flex justify-between items-center">
                <h3 class="font-black uppercase italic">Sofia: Registo de Entrada</h3>
                <button onclick="fecharModal()" class="text-2xl">&times;</button>
            </div>
            <form id="form-pedido-sofia" class="p-8 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="label-gamil">Nº Cliente</label><input id="s-num-cli" required type="text" class="input-gamil" readonly></div>
                    <div><label class="label-gamil">Pedido</label><input id="s-pedido" required type="text" class="input-gamil"></div>
                </div>
                <div><label class="label-gamil">Selecionar Cliente</label><select id="s-cliente-select" required class="input-gamil" onchange="document.getElementById('s-num-cli').value = this.value.split(' - ')[0]"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="label-gamil">Data Entrada</label><input id="s-entrada" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil">Peso (Kg)</label><input id="s-peso" type="number" step="0.01" class="input-gamil"></div>
                </div>
                <button type="submit" class="w-full bg-sofia text-white py-4 rounded-xl font-black uppercase mt-4 shadow-lg">Lançar para o Eduardo</button>
            </form>
        </div>
    </div>

    <div id="modal-eduardo" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden">
            <div class="p-6 bg-gamil text-white flex justify-between items-center">
                <h3 class="font-black uppercase italic">Eduardo: Planeamento Produção</h3>
                <button onclick="fecharModal()" class="text-2xl">&times;</button>
            </div>
            <form id="form-pedido-eduardo" class="p-8 grid grid-cols-2 gap-4">
                <input type="hidden" id="e-id">
                <div class="col-span-2 text-xs font-bold text-slate-400 pb-2 border-b">Cliente: <span id="e-cliente-nome" class="text-slate-800"></span></div>
                <div><label class="label-gamil">Data Montagem</label><input id="e-montagem" type="date" class="input-gamil"></div>
                <div><label class="label-gamil">Data Desmontagem</label><input id="e-desmontagem" type="date" class="input-gamil"></div>
                <div><label class="label-gamil">Local</label><input id="e-local" type="text" class="input-gamil bg-green-50"></div>
                <div><label class="label-gamil">Expedição</label><input id="e-expedicao" type="date" class="input-gamil"></div>
                <div class="col-span-2"><label class="label-gamil">Observações</label><textarea id="e-obs" class="input-gamil h-20 uppercase"></textarea></div>
                <div class="grid grid-cols-2 gap-4 col-span-2">
                    <div><label class="label-gamil">Pesar?</label><select id="e-pesar" class="input-gamil"><option value="">NÃO</option><option value="SIM">SIM</option></select></div>
                    <div><label class="label-gamil">Furos?</label><select id="e-furos" class="input-gamil"><option value="">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>
                <button type="submit" class="col-span-2 bg-gamil text-white py-4 rounded-xl font-black uppercase mt-4">Atualizar Produção</button>
            </form>
        </div>
    </div>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 uppercase italic mb-6">Registo Cliente</h3>
            <form id="form-cliente" class="space-y-4">
                <input id="c-cod" required type="text" class="input-gamil" placeholder="CÓDIGO (Ex: 2284)">
                <input id="c-nome" required type="text" class="input-gamil" placeholder="NOME EMPRESA">
                <button type="submit" class="w-full bg-gamil text-white py-4 rounded-xl font-black text-xs uppercase shadow-md">Salvar</button>
                <button type="button" onclick="fecharModal()" class="w-full text-slate-400 font-bold text-xs uppercase pt-2 italic">Fechar</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_v3");
        const colClientes = collection(db, "clientes_gamil");

        // LOGIN SYSTEM v3
        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = {
                "Sofia": { pass: "gamil$$26", canEdit: false, isSofia: true },
                "Eduardo Pereira": { pass: "gamil$$26", canEdit: true, isSofia: false },
                "José Pedro": { pass: "gamil$$26", canEdit: true, isSofia: true },
                "José Castro": { pass: "jose1234", canEdit: false, isSofia: false },
                "Luís Silva": { pass: "luis1234", canEdit: false, isSofia: false }
            };

            if (user === "Visitante" || (creds[user] && pass === creds[user].pass)) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_sofia', creds[user]?.isSofia || false);
                localStorage.setItem('gamil_admin', creds[user]?.canEdit || false);
                checkPermissions();
            } else alert("Acesso Negado!");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('nome-logado').innerText = user;
            
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isSofia = localStorage.getItem('gamil_sofia') === 'true';
            
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            document.querySelectorAll('.sofia-only').forEach(el => el.style.display = isSofia ? 'block' : 'none');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };

        // CLIENTES
        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(colClientes, { codigo: document.getElementById('c-cod').value, nome: document.getElementById('c-nome').value.toUpperCase() });
            e.target.reset(); fecharModal();
        };

        onSnapshot(colClientes, (snap) => {
            const s = document.getElementById('s-cliente-select');
            s.innerHTML = '<option value="">-- CLIENTE --</option>';
            snap.forEach(d => { s.innerHTML += `<option value="${d.data().codigo} - ${d.data().nome}">${d.data().codigo} | ${d.data().nome}</option>`; });
        });

        // SOFIA: NOVO PEDIDO
        document.getElementById('form-pedido-sofia').onsubmit = async (e) => {
            e.preventDefault();
            const dataEntrada = document.getElementById('s-entrada').value || new Date().toISOString().split('T')[0];
            await addDoc(colPedidos, {
                numCliente: document.getElementById('s-num-cli').value,
                pedido: document.getElementById('s-pedido').value,
                nomeCliente: document.getElementById('s-cliente-select').value.split(' - ')[1],
                dataEntrada: dataEntrada,
                peso: document.getElementById('s-peso').value,
                montagem: "", desmontagem: "", local: "", expedicao: "", obs: "", pesar: "", furos: "",
                timestamp: new Date()
            });
            e.target.reset(); fecharModal();
        };

        // EDUARDO: EDITAR
        document.getElementById('form-pedido-eduardo').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('e-id').value;
            await updateDoc(doc(db, "pedidos_v3", id), {
                montagem: document.getElementById('e-montagem').value,
                desmontagem: document.getElementById('e-desmontagem').value,
                local: document.getElementById('e-local').value.toUpperCase(),
                expedicao: document.getElementById('e-expedicao').value,
                obs: document.getElementById('e-obs').value.toUpperCase(),
                pesar: document.getElementById('e-pesar').value,
                furos: document.getElementById('e-furos').value
            });
            fecharModal();
        };

        // RENDER TABELA (Ordenada por Data de Montagem)
        onSnapshot(query(colPedidos), (snap) => {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';

            let pedidos = [];
            snap.forEach(d => pedidos.push({ id: d.id, ...d.data() }));
            
            // Ordenação: Itens sem data de montagem ficam no fim, os com data ficam ordenados
            pedidos.sort((a, b) => {
                if (!a.montagem) return 1;
                if (!b.montagem) return -1;
                return new Date(a.montagem) - new Date(b.montagem);
            });

            pedidos.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="bg-blue-50/50 text-center">${p.numCliente}</td>
                    <td class="bg-blue-50 text-center font-black">${p.pedido}</td>
                    <td class="font-black text-slate-800">${p.nomeCliente}</td>
                    <td class="text-center italic text-slate-400">${p.dataEntrada}</td>
                    <td class="text-center">${p.peso || '-'}</td>
                    <td class="text-center font-black text-blue-700">${p.montagem || '-'}</td>
                    <td class="text-center font-black text-blue-500">${p.desmontagem || '-'}</td>
                    <td class="text-center bg-green-500 text-white font-black">${p.local || ''}</td>
                    <td class="text-[10px] text-slate-500 italic max-w-xs truncate">${p.obs || ''}</td>
                    <td class="text-center font-black text-blue-900">${p.expedicao || '-'}</td>
                    <td class="text-center font-black text-blue-900">${p.pesar}</td>
                    <td class="text-center font-black text-blue-900">${p.furos}</td>
                    <td class="no-print text-center flex space-x-1 justify-center">
                        <button onclick="preparaEdicao('${p.id}', '${encodeURIComponent(JSON.stringify(p))}')" class="admin-only text-blue-400 hover:text-blue-600 p-1"><i class="fas fa-edit"></i></button>
                        <button onclick="apagar('${p.id}')" class="admin-only text-red-200 hover:text-red-500 p-1"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
            checkPermissions();
        });

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('e-id').value = id;
            document.getElementById('e-cliente-nome').innerText = p.nomeCliente;
            document.getElementById('e-montagem').value = p.montagem;
            document.getElementById('e-desmontagem').value = p.desmontagem;
            document.getElementById('e-local').value = p.local;
            document.getElementById('e-expedicao').value = p.expedicao;
            document.getElementById('e-obs').value = p.obs;
            document.getElementById('e-pesar').value = p.pesar;
            document.getElementById('e-furos').value = p.furos;
            document.getElementById('modal-eduardo').classList.remove('hidden');
        };

        window.apagar = async (id) => { if(confirm("Apagar registo?")) await deleteDoc(doc(db, "pedidos_v3", id)); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => {
            document.getElementById('s-entrada').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal-pedido').classList.remove('hidden');
        };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');

        checkPermissions();
    </script>
</body>
</html>
