<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeamento Gamil v3.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --gamil-blue: #002D5A; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-gamil { background-color: var(--gamil-blue); }
        .main-content { overflow-y: auto; flex: 1; padding: 2rem; }
        
        /* ESTRUTURA LONGITUDINAL PROFISSIONAL */
        .list-header { @apply flex items-center px-6 py-3 text-[10px] font-black uppercase text-slate-400 tracking-widest; }
        .pedido-card { 
            @apply bg-white rounded-2xl mb-3 flex items-center shadow-sm border border-slate-200 transition-all hover:shadow-md relative overflow-hidden;
            min-height: 80px;
        }
        .status-indicator { width: 8px; align-self: stretch; shrink-0; }
        
        /* COLUNAS FIXAS PARA NÃO AMONTOAR */
        .col-ref { width: 140px; shrink-0; }
        .col-cliente { flex: 2; min-width: 250px; }
        .col-data { width: 110px; shrink-0; text-align: center; }
        .col-peso { width: 100px; shrink-0; text-align: center; }
        .col-extras { width: 130px; shrink-0; text-align: center; }
        .col-local { width: 120px; shrink-0; text-align: center; }
        .col-progresso { width: 150px; shrink-0; padding-right: 1rem; }
        .col-acoes { width: 100px; shrink-0; text-align: right; padding-right: 1.5rem; }

        .admin-view, .auth-element { display: none; }
        .input-gamil { @apply w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-4 focus:ring-blue-500/10; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-400 mb-1 ml-1; }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-40 mx-auto mb-2" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-[0.3em] uppercase text-blue-300 italic">Gamil Hub v3.4</h1>
        </div>
        <nav class="p-4 flex-1 space-y-3">
            <div id="user-info" class="p-4 bg-white/5 rounded-2xl border border-white/10 text-center mb-6">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-white">Visitante</p>
                <button onclick="logout()" class="text-[9px] font-bold text-red-400 mt-2 uppercase underline">Sair do Sistema</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-2xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg hover:bg-blue-700 transition-all transform hover:scale-105">
                <i class="fas fa-plus-circle"></i> <span>Novo Registo</span>
            </button>
            <button onclick="abrirModalCliente()" class="auth-element w-full p-3 hover:bg-white/5 rounded-xl flex items-center space-x-3 text-slate-400 text-xs font-bold transition">
                <i class="fas fa-users"></i> <span>Base de Clientes</span>
            </button>
        </nav>
        <div class="p-4 opacity-10 text-[7px] text-center uppercase tracking-widest">Dev: Hamilton Junior</div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white border-b px-10 flex justify-between items-center sticky top-0 z-20">
            <h2 class="text-sm font-black text-slate-800 uppercase italic tracking-tighter">Planeamento Geral de Produção</h2>
            <div id="stats-header" class="text-[10px] font-black text-blue-600 uppercase italic tracking-widest">A Sincronizar Cloud...</div>
        </header>

        <div class="px-8 mt-6 no-print">
            <div class="list-header">
                <div class="col-ref ml-2">Pedido / Ref</div>
                <div class="col-cliente">Cliente Gamil</div>
                <div class="col-data">Entrada</div>
                <div class="col-peso">Peso</div>
                <div class="col-extras">Serviços</div>
                <div class="admin-view col-data">Montagem</div>
                <div class="admin-view col-data">Entrega</div>
                <div class="admin-view col-local">Local</div>
                <div class="col-progresso">Progresso</div>
                <div class="col-acoes">Ações</div>
            </div>
        </div>

        <div id="container-pedidos" class="main-content pt-0">
            </div>
    </main>

    <div id="modal-login" class="fixed inset-0 bg-gamil z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-10 text-center shadow-2xl border-t-8 border-blue-500">
            <img src="logo-gamil.png" class="w-40 mx-auto mb-8">
            <h3 class="text-lg font-black text-slate-800 uppercase italic mb-8">Acesso Restrito</h3>
            <select id="login-user" class="input-gamil mb-4 h-12 text-center font-bold">
                <option value="Visitante">Apenas Visualizar</option>
                <option value="Sofia">Sofia (Entrada)</option>
                <option value="Eduardo Pereira">Eduardo Pereira (Admin)</option>
                <option value="José Pedro">José Pedro (Diretor)</option>
                <option value="José Castro">José Castro (Chefe)</option>
                <option value="Luís Silva">Luís Silva (Chefe)</option>
                <option value="Paulo Abreu">Paulo Abreu (Chefe)</option>
            </select>
            <input type="password" id="login-pass" placeholder="SENHA" class="input-gamil mb-6 h-12 text-center tracking-widest">
            <button onclick="tentarLogin()" class="w-full bg-[#002D5A] text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-black transition-all">Autenticar</button>
        </div>
    </div>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-gamil text-white flex justify-between items-center font-black uppercase italic text-xs">
                <span id="modal-titulo">Gestão de Produção</span>
                <button onclick="fecharModal()" class="text-2xl">&times;</button>
            </div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 overflow-y-auto max-h-[80vh]">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Cliente</label><select id="p-cliente" required class="input-gamil"></select></div>
                <div><label class="label-gamil">Nº Pedido</label><input id="p-pedido" required type="text" class="input-gamil"></div>
                <div><label class="label-gamil">Prioridade</label><select id="p-prio" class="input-gamil"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="label-gamil">Peso (Kg)</label><input id="p-peso" required type="number" step="0.01" class="input-gamil"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" type="date" class="input-gamil"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                    <div><label class="label-gamil">Furos?</label><select id="p-furos" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>

                <div class="admin-view col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2">
                    <div><label class="label-gamil text-blue-600">Montagem</label><input id="p-montagem" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil text-blue-600">Entrega</label><input id="p-saida" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil text-blue-600">Localização</label><input id="p-local" type="text" class="input-gamil"></div>
                    <div><label class="label-gamil text-blue-600">Progresso (%)</label><input id="p-perc" type="number" min="0" max="100" class="input-gamil"></div>
                </div>
                <button type="submit" class="col-span-2 bg-[#002D5A] text-white py-4 rounded-2xl font-black uppercase shadow-lg mt-4 transition-all hover:bg-black">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl flex flex-col h-[70vh]">
            <h3 class="font-black uppercase italic mb-6">Base de Dados de Clientes</h3>
            <form id="form-cliente" class="mb-6 space-y-3">
                <input id="c-cod" required type="text" class="input-gamil" placeholder="CÓDIGO">
                <input id="c-nome" required type="text" class="input-gamil" placeholder="NOME EMPRESA">
                <button type="submit" class="w-full bg-[#002D5A] text-white py-3 rounded-xl font-black text-[10px] uppercase">Adicionar</button>
            </form>
            <div id="lista-clientes-db" class="flex-1 overflow-y-auto space-y-2 italic text-[10px] font-bold text-slate-400"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                localStorage.setItem('gamil_auth', (user !== "Visitante"));
                checkPermissions();
            } else alert("Senha Incorreta!");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isAuth = localStorage.getItem('gamil_auth') === 'true';
            document.querySelectorAll('.admin-view').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            document.querySelectorAll('.auth-element').forEach(el => el.style.display = isAuth ? 'block' : 'none');
            if(isAdmin) document.querySelectorAll('form .admin-view').forEach(el => el.style.display = 'grid');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };

        // CLIENTES
        onSnapshot(colClientes, (snap) => {
            const select = document.getElementById('p-cliente');
            const listaDB = document.getElementById('lista-clientes-db');
            select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>';
            listaDB.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                select.innerHTML += `<option value="${c.codigo} | ${c.nome}">${c.codigo} - ${c.nome}</option>`;
                listaDB.innerHTML += `<div class="p-2 border-b">● ${c.codigo} - ${c.nome}</div>`;
            });
        });
        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(colClientes, { codigo: document.getElementById('c-cod').value, nome: document.getElementById('c-nome').value.toUpperCase() });
            e.target.reset();
        };

        // PEDIDOS
        document.getElementById('form-pedido').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                cliente: document.getElementById('p-cliente').value,
                pedido: document.getElementById('p-pedido').value,
                prio: document.getElementById('p-prio').value,
                peso: document.getElementById('p-peso').value,
                entrada: document.getElementById('p-entrada').value,
                pesar: document.getElementById('p-pesar').value,
                furos: document.getElementById('p-furos').value,
                montagem: document.getElementById('p-montagem').value,
                saida: document.getElementById('p-saida').value,
                local: document.getElementById('p-local').value.toUpperCase(),
                progresso: parseInt(document.getElementById('p-perc').value) || 0,
                timestamp: new Date()
            };
            if (id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data);
            else await addDoc(colPedidos, data);
            fecharModal();
        };

        onSnapshot(query(colPedidos, orderBy("timestamp", "desc")), (snap) => {
            const container = document.getElementById('container-pedidos');
            container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const isAuth = localStorage.getItem('gamil_auth') === 'true';

            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const perc = p.progresso || 0;
                const prioColor = { alta: 'bg-red-500', media: 'bg-orange-400', baixa: 'bg-green-500' }[p.prio] || 'bg-slate-300';

                const card = document.createElement('div');
                card.className = "pedido-card";
                card.innerHTML = `
                    <div class="status-indicator ${prioColor}"></div>
                    <div class="col-ref px-4">
                        <span class="text-blue-600 font-black italic uppercase text-xs">#${p.pedido}</span>
                    </div>
                    <div class="col-cliente">
                        <h4 class="text-xs font-black uppercase text-slate-800 truncate">${p.cliente}</h4>
                    </div>
                    <div class="col-data text-[10px] font-bold text-slate-400 italic">${p.entrada}</div>
                    <div class="col-peso text-xs font-black text-slate-600">${p.peso}kg</div>
                    <div class="col-extras text-[10px]">
                        <span class="${p.pesar === 'SIM' ? 'text-orange-600' : 'text-slate-200'} font-black">PESAR</span> | 
                        <span class="${p.furos === 'SIM' ? 'text-orange-600' : 'text-slate-200'} font-black">FUROS</span>
                    </div>
                    
                    <div class="admin-view col-data text-[10px] font-black text-blue-800">${p.montagem || '--'}</div>
                    <div class="admin-view col-data text-[10px] font-black text-orange-600">${p.saida || '--'}</div>
                    <div class="admin-view col-local">
                        <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-tighter">${p.local || '--'}</span>
                    </div>

                    <div class="col-progresso">
                        <div class="flex items-center space-x-2">
                            <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full ${perc === 100 ? 'bg-green-500' : 'bg-blue-600'}" style="width: ${perc}%"></div>
                            </div>
                            <span class="text-[9px] font-black">${perc}%</span>
                        </div>
                    </div>
                    
                    <div class="col-acoes">
                        <button onclick="editarPedido('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="${isAuth ? 'inline-block' : 'hidden'} text-orange-400 hover:text-orange-600 p-2 transition-all"><i class="fas fa-pencil-alt"></i></button>
                        <button onclick="apagar('${id}')" class="${isAdmin ? 'inline-block' : 'hidden'} text-slate-200 hover:text-red-500 p-2 transition-all"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
            checkPermissions();
            document.getElementById('stats-header').innerText = `${snap.size} Pedidos Ativos`;
        });

        window.editarPedido = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id;
            document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido;
            document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-entrada').value = p.entrada;
            document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos;
            document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida;
            document.getElementById('p-local').value = p.local;
            document.getElementById('p-perc').value = p.progresso;
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.apagar = async (id) => { if(confirm("Apagar permanentemente?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        checkPermissions();
    </script>
</body>
</html>
