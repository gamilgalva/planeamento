<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamil Hub v10 | Matrix Responsive Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="clientes_base.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --gamil-blue: #1a2a3a; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: row; overflow: hidden; margin: 0; }
        
        /* SIDEBAR ADAPTATIVA */
        .sidebar { width: 260px; background-color: var(--gamil-blue); color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; z-index: 50; transition: transform 0.3s ease; }
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #f1f5f9; position: relative; height: 100vh; }
        .main-content { flex: 1; overflow: auto; padding: 20px; }

        /* TABELA MATRIX */
        .gamil-table { min-width: 1350px; border-separate: border-spacing-y(12px); width: 100%; border-collapse: separate; table-layout: fixed; }
        .gamil-thead th { @apply text-[10px] font-black uppercase text-slate-400 tracking-widest px-4 py-2 text-left; }
        .pedido-row td { @apply py-5 px-4 first:rounded-l-2xl last:rounded-r-2xl border-y border-slate-100 bg-white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* CONTROLO DE FONTES HAMILTON */
        .pos-text { font-size: 10px !important; @apply font-black text-slate-400 text-center; width: 45px; }
        .ref-text { font-size: 10px !important; color: #2563eb !important; font-weight: 800 !important; @apply uppercase italic; }
        .client-text { font-size: 10px !important; font-weight: 800 !important; @apply uppercase text-slate-800 tracking-tighter; }
        .other-row-text { font-size: 10px !important; @apply font-bold text-slate-600; }
        .status-strip { width: 5px; height: 35px; border-radius: 20px; }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
            .mobile-header-btn { display: block !important; }
        }

        /* LOGIN DESIGN ORIGINAL */
        #modal-login { position: fixed; inset: 0; background-color: var(--gamil-blue); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 380px; padding: 3rem; border-radius: 2.5rem; text-align: center; border-top: 8px solid #3b82f6; }

        /* VISIBILIDADE */
        .admin-view, .encarregado-view, .sofia-view, .auth-element { display: none !important; }
        body.admin-mode .admin-view, body.admin-mode .encarregado-view, body.encarregado-mode .encarregado-view, body.sofia-mode .sofia-view { display: table-cell !important; }
        body.admin-mode th.admin-view, body.admin-mode th.encarregado-view, body.encarregado-mode th.encarregado-view, body.sofia-mode th.sofia-view { display: table-cell !important; }
        body.admin-mode .auth-element, body.sofia-mode .auth-element { display: block !important; }

        .modal-input { @apply w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-4 focus:ring-blue-100; }
        .btn-premium-gamil { @apply w-full bg-[#1a2a3a] hover:bg-black text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 tracking-widest; }

        @media print {
            body { display: block; background: white; }
            .sidebar, .no-print, header, button { display: none !important; }
            .main-content { padding: 0; }
            .gamil-table { min-width: 100%; border-spacing: 0 5px; }
            .pedido-row td { border: 1px solid #eee; font-size: 9px; }
        }
    </style>
</head>
<body>

    <div id="modal-login" class="no-print">
        <div class="login-card">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-6" onerror="this.style.display='none'">
            <div class="space-y-4">
                <select id="login-user" class="modal-input bg-white border-slate-300">
                    <option value="Visitante">Consulta</option>
                    <option value="Sofia">Sofia Meira</option>
                    <option value="Eduardo Pereira">Eduardo Pereira</option>
                    <option value="José Pedro">José Pedro</option>
                    <option value="José Castro">José Castro</option>
                    <option value="Luís Silva">Luís Silva</option>
                    <option value="Paulo Abreu">Paulo Abreu</option>
                </select>
                <input type="password" id="login-pass" placeholder="PASSWORD" class="modal-input bg-white text-center tracking-[0.4em] border-slate-300">
                <button onclick="tentarLogin()" class="btn-premium-gamil bg-blue-600">Entrar no Sistema</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="sidebar no-print">
        <div class="p-8 border-b border-white/10 text-center relative">
            <button onclick="toggleMenu()" class="lg:hidden absolute right-4 top-4 text-white opacity-50"><i class="fas fa-times"></i></button>
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-3" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-widest uppercase text-blue-300">Hub v10 Matrix</h1>
        </div>
        <nav class="p-4 flex-1 space-y-3 overflow-y-auto">
            <div id="user-info" class="p-4 bg-white/5 rounded-2xl text-center mb-4 border border-white/5">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-blue-100">---</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-1">Sair</button>
            </div>
            <button onclick="abrirModalPedido(); toggleMenu();" class="auth-element w-full p-4 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg"><i class="fas fa-plus"></i> <span>Novo Registo</span></button>
            <button onclick="window.print()" class="w-full p-4 bg-white/10 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase"><i class="fas fa-print text-blue-400"></i> <span>Imprimir</span></button>
            <button onclick="abrirModalCliente(); toggleMenu();" class="auth-element w-full p-4 bg-white/5 rounded-xl flex items-center space-x-3 text-slate-300 text-[10px] font-bold transition"><i class="fas fa-users text-blue-400"></i> <span>Clientes</span></button>
        </nav>
    </aside>

    <main class="main-container">
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex justify-between items-center no-print shrink-0">
            <button onclick="toggleMenu()" class="mobile-header-btn hidden text-slate-800 text-2xl mr-4"><i class="fas fa-bars"></i></button>
            <h2 class="text-[10px] lg:text-xs font-black text-slate-800 uppercase italic tracking-widest truncate">Planeamento de Produção</h2>
            <div class="bg-blue-50 px-3 py-1 rounded-full border border-blue-100 italic font-black text-[9px] text-blue-600 uppercase">Live Sync Master</div>
        </header>

        <div class="main-content">
            <table class="gamil-table">
                <thead class="gamil-thead">
                    <tr>
                        <th style="width: 55px">Pos</th><th style="width: 15px"></th><th style="width: 140px">Ref / Pedido</th>
                        <th style="width: 380px">Cliente Gamil</th><th class="text-center" style="width: 110px">Entrada</th>
                        <th class="text-center" style="width: 90px">Peso</th><th class="text-center" style="width: 120px">Serviços</th>
                        <th class="text-center encarregado-view admin-view" style="width: 120px">Montagem</th>
                        <th class="text-center encarregado-view admin-view sofia-view" style="width: 120px">Entrega</th>
                        <th class="text-center" style="width: 180px">Progresso</th>
                        <th class="admin-view" style="width: 250px">Observações</th>
                        <th class="text-right pr-6 no-print" style="width: 120px">Ações</th>
                    </tr>
                </thead>
                <tbody id="container-pedidos"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col h-[85vh]">
            <div class="p-6 bg-[#1a2a3a] text-white flex justify-between items-center font-black uppercase text-xs"><span>Gestão</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-2">Cliente</label><select id="p-cliente" required class="modal-input bg-white"></select></div>
                <div><label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-2">Pedido #</label><input id="p-pedido" required type="text" class="modal-input"></div>
                <div><label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-2">Urgência</label><select id="p-prio" class="modal-input"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-2">Ranking</label><input id="p-pos" type="number" class="modal-input"></div>
                <div><label class="block text-[10px] font-black uppercase text-slate-500 mb-1 ml-2">Peso Kg</label><input id="p-peso" required type="number" step="0.01" class="modal-input"></div>
                <button type="submit" class="col-span-2 btn-premium-gamil mt-4">Guardar</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA", authDomain: "planeamento-cf642.firebaseapp.com", projectId: "planeamento-cf642", storageBucket: "planeamento-cf642.firebasestorage.app", messagingSenderId: "438224213205", appId: "1:438224213205:web:2205b5a879ec384c62be5c" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); 
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('active'); };
        const formatarDataBR = (str) => { if (!str || str === '--') return '--'; const pts = str.split('-'); return pts.length === 3 ? `${pts[2]}-${pts[1]}-${pts[0]}` : str; };

        window.tentarLogin = () => {
            const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (u === "Visitante" || (creds[u] && p === creds[u])) {
                localStorage.setItem('gamil_user', u); 
                localStorage.setItem('gamil_admin', (u.includes("Eduardo") || u.includes("Pedro")));
                localStorage.setItem('gamil_sofia', u === "Sofia");
                localStorage.setItem('gamil_encarregado', ["José Castro", "Luís Silva", "Paulo Abreu"].includes(u));
                checkPermissions();
                carregarClientes();
            } else alert("Incorreto");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').style.display = 'flex'; return; }
            document.getElementById('modal-login').style.display = 'none';
            document.getElementById('nome-logado').innerText = user;
            const adm = localStorage.getItem('gamil_admin') === 'true';
            const sof = localStorage.getItem('gamil_sofia') === 'true';
            const enc = localStorage.getItem('gamil_encarregado') === 'true';
            document.body.className = `${adm ? 'admin-mode can-edit' : ''} ${sof ? 'sofia-mode' : ''} ${enc ? 'encarregado-mode' : ''}`;
        };

        function carregarClientes() {
            onSnapshot(query(colClientes, orderBy("nome")), snap => {
                const select = document.getElementById('p-cliente'); if(!select) return;
                let html = '<option value="">-- SELECIONAR --</option>';
                snap.forEach(d => { const c = d.data(); html += `<option value="${c.codigo} | ${c.nome}">${c.codigo} | ${c.nome}</option>`; });
                select.innerHTML = html;
            });
        }

        onSnapshot(query(colPedidos, orderBy("ranking")), snap => {
            const container = document.getElementById('container-pedidos'); container.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const color = p.prio === 'alta' ? 'bg-red-500' : p.prio === 'media' ? 'bg-orange-400' : 'bg-green-500';
                const tr = document.createElement('tr'); tr.className = "pedido-row";
                tr.innerHTML = `
                    <td class="pos-text">${p.ranking || '--'}º</td>
                    <td style="width:15px"><div class="status-strip ${color}"></div></td>
                    <td class="ref-text">#${p.pedido}</td>
                    <td class="client-text">${p.cliente}</td>
                    <td class="text-center italic text-slate-400 other-row-text">${formatarDataBR(p.entrada)}</td>
                    <td class="text-center other-row-text">${p.peso}kg</td>
                    <td class="text-center font-black other-row-text">PES | FUR</td>
                    <td class="admin-view text-center other-row-text">${formatarDataBR(p.montagem)}</td>
                    <td class="admin-view text-center other-row-text">${formatarDataBR(p.saida)}</td>
                    <td class="other-row-text">${p.progresso || 0}%</td>
                    <td class="admin-view other-row-text italic truncate">${p.obs_edu || ''}</td>
                    <td class="text-right pr-6 no-print"><button onclick="logout()" class="text-blue-500"><i class="fas fa-check-circle"></i></button></td>
                `; container.appendChild(tr);
            });
        });

        window.logout = () => { localStorage.clear(); window.location.reload(); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.onload = () => { checkPermissions(); carregarClientes(); };
    </script>
</body>
</html>
