<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Hub v4.2 | Elite Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --gamil-blue: #002D5A; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-gamil { background-color: var(--gamil-blue); }
        
        /* CONTAINER LONGITUDINAL REFINADO */
        .main-content { overflow-y: auto; flex: 1; padding: 30px 40px; }
        
        .header-row { 
            @apply flex items-center px-6 py-4 mb-4 text-[10px] font-black uppercase text-slate-400 tracking-[0.15em] border-b border-slate-200;
            min-width: 1200px; /* Garante que o cabeçalho não encolha */
        }

        .pedido-card { 
            @apply bg-white rounded-2xl mb-4 flex items-center shadow-[0_4px_15px_-3px_rgba(0,0,0,0.07)] border border-white transition-all duration-300 relative;
            min-width: 1200px; /* Garante o layout longitudinal sem quebrar */
            height: 90px;
        }

        .pedido-card:hover { @apply shadow-[0_10px_25px_-5px_rgba(0,0,0,0.12)] -translate-y-1 border-slate-200; }
        .status-bar { width: 8px; height: 100%; position: absolute; left: 0; top: 0; border-radius: 20px 0 0 20px; }

        /* LARGURAS DAS COLUNAS */
        .col-ref { width: 140px; @apply pl-6 shrink-0; }
        .col-cliente { width: 320px; @apply shrink-0 px-4; }
        .col-data { width: 110px; @apply text-center shrink-0; }
        .col-peso { width: 90px; @apply text-center shrink-0; }
        .col-servicos { width: 120px; @apply text-center shrink-0; }
        .col-local { width: 130px; @apply text-center shrink-0; }
        .col-progresso { width: 220px; @apply px-6 shrink-0; }
        .col-obs { flex-grow: 1; @apply px-6 italic text-slate-500 text-[10px] truncate border-l border-slate-50; }
        .col-acoes { width: 120px; @apply flex justify-end pr-8 shrink-0; }

        .badge { @apply px-3 py-1 rounded-full text-[9px] font-extrabold uppercase tracking-tighter border; }
        .badge-blue { @apply bg-blue-50 text-blue-700 border-blue-100; }
        .badge-orange { @apply bg-orange-50 text-orange-600 border-orange-100; }

        .admin-view, .auth-element { display: none; }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-8 border-b border-white/5 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-36 mx-auto mb-4 drop-shadow-lg">
            <h1 class="text-[10px] font-black tracking-[0.4em] uppercase text-blue-300/60">Gamil Hub v4.2</h1>
        </div>
        <nav class="p-5 flex-1 space-y-4">
            <div id="user-info" class="p-5 bg-white/5 rounded-3xl border border-white/10 text-center">
                <p id="nome-logado" class="text-sm font-black uppercase text-white">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-3">Sair do Sistema</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-2xl flex items-center justify-center space-x-3 text-xs font-black uppercase shadow-xl hover:bg-blue-500 transition-all transform active:scale-95">
                <i class="fas fa-plus-circle text-lg"></i> <span>Novo Registo</span>
            </button>
            <button onclick="window.print()" class="w-full p-3 bg-white/5 hover:bg-white/10 rounded-xl flex items-center space-x-3 text-[10px] font-bold uppercase transition">
                <i class="fas fa-print text-blue-400"></i> <span>Imprimir Lista</span>
            </button>
        </nav>
        <div class="p-6 opacity-30 text-[7px] text-center uppercase tracking-widest">Hamilton Junior Dev</div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white border-b border-slate-200 px-10 flex justify-between items-center no-print">
            <h2 class="text-lg font-black text-slate-800 uppercase italic tracking-tighter">Planeamento Geral de Produção</h2>
            <div class="flex items-center space-x-2 bg-green-50 px-4 py-2 rounded-full border border-green-100">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black text-green-700 uppercase tracking-tighter">Sincronizado</span>
            </div>
        </header>

        <div class="main-content">
            <div class="header-row no-print">
                <div class="col-ref">Ref / Pedido</div>
                <div class="col-cliente">Cliente Gamil</div>
                <div class="col-data">Entrada</div>
                <div class="col-peso">Peso</div>
                <div class="col-servicos">Serviços</div>
                <div class="admin-view col-data">Montagem</div>
                <div class="admin-view col-data">Entrega</div>
                <div class="admin-view col-local text-center">Local</div>
                <div class="col-progresso">Progresso / Log</div>
                <div class="col-obs admin-view">Observações Eduardo</div>
                <div class="col-acoes">Ações</div>
            </div>
            
            <div id="container-pedidos">
                </div>
        </div>
    </main>

    <div id="modal-logs" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl">
            <h3 class="text-sm font-black text-slate-800 uppercase mb-6 border-b pb-4 italic">Histórico Completo</h3>
            <div id="logs-content" class="space-y-3 max-h-96 overflow-y-auto"></div>
            <button onclick="fecharModal()" class="w-full mt-6 bg-slate-100 py-4 rounded-2xl text-[10px] font-black uppercase">Fechar</button>
        </div>
    </div>

    <div id="modal-progresso" class="hidden fixed inset-0 bg-blue-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-10 shadow-2xl">
            <h3 id="prog-nome" class="text-sm font-black text-slate-800 uppercase mb-8 text-center italic"></h3>
            <input type="hidden" id="prog-id">
            <div class="space-y-6 text-center">
                <div>
                    <label class="label-gamil">Progresso: <span id="prog-perc-val" class="text-blue-600 font-black text-2xl">0%</span></label>
                    <input type="range" id="prog-range" min="0" max="100" step="5" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600 mt-4" oninput="document.getElementById('prog-perc-val').innerText = this.value + '%'">
                </div>
                <textarea id="prog-obs" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs font-semibold uppercase h-24" placeholder="Alguma ocorrência?"></textarea>
                <button onclick="salvarProgresso()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-blue-700 transition-all">Confirmar Reporte</button>
            </div>
        </div>
    </div>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-gamil text-white flex justify-between items-center font-black uppercase text-xs"><span>Gestão do Pedido</span><button onclick="fecharModal()" class="text-2xl">&times;</button></div>
            <form id="form-pedido" class="p-10 grid grid-cols-2 gap-5 overflow-y-auto max-h-[85vh]">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Cliente</label><select id="p-cliente" required class="w-full bg-slate-50 border p-3 rounded-xl text-xs font-bold uppercase"></select></div>
                <div><label class="label-gamil">Nº Pedido</label><input id="p-pedido" required type="text" class="w-full bg-slate-50 border p-3 rounded-xl text-xs font-bold uppercase"></div>
                <div><label class="label-gamil">Prioridade</label><select id="p-prio" class="w-full bg-slate-50 border p-3 rounded-xl text-xs font-bold uppercase"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="label-gamil">Peso (Kg)</label><input id="p-peso" required type="number" step="0.01" class="w-full bg-slate-50 border p-3 rounded-xl text-xs font-bold uppercase"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" type="date" class="w-full bg-slate-50 border p-3 rounded-xl text-xs font-bold uppercase"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="w-full bg-slate-50 border p-3 rounded-xl text-xs font-bold uppercase"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                    <div><label class="label-gamil">Furos?</label><select id="p-furos" class="w-full bg-slate-50 border p-3 rounded-xl text-xs font-bold uppercase"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>
                <div class="admin-view col-span-2 grid grid-cols-2 gap-5 border-t pt-6 mt-2">
                    <div><label class="label-gamil text-blue-600">Montagem</label><input id="p-montagem" type="date" class="w-full border-blue-100 border p-3 rounded-xl text-xs font-bold uppercase"></div>
                    <div><label class="label-gamil text-orange-600">Entrega</label><input id="p-saida" type="date" class="w-full border-orange-100 border p-3 rounded-xl text-xs font-bold uppercase"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600">Localização</label><input id="p-local" type="text" class="w-full border-blue-100 border p-3 rounded-xl text-xs font-bold uppercase"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600">Observações Eduardo</label><textarea id="p-obs-edu" class="w-full border-blue-100 border p-3 rounded-xl text-xs font-bold uppercase h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl mt-4 active:scale-95 transition-all">Guardar Informação</button>
            </form>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-gamil z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] w-full max-w-sm p-12 text-center shadow-2xl border-t-[10px] border-blue-500">
            <img src="logo-gamil.png" class="w-32 mx-auto mb-10">
            <select id="login-user" class="w-full bg-slate-50 border p-4 rounded-2xl font-bold mb-4 text-sm uppercase">
                <option value="Visitante">Consulta Geral</option>
                <option value="Sofia">Sofia</option>
                <option value="Eduardo Pereira">Eduardo Pereira</option>
                <option value="José Pedro">José Pedro</option>
                <option value="José Castro">José Castro</option>
                <option value="Luís Silva">Luís Silva</option>
                <option value="Paulo Abreu">Paulo Abreu</option>
            </select>
            <input type="password" id="login-pass" placeholder="SENHA" class="w-full bg-slate-50 border p-4 rounded-2xl font-bold mb-8 text-sm text-center tracking-[0.3em]">
            <button onclick="tentarLogin()" class="w-full bg-[#002D5A] text-white py-5 rounded-2xl font-extrabold uppercase shadow-xl hover:bg-black transition-all">Autenticar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro" || user === "Sofia"));
                localStorage.setItem('gamil_view_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                checkPermissions();
            } else alert("Senha Incorreta!");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const viewAdmin = localStorage.getItem('gamil_view_admin') === 'true';
            document.querySelectorAll('.admin-view').forEach(el => el.style.display = viewAdmin ? 'block' : 'none');
            document.querySelectorAll('.auth-element').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            if(viewAdmin) document.querySelectorAll('form .admin-view').forEach(el => el.style.display = 'grid');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };

        onSnapshot(colClientes, (snap) => {
            const select = document.getElementById('p-cliente');
            select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>';
            snap.forEach(d => { select.innerHTML += `<option value="${d.data().codigo} | ${d.data().nome}">${d.data().codigo} - ${d.data().nome}</option>`; });
        });

        document.getElementById('form-pedido').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                cliente: document.getElementById('p-cliente').value,
                pedido: document.getElementById('p-pedido').value,
                prio: document.getElementById('p-prio').value,
                peso: document.getElementById('p-peso').value,
                entrada: document.getElementById('p-entrada').value,
                pesar: document.getElementById('p-pesar').value,
                furos: document.getElementById('p-furos').value,
                montagem: document.getElementById('p-montagem').value,
                saida: document.getElementById('p-saida').value,
                local: document.getElementById('p-local').value.toUpperCase(),
                obs_edu: document.getElementById('p-obs-edu').value.toUpperCase(),
                timestamp: new Date()
            };
            if (id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data);
            else await addDoc(colPedidos, { ...data, progresso: 0, historico: [] });
            fecharModal();
        };

        window.salvarProgresso = async () => {
            const id = document.getElementById('prog-id').value;
            const perc = parseInt(document.getElementById('prog-range').value);
            const obs = document.getElementById('prog-obs').value.toUpperCase();
            const user = localStorage.getItem('gamil_user');
            const log = `${user}: ${perc}% ${obs ? '-> '+obs : ''} [${new Date().toLocaleString('pt-PT')}]`;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { progresso: perc, historico: arrayUnion(log) });
            fecharModal();
        };

        onSnapshot(query(colPedidos, orderBy("timestamp", "desc")), (snap) => {
            const container = document.getElementById('container-pedidos');
            container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const viewAdmin = localStorage.getItem('gamil_view_admin') === 'true';

            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const perc = p.progresso || 0;
                const color = p.prio === 'alta' ? '#ef4444' : p.prio === 'media' ? '#f59e0b' : '#22c55e';
                const lastLog = p.historico && p.historico.length > 0 ? p.historico[p.historico.length - 1] : 'Sem reporte';

                const div = document.createElement('div');
                div.className = "pedido-card";
                div.innerHTML = `
                    <div class="status-bar" style="background: ${color}"></div>
                    <div class="col-ref">
                        <span class="text-blue-600 font-extrabold italic text-xs">#${p.pedido}</span>
                    </div>
                    <div class="col-cliente">
                        <h4 class="text-[11px] font-extrabold uppercase text-slate-700 truncate">${p.cliente}</h4>
                    </div>
                    <div class="col-data">
                        <span class="text-[10px] font-bold text-slate-400 italic">${p.entrada}</span>
                    </div>
                    <div class="col-data">
                        <span class="text-[11px] font-black text-slate-600">${p.peso} KG</span>
                    </div>
                    <div class="col-servicos flex justify-center space-x-1">
                        <span class="badge ${p.pesar === 'SIM' ? 'badge-orange' : 'text-slate-200 border-transparent'}">PES</span>
                        <span class="badge ${p.furos === 'SIM' ? 'badge-orange' : 'text-slate-200 border-transparent'}">FUR</span>
                    </div>
                    
                    <div class="admin-view col-data text-[10px] font-black text-blue-900/80">${p.montagem || '--'}</div>
                    <div class="admin-view col-data text-[10px] font-black text-orange-600">${p.saida || '--'}</div>
                    <div class="admin-view col-local text-center"><span class="badge badge-blue">${p.local || '--'}</span></div>

                    <div class="col-progresso cursor-pointer" onclick='verLogs(${JSON.stringify(p.historico)})'>
                        <div class="flex items-center space-x-2">
                            <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                <div class="h-full bg-blue-600 transition-all duration-700" style="width: ${perc}%"></div>
                            </div>
                            <span class="text-[10px] font-black text-slate-800">${perc}%</span>
                        </div>
                        <div class="text-[7px] font-bold text-slate-400 truncate mt-1.5 italic hover:text-blue-600">● ${lastLog}</div>
                    </div>

                    <div class="admin-view col-obs border-l pl-4">${p.obs_edu || ''}</div>
                    
                    <div class="col-acoes">
                        <button onclick="abrirProgresso('${id}', '${p.cliente}', ${perc})" class="text-green-500 hover:text-green-600 p-2"><i class="fas fa-check-circle text-lg"></i></button>
                        ${isAdmin ? `<button onclick="preparaEdicao('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="text-orange-400 hover:text-orange-500 p-2"><i class="fas fa-pencil-alt text-lg"></i></button>` : ''}
                        ${viewAdmin ? `<button onclick="apagar('${id}')" class="text-slate-200 hover:text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
            checkPermissions();
        });

        window.verLogs = (logs) => {
            const content = document.getElementById('logs-content');
            content.innerHTML = logs && logs.length > 0 ? logs.map(l => `<div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-[10px] font-bold text-slate-600 shadow-sm leading-relaxed"> ${l}</div>`).join('') : '<p class="text-xs italic text-center py-10">Sem histórico.</p>';
            document.getElementById('modal-logs').classList.remove('hidden');
        };

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id;
            document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido;
            document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-entrada').value = p.entrada;
            document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos;
            document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida;
            document.getElementById('p-local').value = p.local;
            document.getElementById('p-obs-edu').value = p.obs_edu || '';
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.abrirProgresso = (id, nome, perc) => {
            document.getElementById('prog-id').value = id;
            document.getElementById('prog-nome').innerText = nome;
            document.getElementById('prog-range').value = perc;
            document.getElementById('prog-perc-val').innerText = perc + "%";
            document.getElementById('prog-obs').value = "";
            document.getElementById('modal-progresso').classList.remove('hidden');
        };

        window.apagar = async (id) => { if(confirm("Apagar registo?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        checkPermissions();
    </script>
</body>
</html>
