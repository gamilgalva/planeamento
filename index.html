<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil - Sistema de Planeamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="clientes_base.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --gamil-blue: #1a2a3a; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: row; overflow: hidden; margin: 0; }
        
        .sidebar { width: 260px; background-color: #1a2a3a; color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; z-index: 40; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: #f1f5f9; overflow: hidden; }
        .main-content { flex: 1; overflow-x: hidden; overflow-y: auto; padding: 25px 40px; }

        /* TABELA SEM SCROLL */
        .gamil-table { width: 100%; border-separate: border-spacing-y(12px); border-collapse: separate; table-layout: auto; }
        .gamil-thead th { @apply text-[10px] font-black uppercase text-slate-400 tracking-widest px-4 py-2 text-left; }
        .pedido-row { @apply bg-white shadow-sm hover:shadow-md transition-all duration-300; }
        .pedido-row td { @apply py-5 px-4 first:rounded-l-2xl last:rounded-r-2xl border-y border-slate-100; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .pos-text { font-size: 10px !important; @apply font-black text-slate-400 text-center; width: 45px; }
        .ref-text { font-size: 10px !important; color: #2563eb !important; font-weight: 800 !important; @apply uppercase italic; }
        .client-text { font-size: 10px !important; font-weight: 800 !important; @apply uppercase text-slate-800 tracking-tighter; }
        .other-row-text { font-size: 10px !important; @apply font-bold text-slate-600; }
        .status-strip { width: 5px; height: 35px; border-radius: 20px; }

        #modal-login { position: fixed; inset: 0; background-color: #1a2a3a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 350px; padding: 20px; text-align: center; }

        .admin-view, .encarregado-view, .sofia-view, .auth-element { display: none !important; }
        body.admin-mode .admin-view, body.admin-mode .encarregado-view { display: table-cell !important; }
        body.encarregado-mode .encarregado-view { display: table-cell !important; }
        body.sofia-mode .sofia-view { display: table-cell !important; }
        body.admin-mode th.admin-view, body.admin-mode th.encarregado-view { display: table-cell !important; }
        body.sofia-mode th.sofia-view { display: table-cell !important; }
        body.admin-mode .auth-element, body.sofia-mode .auth-element { display: block !important; }

        .modal-input { @apply w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-4 focus:ring-blue-100; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-500 mb-1 ml-2; }
        .btn-premium-gamil { @apply w-full bg-[#1a2a3a] hover:bg-black text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 tracking-widest; }
    </style>
</head>
<body>
    <div id="modal-login" class="no-print">
        <div class="login-container">
            <h1 class="text-white font-black italic uppercase tracking-tighter text-xl mb-8 opacity-20">Login Gamil</h1>
            <div class="flex flex-col space-y-3">
                <div class="flex space-x-2">
                    <select id="login-user" class="w-1/2 p-3 rounded-md font-bold text-sm outline-none">
                        <option value="Visitante">Consulta</option>
                        <option value="Sofia">Sofia Meira</option>
                        <option value="Eduardo Pereira">Eduardo Pereira</option>
                        <option value="José Pedro">José Pedro</option>
                        <option value="José Castro">José Castro</option>
                        <option value="Luís Silva">Luís Silva</option>
                        <option value="Paulo Abreu">Paulo Abreu</option>
                    </select>
                    <input type="password" id="login-pass" placeholder="PASSWORD" class="w-1/2 p-3 rounded-md font-bold text-sm outline-none text-center">
                </div>
                <button onclick="tentarLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-xl transition-all">Entrar</button>
            </div>
        </div>
    </div>

    <aside class="sidebar no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-3" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-widest uppercase text-blue-300">Hub v9.9</h1>
        </div>
        <nav class="p-4 flex-1 space-y-4">
            <div id="user-info" class="p-5 bg-white/5 rounded-3xl border border-white/10 text-center mb-4">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-blue-100 tracking-tighter">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2 tracking-widest">Sair</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg hover:bg-blue-700 transition-all"><i class="fas fa-plus"></i> <span>Novo Registo</span></button>
            <button onclick="window.print()" class="w-full p-4 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase transition-all"><i class="fas fa-print text-blue-400"></i> <span>Imprimir Lista</span></button>
        </nav>
    </aside>

    <main class="main-container">
        <header class="h-16 bg-white border-b border-slate-200 px-10 flex justify-between items-center no-print">
            <h2 class="text-xs font-black text-slate-800 uppercase italic tracking-widest">R.030.01 - Planeamento Geral</h2>
            <div class="flex items-center space-x-2 bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100 italic font-black text-[9px] text-blue-600 uppercase">Live Sync Master</div>
        </header>
        <div class="main-content">
            <table class="gamil-table">
                <thead class="gamil-thead">
                    <tr><th>Pos</th><th></th><th>Ref / Pedido</th><th>Cliente Gamil</th><th class="text-center">Entrada</th><th class="text-center">Peso</th><th class="text-center">Serviços</th><th class="text-center encarregado-view admin-view">Montagem</th><th class="text-center encarregado-view admin-view sofia-view">Entrega</th><th class="text-center">Progresso / Log</th><th class="admin-view">Observações</th><th class="text-right pr-6 no-print">Ações</th></tr>
                </thead>
                <tbody id="container-pedidos"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col h-[85vh]">
            <div class="p-6 bg-[#1a2a3a] text-white flex justify-between items-center font-black uppercase text-xs"><span>Ficha de Pedido</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Cliente</label><select id="p-cliente" required class="modal-input bg-white"></select></div>
                <div><label class="label-gamil">Pedido #</label><input id="p-pedido" required type="text" class="modal-input"></div>
                <div><label class="label-gamil">Urgência</label><select id="p-prio" class="modal-input"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="label-gamil">Ranking</label><input id="p-pos" type="number" class="modal-input"></div>
                <div><label class="label-gamil">Peso Kg</label><input id="p-peso" required type="number" step="0.01" class="modal-input"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" type="date" class="modal-input"></div>
                <div class="grid grid-cols-2 gap-2"><div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="modal-input"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div><div><label class="label-gamil">Furos?</label><select id="p-furos" class="modal-input"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div></div>
                <div class="col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2" id="fields-admin-only">
                    <div><label class="label-gamil text-blue-600 font-bold">Montagem</label><input id="p-montagem" type="date" class="modal-input"></div>
                    <div><label class="label-gamil text-orange-600 font-bold">Entrega</label><input id="p-saida" type="date" class="modal-input"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600 font-bold">Notas Eduardo</label><textarea id="p-obs-edu" class="modal-input h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 btn-premium-gamil mt-4">Guardar Alterações</button>
            </form>
        </div>
    </div>

    <div id="modal-progresso" class="hidden fixed inset-0 bg-blue-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-sm p-10 shadow-2xl text-center">
            <h3 id="prog-nome" class="text-sm font-black uppercase mb-8 border-b pb-4 italic tracking-tight"></h3>
            <input type="hidden" id="prog-id">
            <div class="space-y-5">
                <div>
                    <label class="label-gamil">Conclusão: <span id="prog-perc-val" class="text-blue-600 font-black text-2xl">0</span>%</label>
                    <input type="range" id="prog-range" min="0" max="100" step="5" class="w-full h-2 bg-slate-100 rounded-lg accent-blue-600 mt-4" oninput="document.getElementById('prog-perc-val').innerText = this.value">
                </div>
                <textarea id="prog-obs" class="modal-input h-28" placeholder="Reporte..."></textarea>
                <button onclick="salvarProgresso()" class="btn-premium-gamil">Confirmar Reporte</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA", authDomain: "planeamento-cf642.firebaseapp.com", projectId: "planeamento-cf642", storageBucket: "planeamento-cf642.firebasestorage.app", messagingSenderId: "438224213205", appId: "1:438224213205:web:2205b5a879ec384c62be5c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientesFirebase = collection(db, "clientes_gamil");

        const formatarDataBR = (str) => { if (!str || str === '--') return '--'; const pts = str.split('-'); return pts.length === 3 ? `${pts[2]}-${pts[1]}-${pts[0]}` : str; };

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                localStorage.setItem('gamil_sofia', (user === "Sofia"));
                localStorage.setItem('gamil_encarregado', (user === "José Castro" || user === "Luís Silva" || user === "Paulo Abreu"));
                checkPermissions();
                atualizarInterfaceClientes();
            } else alert("Senha incorreta.");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').style.display = 'flex'; return; }
            document.getElementById('modal-login').style.display = 'none';
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            document.body.classList.remove('admin-mode', 'sofia-mode', 'encarregado-mode', 'can-edit');
            if (isAdmin) document.body.classList.add('admin-mode', 'can-edit');
            if (localStorage.getItem('gamil_sofia') === 'true') document.body.classList.add('sofia-mode');
            if (localStorage.getItem('gamil_encarregado') === 'true') document.body.classList.add('encarregado-mode');
            document.getElementById('fields-admin-only').style.display = (isAdmin || localStorage.getItem('gamil_sofia') === 'true' || localStorage.getItem('gamil_encarregado') === 'true') ? 'grid' : 'none';
        };

        // CLIENTES
        window.atualizarInterfaceClientes = () => {
            const select = document.getElementById('p-cliente'); if(!select) return;
            // Busca da variável global que o arquivo clientes_base.js carrega
            const estaticos = (window.CLIENTES_ESTATICOS) ? window.CLIENTES_ESTATICOS : [];
            onSnapshot(query(colClientesFirebase, orderBy("nome")), snap => {
                let fbList = []; snap.forEach(d => fbList.push(d.data()));
                const completa = [...estaticos, ...fbList].sort((a,b) => a.nome.localeCompare(b.nome));
                select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>' + 
                    completa.map(c => `<option value="${c.codigo} | ${c.nome}">${c.codigo} | ${c.nome}</option>`).join('');
            });
        }

        // PEDIDOS
        onSnapshot(colPedidos, snap => {
            const container = document.getElementById('container-pedidos'); container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            let lista = []; snap.forEach(d => lista.push({ id: d.id, ...d.data() }));
            lista.sort((a, b) => (a.ranking || 999) - (b.ranking || 999));

            lista.forEach(p => {
                const perc = p.progresso || 0;
                const lastLog = p.historico && p.historico.length > 0 ? p.historico[p.historico.length-1] : 'Sem reporte';
                const color = p.prio === 'alta' ? 'bg-red-500' : p.prio === 'media' ? 'bg-orange-400' : 'bg-green-500';
                const tr = document.createElement('tr'); tr.className = "pedido-row";
                tr.innerHTML = `
                    <td class="pos-text">${p.ranking ? p.ranking + 'º' : '--'}</td>
                    <td><div class="status-strip ${color}"></div></td>
                    <td class="ref-text">#${p.pedido}</td>
                    <td class="client-text">${p.cliente}</td>
                    <td class="text-center italic text-slate-400 other-row-text">${formatarDataBR(p.entrada)}</td>
                    <td class="text-center other-row-text">${p.peso}kg</td>
                    <td class="text-center font-black other-row-text">
                        <span class="${p.pesar === 'SIM' ? 'text-orange-500' : 'text-slate-300'}">PES</span> | 
                        <span class="${p.furos === 'SIM' ? 'text-orange-500' : 'text-slate-300'}">FUR</span>
                    </td>
                    <td class="admin-view encarregado-view text-center font-black text-blue-900/80 other-row-text">${formatarDataBR(p.montagem)}</td>
                    <td class="admin-view encarregado-view sofia-view text-center font-black text-orange-600 other-row-text">${formatarDataBR(p.saida)}</td>
                    <td onclick="abrirProgresso('${p.id}', '${p.cliente}', ${perc})">
                        <div class="flex items-center space-x-2 cursor-pointer">
                            <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-blue-600" style="width: ${perc}%"></div></div>
                            <span class="text-[10px] font-black">${perc}%</span>
                        </div>
                        <div class="text-[7px] font-bold text-slate-400 truncate mt-1 italic other-row-text">● ${lastLog}</div>
                    </td>
                    <td class="admin-view italic uppercase truncate border-l pl-3 other-row-text">${p.obs_edu || ''}</td>
                    <td class="text-right pr-6 no-print">
                        <button onclick="preparaEdicao('${p.id}', '${encodeURIComponent(JSON.stringify(p))}')" class="text-orange-400"><i class="fas fa-pencil-alt text-xl"></i></button>
                    </td>
                `;
                container.appendChild(tr);
            });
        });

        window.logout = () => { localStorage.clear(); window.location.reload(); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.abrirProgresso = (id, n, p) => { document.getElementById('prog-id').value = id; document.getElementById('prog-nome').innerText = n; document.getElementById('prog-range').value = p; document.getElementById('prog-perc-val').innerText = p + "%"; document.getElementById('modal-progresso').classList.remove('hidden'); };
        
        window.salvarProgresso = async () => {
            const id = document.getElementById('prog-id').value;
            const perc = parseInt(document.getElementById('prog-range').value);
            const obs = document.getElementById('prog-obs').value.toUpperCase();
            const log = `${localStorage.getItem('gamil_user')}: ${perc}% ${obs ? '-> '+obs : ''} [${new Date().toLocaleString()}]`;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { progresso: perc, historico: arrayUnion(log) });
            fecharModal();
        };

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id;
            document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido;
            document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-pos').value = p.ranking || '';
            document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-entrada').value = p.entrada;
            document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos;
            document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida;
            document.getElementById('p-obs-edu').value = p.obs_edu || '';
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        checkPermissions();
        if(localStorage.getItem('gamil_user')) atualizarInterfaceClientes();
    </script>
</body>
</html>
