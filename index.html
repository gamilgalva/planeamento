<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Hub v3.8 | Professional Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        :root { --gamil-blue: #002D5A; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-gamil { background-color: var(--gamil-blue); }
        
        /* LINHA DE PEDIDO ESTILO CARD */
        .grid-row { 
            display: grid; 
            grid-template-columns: 8px 110px 1.8fr 100px 80px 110px 100px 100px 110px 180px 1.5fr 110px;
            align-items: center; gap: 12px;
            @apply bg-white border border-slate-200 rounded-xl mb-3 px-0 py-3 shadow-sm hover:shadow-md transition-all;
        }

        /* CABEÇALHO COM FUNDO DIFERENCIADO */
        .header-row { 
            display: grid; 
            grid-template-columns: 8px 110px 1.8fr 100px 80px 110px 100px 100px 110px 180px 1.5fr 110px;
            gap: 12px;
            @apply px-0 py-3 mb-4 rounded-xl bg-slate-200/50 border border-slate-300 text-[9px] font-black uppercase text-blue-900 tracking-widest;
        }

        .status-tag { width: 8px; height: 50px; border-radius: 0 4px 4px 0; }
        .main-content { overflow-y: auto; flex: 1; padding: 25px 40px; }
        .admin-view, .auth-element { display: none; }
        
        .input-gamil { @apply w-full bg-slate-50 border border-slate-200 rounded-lg p-2 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-2 focus:ring-blue-500; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-400 mb-1; }

        @media print {
            aside, header, button, .no-print { display: none !important; }
            body { background: white !important; display: block !important; overflow: visible !important; }
            .main-content { padding: 0 !important; overflow: visible !important; }
            .header-row { display: grid !important; background: #eee !important; border: 1px solid #000 !important; color: black !important; margin-bottom: 10px !important;}
            .grid-row { display: grid !important; border: 1px solid #ddd !important; break-inside: avoid; margin-bottom: 5px; grid-template-columns: 5px 80px 1.5fr 80px 60px 80px 80px 80px 80px 120px 1fr 0px !important; }
            .admin-view { display: block !important; }
        }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-2" onerror="this.style.display='none'">
            <h1 class="text-[9px] font-black tracking-widest uppercase text-blue-300 italic">Gamil Hub v3.8</h1>
        </div>
        <nav class="p-4 flex-1 space-y-3">
            <div id="user-info" class="p-4 bg-white/5 rounded-xl border border-white/10 text-center mb-4">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-blue-100">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2">Sair do Sistema</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg hover:bg-blue-700 transition-all">
                <i class="fas fa-plus"></i> <span>Novo Pedido</span>
            </button>
            <button onclick="window.print()" class="w-full p-3 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase">
                <i class="fas fa-print"></i> <span>Imprimir Relatório</span>
            </button>
            <button onclick="abrirModalCliente()" class="auth-element w-full p-3 hover:bg-white/5 rounded-xl flex items-center space-x-3 text-slate-400 text-xs font-bold">
                <i class="fas fa-users"></i> <span>Base de Clientes</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b px-10 flex justify-between items-center no-print">
            <h2 class="text-sm font-black text-slate-700 uppercase italic tracking-widest">Planeamento de Produção</h2>
            <div class="text-[10px] font-black text-blue-600 uppercase">Hamilton Junior Dev</div>
        </header>

        <div class="main-content">
            <div class="header-row">
                <div></div>
                <div class="pl-2">Ref / Pedido</div>
                <div>Cliente Gamil</div>
                <div class="text-center">Entrada</div>
                <div class="text-center">Peso</div>
                <div class="text-center">Serviços</div>
                <div class="admin-view text-center">Montagem</div>
                <div class="admin-view text-center">Entrega</div>
                <div class="admin-view text-center">Local</div>
                <div class="text-center">Progresso / Log</div>
                <div class="text-left admin-view">Observações Eduardo</div>
                <div class="text-right pr-4">Ações</div>
            </div>
            
            <div id="container-pedidos"></div>
        </div>
    </main>

    <div id="modal-logs" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-sm font-black text-slate-800 uppercase italic">Histórico do Pedido</h3>
                <button onclick="fecharModal()" class="text-2xl">&times;</button>
            </div>
            <div id="logs-content" class="space-y-3 max-h-96 overflow-y-auto pr-2"></div>
            <button onclick="fecharModal()" class="w-full mt-6 bg-slate-100 py-3 rounded-xl text-[10px] font-black uppercase">Fechar</button>
        </div>
    </div>

    <div id="modal-progresso" class="hidden fixed inset-0 bg-blue-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl">
            <h3 id="prog-nome" class="text-sm font-black text-slate-800 uppercase mb-6 text-center italic"></h3>
            <input type="hidden" id="prog-id">
            <div class="space-y-4">
                <div><label class="label-gamil">Percentagem: <span id="prog-perc-val" class="text-blue-600 font-black text-xl">0</span>%</label>
                <input type="range" id="prog-range" min="0" max="100" step="5" class="w-full accent-blue-600" oninput="document.getElementById('prog-perc-val').innerText = this.value"></div>
                <div><label class="label-gamil">Comentário do Turno</label><textarea id="prog-obs" class="input-gamil h-24" placeholder="Ex: Material pronto para expedição..."></textarea></div>
                <button onclick="salvarProgresso()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">Reportar</button>
            </div>
        </div>
    </div>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-2xl shadow-2xl overflow-hidden">
            <div class="p-6 bg-gamil text-white flex justify-between items-center font-black uppercase text-xs tracking-widest"><span>Gestão do Pedido</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 max-h-[85vh] overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Cliente</label><select id="p-cliente" required class="input-gamil"></select></div>
                <div><label class="label-gamil">Nº Pedido</label><input id="p-pedido" required type="text" class="input-gamil"></div>
                <div><label class="label-gamil">Prioridade</label><select id="p-prio" class="input-gamil"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="label-gamil">Peso (Kg)</label><input id="p-peso" required type="number" step="0.01" class="input-gamil"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" type="date" class="input-gamil"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                    <div><label class="label-gamil">Furos?</label><select id="p-furos" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>
                <div class="admin-view col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2">
                    <div><label class="label-gamil text-blue-600">Previsão Montagem</label><input id="p-montagem" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil text-blue-600">Previsão Entrega</label><input id="p-saida" type="date" class="input-gamil"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600">Localização (Rack/Pátio)</label><input id="p-local" type="text" class="input-gamil"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600">Observações Eduardo (Para Impressão)</label><textarea id="p-obs-edu" class="input-gamil h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg mt-4">Gravar Dados</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro" || user === "Sofia"));
                localStorage.setItem('gamil_view_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                checkPermissions();
            } else alert("Senha Incorreta!");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const viewAdmin = localStorage.getItem('gamil_view_admin') === 'true';
            document.querySelectorAll('.admin-view').forEach(el => el.style.display = viewAdmin ? 'block' : 'none');
            document.querySelectorAll('.auth-element').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            if(viewAdmin) document.querySelectorAll('form .admin-view').forEach(el => el.style.display = 'grid');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };

        // CLIENTES
        onSnapshot(colClientes, (snap) => {
            const select = document.getElementById('p-cliente');
            const listaDB = document.getElementById('lista-clientes-db');
            select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>';
            listaDB.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                select.innerHTML += `<option value="${c.codigo} | ${c.nome}">${c.codigo} - ${c.nome}</option>`;
                listaDB.innerHTML += `<div class="p-2 border-b uppercase">● ${c.codigo} - ${c.nome}</div>`;
            });
        });
        document.getElementById('form-cliente').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(colClientes, { codigo: document.getElementById('c-cod').value, nome: document.getElementById('c-nome').value.toUpperCase() });
            e.target.reset();
        };

        // PEDIDOS
        document.getElementById('form-pedido').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                cliente: document.getElementById('p-cliente').value,
                pedido: document.getElementById('p-pedido').value,
                prio: document.getElementById('p-prio').value,
                peso: document.getElementById('p-peso').value,
                entrada: document.getElementById('p-entrada').value,
                pesar: document.getElementById('p-pesar').value,
                furos: document.getElementById('p-furos').value,
                montagem: document.getElementById('p-montagem').value,
                saida: document.getElementById('p-saida').value,
                local: document.getElementById('p-local').value.toUpperCase(),
                obs_edu: document.getElementById('p-obs-edu').value.toUpperCase(),
                timestamp: new Date()
            };
            if (id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data);
            else await addDoc(colPedidos, { ...data, progresso: 0, historico: [] });
            fecharModal();
        };

        window.salvarProgresso = async () => {
            const id = document.getElementById('prog-id').value;
            const perc = parseInt(document.getElementById('prog-range').value);
            const obs = document.getElementById('prog-obs').value.toUpperCase();
            const user = localStorage.getItem('gamil_user');
            const log = `${user}: ${perc}% ${obs ? '-> '+obs : ''} [${new Date().toLocaleString('pt-PT')}]`;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { progresso: perc, historico: arrayUnion(log) });
            fecharModal();
        };

        // RENDERIZAÇÃO
        onSnapshot(query(colPedidos, orderBy("timestamp", "desc")), (snap) => {
            const container = document.getElementById('container-pedidos');
            container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const viewAdmin = localStorage.getItem('gamil_view_admin') === 'true';

            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const perc = p.progresso || 0;
                const color = p.prio === 'alta' ? 'bg-red-500' : p.prio === 'media' ? 'bg-orange-400' : 'bg-green-500';
                const lastLog = p.historico && p.historico.length > 0 ? p.historico[p.historico.length - 1] : 'Sem comentários';

                const row = document.createElement('div');
                row.className = "grid-row";
                row.innerHTML = `
                    <div class="status-tag ${color}"></div>
                    <div class="text-blue-600 font-black italic text-xs pl-2">#${p.pedido}</div>
                    <div class="text-xs font-black uppercase text-slate-800 truncate">${p.cliente}</div>
                    <div class="text-center text-[10px] font-bold text-slate-400 italic">${p.entrada}</div>
                    <div class="text-center text-xs font-black text-slate-600">${p.peso}kg</div>
                    <div class="text-center text-[9px] font-black">
                        <span class="${p.pesar === 'SIM' ? 'text-orange-500' : 'text-slate-200'}">PESAR</span> | 
                        <span class="${p.furos === 'SIM' ? 'text-orange-500' : 'text-slate-200'}">FUROS</span>
                    </div>
                    
                    <div class="admin-view text-center text-[10px] font-black text-blue-800">${p.montagem || '--'}</div>
                    <div class="admin-view text-center text-[10px] font-black text-orange-600">${p.saida || '--'}</div>
                    <div class="admin-view text-center"><span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg text-[9px] font-black uppercase">${p.local || '--'}</span></div>

                    <div class="px-2">
                        <div class="flex items-center space-x-2">
                            <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full ${perc === 100 ? 'bg-green-500' : 'bg-blue-600'}" style="width: ${perc}%"></div></div>
                            <span class="text-[9px] font-black">${perc}%</span>
                        </div>
                        <div onclick='verLogs(${JSON.stringify(p.historico)})' class="text-[7px] font-bold text-slate-400 truncate mt-1 italic cursor-pointer hover:text-blue-500">${lastLog}</div>
                    </div>

                    <div class="admin-view text-[9px] font-bold text-slate-500 italic uppercase truncate leading-tight border-l pl-2">${p.obs_edu || '---'}</div>
                    
                    <div class="text-right pr-4 flex justify-end space-x-2 no-print">
                        <button onclick="abrirProgresso('${id}', '${p.cliente}', ${perc})" class="text-green-500 hover:text-green-700"><i class="fas fa-check-circle text-lg"></i></button>
                        ${isAdmin ? `<button onclick="editarPedido('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="text-orange-400 hover:text-orange-600"><i class="fas fa-pencil-alt"></i></button>` : ''}
                        ${viewAdmin ? `<button onclick="apagar('${id}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                `;
                container.appendChild(row);
            });
            checkPermissions();
        });

        window.verLogs = (logs) => {
            const content = document.getElementById('logs-content');
            content.innerHTML = logs && logs.length > 0 ? logs.map(l => `<div class="p-3 bg-slate-50 rounded-xl border border-slate-200 text-[10px] font-bold text-slate-600">● ${l}</div>`).join('') : '<p class="text-xs italic text-slate-400 text-center">Nenhum comentário.</p>';
            document.getElementById('modal-logs').classList.remove('hidden');
        };

        window.editarPedido = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id;
            document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido;
            document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-entrada').value = p.entrada;
            document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos;
            document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida;
            document.getElementById('p-local').value = p.local;
            document.getElementById('p-obs-edu').value = p.obs_edu || '';
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.abrirProgresso = (id, nome, perc) => {
            document.getElementById('prog-id').value = id;
            document.getElementById('prog-nome').innerText = nome;
            document.getElementById('prog-range').value = perc;
            document.getElementById('prog-perc-val').innerText = perc;
            document.getElementById('prog-obs').value = "";
            document.getElementById('modal-progresso').classList.remove('hidden');
        };

        window.apagar = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('modal-pedido').classList.remove('hidden'); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        checkPermissions();
    </script>
</body>
</html>
