<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamil Hub v11 | Matrix Master Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="clientes_base.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --gamil-blue: #1a2a3a; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: row; overflow: hidden; margin: 0; }
        
        /* SIDEBAR - DESIGN PREMIUM */
        .sidebar { width: 260px; background-color: #1a2a3a; color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; z-index: 40; box-shadow: 4px 0 15px rgba(0,0,0,0.2); transition: all 0.3s ease; }
        .main-container { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; background: #f1f5f9; height: 100vh; }
        .main-content { flex: 1; overflow: auto; padding: 25px 40px; }

        /* TABELA - ESTRUTURA MATRIX */
        .gamil-table { min-width: 1750px; border-separate: border-spacing-y(12px); width: 100%; border-collapse: separate; table-layout: fixed; }
        .gamil-thead th { @apply text-[10px] font-black uppercase text-slate-400 tracking-widest px-4 py-2 text-left; }
        .pedido-row td { @apply py-5 px-4 first:rounded-l-2xl last:rounded-r-2xl border-y border-slate-100 bg-white shadow-sm; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* CONTROLO DE FONTES */
        .pos-text { font-size: 10px !important; @apply font-black text-slate-400 text-center; width: 45px; }
        .ref-text { font-size: 10px !important; color: #2563eb !important; font-weight: 800 !important; @apply uppercase italic; }
        .client-text { font-size: 10px !important; font-weight: 800 !important; @apply uppercase text-slate-800 tracking-tighter; }
        .other-row-text { font-size: 10px !important; @apply font-bold text-slate-600; }
        .status-strip { width: 5px; height: 35px; border-radius: 20px; }

        /* BOTÕES DE ABA - ESTILO PREMIUM */
        .btn-aba { 
            width: 100% !important;
            @apply p-4 rounded-2xl flex items-center gap-4 text-white text-[10px] font-black uppercase transition-all mb-2;
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid transparent;
            display: flex !important;
        }
        .btn-aba:hover { background-color: rgba(255, 255, 255, 0.1) !important; }
        .btn-aba.active { @apply bg-blue-600 shadow-lg !important; border-color: rgba(255, 255, 255, 0.1); }
        .btn-aba i { font-size: 12px; width: 20px; text-align: center; }
        .icon-prod { color: #60a5fa; }
        .icon-reco { color: #fb923c; }
        .icon-hist { color: #94a3b8; }
        
        /* EDIÇÃO INLINE */
        .editable-cell { cursor: pointer; transition: all 0.2s; border-radius: 8px; }
        body.can-edit .editable-cell:hover { background-color: #f0f9ff; box-shadow: inset 0 0 0 1px #bfdbfe; }
        .inline-edit-container { display: flex; align-items: center; gap: 8px; background: white; padding: 4px 8px; border-radius: 10px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); border: 2px solid #3b82f6; width: fit-content; position: absolute; z-index: 100; transform: translateX(-10px); }

        #modal-login { position: fixed; inset: 0; background-color: #1a2a3a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 350px; padding: 20px; text-align: center; }

        .admin-view, .encarregado-view, .sofia-view, .auth-element { display: none !important; }
        body.admin-mode .admin-view, body.admin-mode .encarregado-view, body.encarregado-mode .encarregado-view, body.sofia-mode .sofia-view { display: table-cell !important; }
        body.admin-mode th.admin-view, body.admin-mode th.encarregado-view, body.encarregado-mode th.encarregado-view, body.sofia-mode th.sofia-view { display: table-cell !important; }
        body.admin-mode .auth-element, body.sofia-mode .auth-element { display: block !important; }

        /* INPUTS COM BORDA VISÍVEL Hamilton */
        .modal-input { 
            @apply w-full rounded-2xl p-4 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-4 focus:ring-blue-100;
            background-color: white !important;
            border: 1px solid #cbd5e1 !important;
        }
        .btn-premium-gamil { @apply w-full bg-[#1a2a3a] hover:bg-black text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 tracking-widest; }

        /* AJUSTE PARA IMPRESSÃO */
        @media print {
            @page { size: landscape; margin: 10mm; }
            .no-print, aside, header, .actions-cell, button, .text-right { display: none !important; }
            body { background: white !important; overflow: visible !important; display: block !important; height: auto !important; }
            .main-content { padding: 0 !important; overflow: visible !important; }
            .gamil-table { min-width: 100% !important; border-spacing: 0 5px !important; table-layout: auto !important; }
            .pedido-row td { border: 1px solid #eee !important; font-size: 8px !important; color: black !important; padding: 4px !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .h-full { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .status-strip { display: block !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div id="modal-login" class="no-print">
        <div class="login-container">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-8" onerror="this.style.display='none'">
            <div class="flex flex-col space-y-3">
                <div class="flex space-x-2">
                    <select id="login-user" class="w-1/2 p-3 rounded-md font-bold text-sm outline-none border-2 border-black">
                        <option value="Visitante">Consulta</option>
                        <option value="Sofia">Sofia Meira</option>
                        <option value="Eduardo Pereira">Eduardo Pereira</option>
                        <option value="José Pedro">José Pedro</option>
                        <option value="José Castro">José Castro</option>
                        <option value="Luís Silva">Luís Silva</option>
                        <option value="Paulo Abreu">Paulo Abreu</option>
                    </select>
                    <input type="password" id="login-pass" placeholder="PASSWORD" class="w-1/2 p-3 rounded-md font-bold text-sm outline-none text-center border-2 border-black text-slate-800">
                </div>
                <button onclick="tentarLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-xl transition-all">Entrar</button>
            </div>
        </div>
    </div>

    <aside class="sidebar no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-3" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-widest uppercase text-blue-300">Centro de Comando</h1>
        </div>
        <nav class="p-4 flex-1 space-y-3 overflow-y-auto">
            <div id="user-info" class="p-4 bg-white/5 rounded-2xl border border-white/10 text-center mb-2">
                <p id="nome-logado" class="text-xs font-black uppercase italic text-blue-100">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2 tracking-widest">Sair</button>
            </div>
            
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg hover:bg-blue-700 transition-all mb-2"><i class="fas fa-plus"></i> <span>Novo Registo</span></button>
            <button onclick="window.print()" class="w-full p-4 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase transition-all mb-2"><i class="fas fa-print text-blue-400"></i> <span>Imprimir</span></button>
            <button onclick="abrirModalCliente()" class="auth-element w-full p-4 bg-white/5 hover:bg-white/10 rounded-xl flex items-center space-x-3 text-slate-300 text-[10px] font-bold transition mb-4"><i class="fas fa-users text-blue-400"></i> <span>Clientes</span></button>

            <div class="pt-4 border-t border-white/10 flex flex-col">
                <button onclick="changeView('producao')" id="btn-producao" class="btn-aba active">
                    <i class="fas fa-industry icon-prod"></i> <span>Produção</span>
                </button>
                <button onclick="changeView('recolha')" id="btn-recolha" class="btn-aba">
                    <i class="fas fa-truck-loading icon-reco"></i> <span>Para Recolha</span>
                </button>
                <button onclick="changeView('historico')" id="btn-historico" class="btn-aba">
                    <i class="fas fa-archive icon-hist"></i> <span>Histórico</span>
                </button>
            </div>
        </nav>
    </aside>

    <main class="main-container">
        <header class="h-16 bg-white border-b border-slate-200 px-10 flex justify-between items-center no-print shrink-0">
            <h2 id="view-title" class="text-xs font-black text-slate-800 uppercase italic tracking-widest truncate">Planeamento Geral de Produção</h2>
            <div class="bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100 italic font-black text-[9px] text-blue-600 uppercase">Sistema On-Line</div>
        </header>
        <div class="main-content">
            <table class="gamil-table">
                <thead class="gamil-thead">
                    <tr><th style="width: 55px">Pos</th><th style="width: 15px"></th><th style="width: 140px">Ref / Pedido</th><th style="width: 380px">Cliente Gamil</th><th class="text-center" style="width: 110px">Entrada</th><th class="text-center" style="width: 90px">Peso</th><th class="text-center" style="width: 120px">Serviços</th><th class="text-center encarregado-view admin-view" style="width: 120px">Montagem</th><th class="text-center encarregado-view admin-view sofia-view" style="width: 120px">Entrega</th><th class="text-center" style="width: 350px">Progresso / Log</th><th class="admin-view" style="width: 250px">Observações</th><th class="text-right pr-6 no-print" style="width: 120px">Ações</th></tr>
                </thead>
                <tbody id="container-pedidos"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col h-[85vh]">
            <div class="p-6 bg-[#1a2a3a] text-white flex justify-between items-center font-black uppercase text-xs"><span>Ficha de Pedido</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Cliente</label><select id="p-cliente" required class="modal-input"></select></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Pedido #</label><input id="p-pedido" required type="text" class="modal-input"></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Data Entrada</label><input id="p-entrada" required type="date" class="modal-input"></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Urgência (Cor)</label><select id="p-prio" class="modal-input"><option value="baixa">BAIXA (VERDE)</option><option value="media">MÉDIA (LARANJA)</option><option value="alta">ALTA (VERMELHO)</option></select></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Ranking</label><input id="p-pos" type="number" class="modal-input"></div>
                <div><label class="block text-[10px] font-black text-slate-500 uppercase ml-2">Peso Kg</label><input id="p-peso" required type="number" step="0.01" class="modal-input"></div>
                <div id="admin-form-fields" class="col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2" style="display: none;">
                    <div><label class="block text-[10px] font-black text-blue-600 uppercase ml-2">Montagem</label><input id="p-montagem" type="date" class="modal-input"></div>
                    <div><label class="block text-[10px] font-black text-orange-600 uppercase ml-2">Entrega</label><input id="p-saida" type="date" class="modal-input"></div>
                    <div class="col-span-2"><label class="block text-[10px] font-black text-blue-600 uppercase ml-2">Notas Eduardo</label><textarea id="p-obs-edu" class="modal-input h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 btn-premium-gamil mt-4">Guardar</button>
            </form>
        </div>
    </div>

    <div id="modal-progresso" class="hidden fixed inset-0 bg-blue-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-sm p-10 shadow-2xl text-center">
            <h3 id="prog-nome" class="text-sm font-black uppercase mb-8 border-b pb-4 italic">Reporte de Progresso</h3>
            <input type="hidden" id="prog-id">
            <div class="space-y-5">
                <div><label class="block text-[10px] font-black text-slate-500">Conclusão: <span id="prog-perc-val" class="text-blue-600 font-black text-2xl">0</span>%</label><input type="range" id="prog-range" min="0" max="100" step="5" class="w-full h-2 bg-slate-100 rounded-lg accent-blue-600 mt-4" oninput="document.getElementById('prog-perc-val').innerText = this.value"></div>
                <textarea id="prog-obs" class="modal-input h-28" placeholder="Reporte..."></textarea>
                <button onclick="salvarProgresso()" class="btn-premium-gamil">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal-logs" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[60] flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl text-center"><h3 class="text-xs font-black uppercase border-b pb-4 mb-6">Histórico</h3><div id="logs-content" class="space-y-3 max-h-96 overflow-y-auto text-left"></div><button onclick="fecharModal()" class="w-full mt-8 bg-slate-100 py-4 rounded-xl text-[10px] font-black">Fechar</button></div>
    </div>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-md shadow-2xl flex flex-col h-[85vh] overflow-hidden">
            <div class="p-8 bg-slate-50 border-b flex justify-between items-center"><h3 class="font-black uppercase text-sm italic">Base de Clientes</h3><button onclick="fecharModal()">&times;</button></div>
            <div class="p-8 border-b bg-white auth-element"><form id="form-cliente" class="space-y-4"><input id="c-cod" required type="text" class="modal-input" placeholder="CÓDIGO NOVO"><input id="c-nome" required type="text" class="modal-input" placeholder="NOME EMPRESA"><button type="submit" class="btn-premium-gamil">Guardar Cliente</button></form></div>
            <div id="lista-clientes-db" class="flex-1 overflow-y-auto p-8 text-[10px] font-bold text-slate-400 uppercase italic"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA", authDomain: "planeamento-cf642.firebaseapp.com", projectId: "planeamento-cf642", storageBucket: "planeamento-cf642.firebasestorage.app", messagingSenderId: "438224213205", appId: "1:438224213205:web:2205b5a879ec384c62be5c" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); 
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        let currentView = 'producao';
        const formatarDataBR = (str) => { if (!str || str === '--') return '--'; const pts = str.split('-'); return pts.length === 3 ? `${pts[2]}-${pts[1]}-${pts[0]}` : str; };

        // CARREGAMENTO MASTER DE CLIENTES
        onSnapshot(query(colClientes, orderBy("nome")), snap => {
            const select = document.getElementById('p-cliente');
            const listaDB = document.getElementById('lista-clientes-db');
            if(!select || !listaDB) return;
            let options = '<option value="">-- SELECIONAR CLIENTE --</option>';
            let listHtml = '';
            if (typeof CLIENTES_ESTATICOS !== 'undefined') {
                CLIENTES_ESTATICOS.forEach(c => {
                    const label = `${c.codigo} | ${c.nome}`;
                    options += `<option value="${label}">${label}</option>`;
                    listHtml += `<div class="p-2 border-b border-slate-50 uppercase text-[10px] font-bold text-slate-500">● ${label}</div>`;
                });
            }
            snap.forEach(d => {
                const label = `${d.data().codigo} | ${d.data().nome}`;
                options += `<option value="${label}">${label}</option>`;
                listHtml += `<div class="p-2 border-b border-slate-50 uppercase text-[10px] font-bold text-slate-500">● ${label}</div>`;
            });
            select.innerHTML = options; listaDB.innerHTML = listHtml;
        });

        window.changeView = (v) => {
            currentView = v;
            document.querySelectorAll('.btn-aba').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-' + v).classList.add('active');
            document.getElementById('view-title').innerText = v === 'producao' ? 'R.030.01 - Planeamento Geral' : v === 'recolha' ? 'Pedidos Para Recolha' : 'Arquivo Histórico';
            carregarTabela();
        };

        window.tentarLogin = () => {
            const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (u === "Visitante" || (creds[u] && p === creds[u])) {
                localStorage.setItem('gamil_user', u);
                localStorage.setItem('gamil_admin', (u.includes("Eduardo") || u.includes("Pedro")));
                localStorage.setItem('gamil_sofia', u === "Sofia");
                checkPermissions(); carregarTabela();
            } else alert("Senha incorreta.");
        };

        const checkPermissions = () => {
            const u = localStorage.getItem('gamil_user'); if(!u){document.getElementById('modal-login').style.display='flex'; return;}
            document.getElementById('modal-login').style.display='none'; document.getElementById('nome-logado').innerText = u;
            const adm = localStorage.getItem('gamil_admin') === 'true';
            document.body.className = `${adm?'admin-mode can-edit':''} ${localStorage.getItem('gamil_sofia')==='true'?'sofia-mode':''}`;
            document.getElementById('admin-form-fields').style.display = adm ? 'grid' : 'none';
        };

        window.editPosInline = (id, el) => { if (localStorage.getItem('gamil_admin') !== 'true') return; if (el.querySelector('input')) return; const val = el.innerText.replace('º','').trim(); el.innerHTML = `<div class="inline-edit-container"><input type="number" class="w-12 text-xs p-1 border-2 border-black" value="${val}"><button onclick="confirmarPosInline('${id}', this)"><i class="fas fa-check"></i></button></div>`; el.querySelector('input').focus(); };
        window.confirmarPosInline = async (id, btn) => { const val = btn.parentElement.querySelector('input').value; await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { ranking: parseInt(val) || '' }); };
        window.editDataInline = (id, campo, el) => { if (localStorage.getItem('gamil_admin') !== 'true') return; if (el.querySelector('input')) return; const raw = el.getAttribute('data-raw') || ''; el.innerHTML = `<div class="inline-edit-container"><input type="date" class="w-28 text-xs p-1 border-2 border-black" value="${raw}"><button onclick="confirmarDataInline('${id}', '${campo}', this)"><i class="fas fa-check"></i></button></div>`; el.querySelector('input').focus(); };
        window.confirmarDataInline = async (id, campo, btn) => { const val = btn.parentElement.querySelector('input').value; await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { [campo]: val }); };
        window.toggleServico = async (id, campo, val) => { if (localStorage.getItem('gamil_admin') !== 'true') return; await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { [campo]: val === 'SIM' ? 'NÃO' : 'SIM' }); };
        window.updateStatus = async (id, status) => { if(confirm("Mudar fase?")) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { status: status }); };

        function carregarTabela() {
            onSnapshot(colPedidos, snap => {
                const container = document.getElementById('container-pedidos'); container.innerHTML = "";
                const adm = localStorage.getItem('gamil_admin') === 'true', sof = localStorage.getItem('gamil_sofia') === 'true';
                let lista = []; snap.forEach(d => lista.push({ id: d.id, ...d.data() }));
                
                const pesoPrio = { 'alta': 1, 'media': 2, 'baixa': 3 };
                lista.sort((a, b) => {
                    if ((a.ranking || 9999) !== (b.ranking || 9999)) return (a.ranking || 9999) - (b.ranking || 9999);
                    if (pesoPrio[a.prio] !== pesoPrio[b.prio]) return pesoPrio[a.prio] - pesoPrio[b.prio];
                    return (a.montagem || '9999-99-99').localeCompare(b.montagem || '9999-99-99');
                });
                
                lista.forEach(p => {
                    if((p.status || 'producao') !== currentView) return;
                    const id = p.id, perc = p.progresso || 0, lastLog = p.historico && p.historico.length > 0 ? p.historico[p.historico.length-1] : 'Sem reporte';
                    const color = p.prio === 'alta' ? 'bg-red-500' : p.prio === 'media' ? 'bg-orange-400' : 'bg-green-500';
                    const barColor = perc === 100 ? 'bg-green-500' : 'bg-blue-600';
                    
                    const tr = document.createElement('tr'); tr.className = "pedido-row";
                    tr.innerHTML = `
                        <td class="pos-text ${adm?'editable-cell':''}" onclick="editPosInline('${id}',this)">${p.ranking?p.ranking+'º':'--'}</td>
                        <td style="width: 15px"><div class="status-strip ${color}"></div></td>
                        <td class="ref-text">#${p.pedido}</td><td class="client-text">${p.cliente}</td>
                        <td class="text-center italic text-slate-400 other-row-text">${formatarDataBR(p.entrada)}</td>
                        <td class="text-center other-row-text">${p.peso}kg</td>
                        <td class="text-center font-black other-row-text">
                            <span onclick="toggleServico('${id}','pesar','${p.pesar}')" class="${adm?'editable-cell':''} ${p.pesar==='SIM'?'text-orange-500':'text-slate-300'}">PES</span> | 
                            <span onclick="toggleServico('${id}','furos','${p.furos}')" class="${adm?'editable-cell':''} ${p.furos==='SIM'?'text-orange-500':'text-slate-300'}">FUR</span>
                        </td>
                        <td class="admin-view encarregado-view text-center other-row-text ${adm?'editable-cell':''}" data-raw="${p.montagem||''}" onclick="editDataInline('${id}','montagem',this)">${formatarDataBR(p.montagem)}</td>
                        <td class="admin-view sofia-view text-center other-row-text ${adm?'editable-cell':''}" data-raw="${p.saida||''}" onclick="editDataInline('${id}','saida',this)">${formatarDataBR(p.saida)}</td>
                        <td>
                            <div class="flex items-center space-x-3">
                                <div class="flex-1 cursor-pointer" onclick='window.verLogs(${JSON.stringify(p.historico)})'>
                                    <div class="h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full ${barColor} transition-all duration-700" style="width: ${perc}%"></div></div>
                                    <div class="text-[7px] font-bold text-slate-400 truncate mt-1 italic no-print">● ${lastLog}</div>
                                </div>
                                <div class="flex items-center space-x-2 shrink-0">
                                    <span class="text-[10px] font-black text-slate-700">${perc}%</span>
                                    <button onclick="window.abrirProgresso('${id}','${p.cliente}',${perc})" class="text-blue-500 hover:scale-125 transition no-print"><i class="fas fa-plus-circle text-lg"></i></button>
                                    
                                    ${adm && currentView === 'recolha' ? `<button onclick="updateStatus('${id}','producao')" title="Voltar" class="text-blue-400 hover:scale-125 transition no-print"><i class="fas fa-undo-alt text-lg"></i></button>` : ''}
                                    ${adm && currentView === 'historico' ? `<button onclick="updateStatus('${id}','recolha')" title="Voltar" class="text-blue-400 hover:scale-125 transition no-print"><i class="fas fa-undo-alt text-lg"></i></button>` : ''}

                                    ${currentView==='producao' && perc===100 && adm ? `<button onclick="updateStatus('${id}','recolha')" class="text-green-500 hover:scale-125 transition no-print"><i class="fas fa-check-circle text-lg"></i></button>` : ''}
                                    ${currentView==='recolha' && (adm||sof) ? `<button onclick="updateStatus('${id}','historico')" class="text-green-600 hover:scale-125 transition no-print"><i class="fas fa-check-double text-lg"></i></button>` : ''}
                                </div>
                            </div>
                        </td>
                        <td class="admin-view italic uppercase truncate border-l border-slate-100 pl-3 other-row-text">${p.obs_edu || ''}</td>
                        <td class="text-right pr-6 no-print">
                            <div class="flex justify-end space-x-2">
                                 ${(adm||sof) && currentView!=='historico' ? `<button onclick="window.preparaEdicao('${id}','${encodeURIComponent(JSON.stringify(p))}')" class="text-orange-400 hover:scale-125 transition"><i class="fas fa-pencil-alt text-xl"></i></button>` : ''}
                                 ${adm ? `<button onclick="window.apagarPedido('${id}')" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt text-xl"></i></button>` : ''}
                            </div>
                        </td>
                    `; container.appendChild(tr);
                }); checkPermissions();
            });
        }

        window.salvarProgresso = async () => {
            const id = document.getElementById('prog-id').value, perc = parseInt(document.getElementById('prog-range').value), obs = document.getElementById('prog-obs').value.toUpperCase();
            const log = `${localStorage.getItem('gamil_user')}: ${perc}% ${obs ? '-> '+obs : ''} [${new Date().toLocaleString('pt-PT')}]`;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { progresso: perc, historico: arrayUnion(log) }); window.fecharModal();
        };

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id; document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido; document.getElementById('p-entrada').value = p.entrada || '';
            document.getElementById('p-prio').value = p.prio || 'baixa';
            document.getElementById('p-pos').value = p.ranking || ''; document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-montagem').value = p.montagem || ''; document.getElementById('p-saida').value = p.saida || '';
            document.getElementById('p-obs-edu').value = p.obs_edu || ''; document.getElementById('modal-pedido').classList.remove('hidden');
        };

        document.getElementById('form-pedido').onsubmit = async e => {
            e.preventDefault(); const id = document.getElementById('p-id').value;
            const data = { cliente: document.getElementById('p-cliente').value, pedido: document.getElementById('p-pedido').value, ranking: parseInt(document.getElementById('p-pos').value) || '', prio: document.getElementById('p-prio').value, peso: document.getElementById('p-peso').value, entrada: document.getElementById('p-entrada').value, montagem: document.getElementById('p-montagem').value, saida: document.getElementById('p-saida').value, obs_edu: document.getElementById('p-obs-edu').value.toUpperCase(), timestamp: new Date() };
            if (id) await updateDoc(doc(db, "pedidos_vfinal_gamil", id), data); else await addDoc(colPedidos, { ...data, progresso: 0, historico: [], status: 'producao' });
            window.fecharModal();
        };

        window.verLogs = logs => { document.getElementById('logs-content').innerHTML = logs && logs.length > 0 ? logs.map(l => `<div class="p-4 bg-slate-50 rounded-2xl border mb-2 text-[10px] font-bold shadow-sm leading-relaxed text-slate-800">${l}</div>`).join('') : '<p class="text-center italic py-4">Sem registos.</p>'; document.getElementById('modal-logs').classList.remove('hidden'); };
        window.abrirProgresso = (id, n, p) => { document.getElementById('prog-id').value = id; document.getElementById('prog-nome').innerText = n; document.getElementById('prog-range').value = p; document.getElementById('prog-perc-val').innerText = p + "%"; document.getElementById('modal-progresso').classList.remove('hidden'); };
        window.logout = () => { localStorage.clear(); window.location.reload(); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login), div[id^="modal-"]:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); document.getElementById('p-entrada').value = new Date().toISOString().split('T')[0]; document.getElementById('modal-pedido').classList.remove('hidden'); checkPermissions(); };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        window.apagarPedido = async id => { if(confirm("Apagar permanentemente?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.onload = () => { checkPermissions(); carregarTabela(); };
    </script>
</body>
</html>
