<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Hub v5.0 | Estabilidade Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --gamil-blue: #002D5A; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-gamil { background-color: var(--gamil-blue); }
        .main-content { overflow-x: auto; overflow-y: auto; flex: 1; padding: 20px; }
        
        /* TABELA RÍGIDA PARA EVITAR BAGUNÇA */
        .gamil-table { min-width: 1450px; border-separate: border-spacing-y(12px); width: 100%; border-collapse: separate; }
        .gamil-thead th { @apply text-[10px] font-black uppercase text-slate-400 tracking-widest px-4 py-2 text-left; }
        .pedido-row { @apply bg-white shadow-sm hover:shadow-md transition-all duration-200; }
        .pedido-row td { @apply py-4 px-4 text-[11px] font-bold text-slate-600 first:rounded-l-xl last:rounded-r-xl border-y border-slate-100; }

        .status-strip { width: 6px; height: 40px; border-radius: 10px; }
        .admin-view, .auth-element { display: none; }
        .input-gamil { @apply w-full bg-slate-50 border border-slate-200 rounded-lg p-2 font-semibold text-slate-700 outline-none uppercase text-xs focus:ring-2 focus:ring-blue-500; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-400 mb-1; }
        .btn-import { @apply bg-emerald-600 hover:bg-emerald-700 text-white py-2 px-4 rounded-xl font-black text-[10px] uppercase shadow-lg flex items-center justify-center gap-2; }
        .btn-danger { @apply bg-red-500 hover:bg-red-700 text-white py-2 px-4 rounded-xl font-black text-[10px] uppercase shadow-lg flex items-center justify-center gap-2; }
    </style>
</head>
<body class="md:flex-row flex flex-col">

    <aside class="w-full md:w-64 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-30 md:h-screen no-print">
        <div class="p-8 border-b border-white/10 text-center">
            <img src="logo-gamil.png" alt="Gamil" class="w-32 mx-auto mb-3" onerror="this.style.display='none'">
            <h1 class="text-[10px] font-black tracking-[0.2em] uppercase text-blue-300">Gamil Hub v5.0</h1>
        </div>
        <nav class="p-4 flex-1 space-y-3">
            <div id="user-info" class="p-4 bg-white/5 rounded-2xl border border-white/10 text-center mb-4">
                <p id="nome-logado" class="text-xs font-black uppercase italic">Visitante</p>
                <button onclick="logout()" class="text-[9px] text-red-400 font-bold uppercase underline mt-2">Sair</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element w-full p-4 bg-blue-600 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase shadow-lg">
                <i class="fas fa-plus"></i> <span>Novo Registo</span>
            </button>
            <button onclick="abrirModalCliente()" class="auth-element w-full p-3 hover:bg-white/5 rounded-xl flex items-center space-x-3 text-slate-400 text-[10px] font-bold">
                <i class="fas fa-users text-blue-500"></i> <span>Base de Clientes</span>
            </button>
            <button onclick="window.print()" class="w-full p-3 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center space-x-2 text-xs font-black uppercase">
                <i class="fas fa-print"></i> <span>Imprimir</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b border-slate-200 px-8 flex justify-between items-center no-print">
            <h2 class="text-sm font-black text-slate-800 uppercase italic">Planeamento Geral Gamil</h2>
            <div id="sync-status" class="text-[9px] font-black text-blue-600 uppercase tracking-widest italic animate-pulse">Servidor Ativo</div>
        </header>

        <div class="main-content">
            <table class="gamil-table">
                <thead class="gamil-thead">
                    <tr>
                        <th style="width: 10px"></th>
                        <th style="width: 130px">Ref / Pedido</th>
                        <th style="width: 320px">Cliente Gamil</th>
                        <th class="text-center" style="width: 100px">Entrada</th>
                        <th class="text-center" style="width: 90px">Peso</th>
                        <th class="text-center" style="width: 120px">Serviços</th>
                        <th class="text-center admin-view" style="width: 120px">Montagem</th>
                        <th class="text-center admin-view" style="width: 120px">Entrega</th>
                        <th class="text-center admin-view" style="width: 110px">Local</th>
                        <th class="text-center" style="width: 180px">Progresso / Log</th>
                        <th class="admin-view">Observações</th>
                        <th class="text-right pr-6" style="width: 110px">Ações</th>
                    </tr>
                </thead>
                <tbody id="container-pedidos"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-cliente" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl flex flex-col h-[85vh]">
            <div class="p-6 bg-slate-100 border-b flex justify-between items-center">
                <h3 class="font-black uppercase italic text-slate-800">Clientes</h3>
                <button onclick="fecharModal()" class="text-2xl">&times;</button>
            </div>
            <div class="p-6 border-b bg-slate-50 auth-element flex flex-col gap-2">
                <div class="flex gap-2">
                    <label class="btn-import cursor-pointer flex-1">
                        <i class="fas fa-file-excel"></i> Importar Excel
                        <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls, .csv">
                    </label>
                    <button onclick="limparTodaBaseClientes()" class="btn-danger flex-1">
                        <i class="fas fa-trash-alt"></i> Limpar Tudo
                    </button>
                </div>
                <p id="importStatus" class="text-[8px] font-bold text-blue-600 mt-1 text-center"></p>
            </div>
            <div id="lista-clientes-db" class="flex-1 overflow-y-auto space-y-1 p-6 text-[10px] font-bold text-slate-500 uppercase italic">
                Carregando dados...
            </div>
        </div>
    </div>

    <div id="modal-logs" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-xs font-black text-slate-800 uppercase italic border-b pb-4 mb-4 text-center">Histórico</h3>
            <div id="logs-content" class="space-y-3 max-h-96 overflow-y-auto"></div>
            <button onclick="fecharModal()" class="w-full mt-6 bg-slate-100 py-3 rounded-xl text-[10px] font-black uppercase">Fechar</button>
        </div>
    </div>

    <div id="modal-progresso" class="hidden fixed inset-0 bg-blue-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl text-center">
            <h3 id="prog-nome" class="text-sm font-black text-slate-800 uppercase mb-8 border-b pb-4 italic"></h3>
            <input type="hidden" id="prog-id">
            <div class="space-y-4">
                <div><label class="label-gamil">Progresso: <span id="prog-perc-val" class="text-blue-600 font-black text-xl">0</span>%</label>
                <input type="range" id="prog-range" min="0" max="100" step="5" class="w-full accent-blue-600 mt-4" oninput="document.getElementById('prog-perc-val').innerText = this.value"></div>
                <textarea id="prog-obs" class="input-gamil h-24" placeholder="Comentário..."></textarea>
                <button onclick="salvarProgresso()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal-pedido" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-gamil text-white flex justify-between items-center font-black uppercase text-xs"><span>Ficha de Pedido</span><button onclick="fecharModal()">&times;</button></div>
            <form id="form-pedido" class="p-8 grid grid-cols-2 gap-4 max-h-[85vh] overflow-y-auto">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="label-gamil">Cliente</label><select id="p-cliente" required class="input-gamil"></select></div>
                <div><label class="label-gamil">Nº Pedido</label><input id="p-pedido" required type="text" class="input-gamil"></div>
                <div><label class="label-gamil">Prioridade</label><select id="p-prio" class="input-gamil"><option value="baixa">BAIXA</option><option value="media">MÉDIA</option><option value="alta">ALTA</option></select></div>
                <div><label class="label-gamil">Peso (Kg)</label><input id="p-peso" required type="number" step="0.01" class="input-gamil"></div>
                <div><label class="label-gamil">Data Entrada</label><input id="p-entrada" type="date" class="input-gamil"></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="label-gamil">Pesar?</label><select id="p-pesar" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                    <div><label class="label-gamil">Furos?</label><select id="p-furos" class="input-gamil"><option value="NÃO">NÃO</option><option value="SIM">SIM</option></select></div>
                </div>
                <div class="admin-view col-span-2 grid grid-cols-2 gap-4 border-t pt-4 mt-2">
                    <div><label class="label-gamil text-blue-600 font-bold">Montagem</label><input id="p-montagem" type="date" class="input-gamil"></div>
                    <div><label class="label-gamil text-orange-600 font-bold">Entrega</label><input id="p-saida" type="date" class="input-gamil"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600 font-bold">Localização</label><input id="p-local" type="text" class="input-gamil"></div>
                    <div class="col-span-2"><label class="label-gamil text-blue-600 font-bold">Observações Eduardo</label><textarea id="p-obs-edu" class="input-gamil h-20"></textarea></div>
                </div>
                <button type="submit" class="col-span-2 bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg mt-4">Gravar</button>
            </form>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-gamil z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-10 text-center shadow-2xl border-t-8 border-blue-500">
            <h3 class="text-xl font-black text-slate-800 uppercase italic mb-8">Login Gamil</h3>
            <select id="login-user" class="input-gamil mb-4 h-12 text-center font-bold">
                <option value="Visitante">Consulta</option>
                <option value="Sofia">Sofia</option>
                <option value="Eduardo Pereira">Eduardo</option>
                <option value="José Pedro">José Pedro</option>
                <option value="José Castro">José Castro</option>
                <option value="Luís Silva">Luís Silva</option>
                <option value="Paulo Abreu">Paulo Abreu</option>
            </select>
            <input type="password" id="login-pass" placeholder="SENHA" class="input-gamil mb-6 h-12 text-center">
            <button onclick="tentarLogin()" class="w-full bg-[#002D5A] text-white py-4 rounded-xl font-black uppercase shadow-xl hover:bg-black transition-all">Entrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc, arrayUnion, writeBatch, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colPedidos = collection(db, "pedidos_vfinal_gamil");
        const colClientes = collection(db, "clientes_gamil");

        window.tentarLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const creds = { "Sofia": "gamil$$26", "Eduardo Pereira": "gamil$$26", "José Pedro": "gamil$$26", "José Castro": "jose1234", "Luís Silva": "luis1234", "Paulo Abreu": "paulo1234" };
            if (user === "Visitante" || (creds[user] && pass === creds[user])) {
                localStorage.setItem('gamil_user', user);
                localStorage.setItem('gamil_admin', (user === "Eduardo Pereira" || user === "José Pedro" || user === "Sofia"));
                localStorage.setItem('gamil_full_delete', (user === "Eduardo Pereira" || user === "José Pedro"));
                localStorage.setItem('gamil_view_admin', (user === "Eduardo Pereira" || user === "José Pedro"));
                checkPermissions();
            } else alert("Senha Incorreta!");
        };

        const checkPermissions = () => {
            const user = localStorage.getItem('gamil_user');
            if (!user) { document.getElementById('modal-login').classList.remove('hidden'); return; }
            document.getElementById('modal-login').classList.add('hidden');
            document.getElementById('nome-logado').innerText = user;
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const viewAdmin = localStorage.getItem('gamil_view_admin') === 'true';
            document.querySelectorAll('.admin-view').forEach(el => el.style.display = viewAdmin ? 'table-cell' : 'none');
            document.querySelectorAll('.auth-element').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
        };

        window.logout = () => { localStorage.clear(); window.location.reload(); };

        // --- GESTÃO DE CLIENTES (OPTIMIZADO PARA 2000 REGISTOS) ---
        onSnapshot(query(colClientes, orderBy("nome"), limit(2500)), (snap) => {
            const select = document.getElementById('p-cliente');
            const listaDB = document.getElementById('lista-clientes-db');
            if(select) select.innerHTML = '<option value="">-- SELECIONAR CLIENTE --</option>';
            if(listaDB) listaDB.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                const val = `${c.codigo} | ${c.nome}`;
                if(select) select.innerHTML += `<option value="${val}">${val}</option>`;
                if(listaDB) listaDB.innerHTML += `<div class="p-1 border-b uppercase">● ${val}</div>`;
            });
            if(snap.size === 0) listaDB.innerHTML = "Base vazia.";
        });

        window.limparTodaBaseClientes = async () => {
            if (!confirm("Apagar TODOS os clientes para remover duplicados?")) return;
            const status = document.getElementById('importStatus');
            status.innerText = "LIMPANDO...";
            const snap = await getDocs(colClientes);
            for (let i = 0; i < snap.docs.length; i += 200) {
                const batch = writeBatch(db);
                snap.docs.slice(i, i + 200).forEach(d => batch.delete(d.ref));
                await batch.commit();
            }
            alert("Limpeza concluída!"); status.innerText = "";
        };

        document.getElementById('excelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            const status = document.getElementById('importStatus');
            reader.onload = async function(evt) {
                try {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    if (rows.length === 0) return;
                    status.innerText = "IMPORTANDO...";
                    for (let i = 0; i < rows.length; i += 200) {
                        const batch = writeBatch(db);
                        rows.slice(i, i + 200).forEach(item => {
                            const cod = String(item.Codigo || item.codigo || "");
                            const nom = String(item.Nome || item.nome || "").toUpperCase();
                            if(cod && nom) batch.set(doc(colClientes), { codigo: cod, nome: nom });
                        });
                        await batch.commit();
                    }
                    alert("Importação concluída!"); status.innerText = "";
                } catch (e) { alert("Erro ao importar!"); }
            };
            reader.readAsBinaryString(file);
        });

        // --- PEDIDOS ---
        onSnapshot(query(colPedidos, orderBy("timestamp", "desc")), (snap) => {
            const container = document.getElementById('container-pedidos');
            container.innerHTML = "";
            const isAdmin = localStorage.getItem('gamil_admin') === 'true';
            const canDel = localStorage.getItem('gamil_full_delete') === 'true';
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                const perc = p.progresso || 0;
                const color = p.prio === 'alta' ? 'bg-red-500' : p.prio === 'media' ? 'bg-orange-400' : 'bg-green-500';
                const lastLog = p.historico?.length ? p.historico[p.historico.length - 1] : 'Ver histórico';

                const tr = document.createElement('tr');
                tr.className = "pedido-row";
                tr.innerHTML = `
                    <td><div class="status-strip ${color}"></div></td>
                    <td><span class="text-blue-600 font-black text-xs uppercase">#${p.pedido}</span></td>
                    <td><div class="text-[11px] font-black uppercase text-slate-800 truncate" style="max-width:320px">${p.cliente}</div></td>
                    <td class="text-center italic text-slate-400 text-[10px]">${p.entrada}</td>
                    <td class="text-center text-xs font-black text-slate-600">${p.peso}kg</td>
                    <td class="text-center text-[9px] font-black">
                        <span class="${p.pesar === 'SIM' ? 'text-orange-500' : 'text-slate-200'}">PES</span> | 
                        <span class="${p.furos === 'SIM' ? 'text-orange-500' : 'text-slate-200'}">FUR</span>
                    </td>
                    <td class="admin-view text-center text-[10px] font-black text-blue-900/80">${p.montagem || '--'}</td>
                    <td class="admin-view text-center text-[10px] font-black text-orange-600">${p.saida || '--'}</td>
                    <td class="admin-view text-center"><span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg text-[9px] font-black uppercase border border-blue-100">${p.local || '--'}</span></td>
                    <td class="cursor-pointer" onclick='verLogs(${JSON.stringify(p.historico || [])})'>
                        <div class="flex items-center space-x-2">
                            <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden min-w-[70px]"><div class="h-full bg-blue-600" style="width: ${perc}%"></div></div>
                            <span class="text-[10px] font-black text-slate-800">${perc}%</span>
                        </div>
                        <div class="text-[7px] font-bold text-slate-400 truncate mt-1 italic hover:text-blue-600">● ${lastLog}</div>
                    </td>
                    <td class="admin-view text-[9px] font-bold text-slate-400 italic truncate border-l border-slate-100 pl-3" style="max-width:180px">${p.obs_edu || ''}</td>
                    <td class="text-right pr-6 no-print">
                        <div class="flex justify-end space-x-2">
                            <button onclick="abrirProgresso('${id}', '${p.cliente}', ${perc})" class="text-green-500 hover:text-green-700"><i class="fas fa-check-circle text-lg"></i></button>
                            ${isAdmin ? `<button onclick="preparaEdicao('${id}', '${encodeURIComponent(JSON.stringify(p))}')" class="text-orange-400 hover:text-orange-600"><i class="fas fa-pencil-alt text-lg"></i></button>` : ''}
                            ${canDel ? `<button onclick="apagarPedido('${id}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash-alt text-lg"></i></button>` : ''}
                        </div>
                    </td>
                `;
                container.appendChild(tr);
            });
            checkPermissions();
        });

        window.verLogs = (logs) => {
            const content = document.getElementById('logs-content');
            content.innerHTML = logs.length ? logs.map(l => `<div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-[10px] font-bold text-slate-600 shadow-sm leading-relaxed"> ${l}</div>`).join('') : '<p class="text-xs italic text-center py-10">Sem histórico.</p>';
            document.getElementById('modal-logs').classList.remove('hidden');
        };

        window.salvarProgresso = async () => {
            const id = document.getElementById('prog-id').value;
            const perc = parseInt(document.getElementById('prog-range').value);
            const obs = document.getElementById('prog-obs').value.toUpperCase();
            const user = localStorage.getItem('gamil_user');
            const log = `${user}: ${perc}% ${obs ? '-> '+obs : ''} [${new Date().toLocaleString('pt-PT')}]`;
            await updateDoc(doc(db, "pedidos_vfinal_gamil", id), { progresso: perc, historico: arrayUnion(log) });
            fecharModal();
        };

        window.preparaEdicao = (id, data) => {
            const p = JSON.parse(decodeURIComponent(data));
            document.getElementById('p-id').value = id;
            document.getElementById('p-cliente').value = p.cliente;
            document.getElementById('p-pedido').value = p.pedido;
            document.getElementById('p-peso').value = p.peso;
            document.getElementById('p-prio').value = p.prio;
            document.getElementById('p-entrada').value = p.entrada;
            document.getElementById('p-pesar').value = p.pesar;
            document.getElementById('p-furos').value = p.furos;
            document.getElementById('p-montagem').value = p.montagem;
            document.getElementById('p-saida').value = p.saida;
            document.getElementById('p-local').value = p.local;
            document.getElementById('p-obs-edu').value = p.obs_edu || '';
            document.getElementById('modal-pedido').classList.remove('hidden');
        };

        window.abrirProgresso = (id, nome, perc) => {
            document.getElementById('prog-id').value = id;
            document.getElementById('prog-nome').innerText = nome;
            document.getElementById('prog-range').value = perc;
            document.getElementById('prog-perc-val').innerText = perc;
            document.getElementById('prog-obs').value = "";
            document.getElementById('modal-progresso').classList.remove('hidden');
        };

        window.apagarPedido = async (id) => { if(confirm("Apagar permanentemente?")) await deleteDoc(doc(db, "pedidos_vfinal_gamil", id)); };
        window.fecharModal = () => document.querySelectorAll('.fixed:not(#modal-login)').forEach(m => m.classList.add('hidden'));
        window.abrirModalPedido = () => { 
            document.getElementById('p-id').value = ""; document.getElementById('form-pedido').reset(); 
            document.getElementById('p-entrada').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal-pedido').classList.remove('hidden'); 
        };
        window.abrirModalCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
        checkPermissions();
    </script>
</body>
</html>
