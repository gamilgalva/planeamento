<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil Hub | Industrial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .bg-gamil { background-color: #002D5A; }
        .input-gamil { @apply w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-semibold text-slate-700 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all uppercase text-sm; }
        .label-gamil { @apply block text-[10px] font-black uppercase text-slate-500 mb-1.5 ml-1 tracking-wider; }
        
        /* Cores de Prioridade Reais */
        .prioridade-alta { border-left: 8px solid #ef4444 !important; }
        .prioridade-media { border-left: 8px solid #f59e0b !important; }
        .prioridade-baixa { border-left: 8px solid #10b981 !important; }

        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-gamil text-white flex flex-col shrink-0 shadow-2xl z-20">
        <div class="p-8 border-b border-white/5 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Gamil</h1>
            <p class="text-[9px] text-blue-300 font-bold uppercase tracking-[0.3em] mt-1 italic">Industrial Intelligence</p>
        </div>
        <nav class="p-4 flex-1 space-y-2 mt-4">
            <div class="w-full flex items-center space-x-4 p-4 bg-white/10 border-l-4 border-blue-400 rounded-xl font-bold">
                <i class="fas fa-layer-group text-blue-400"></i> <span>Planeamento</span>
            </div>
        </nav>
        <div class="p-6 border-t border-white/5 bg-black/20 flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black italic shadow-lg border-2 border-white/20">HJ</div>
            <div>
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-tighter">Software Lead</p>
                <p class="text-xs font-bold text-white uppercase italic">Hamilton Junior</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 glass-header border-b border-slate-200 px-8 flex justify-between items-center shadow-sm z-10">
            <div class="flex items-center space-x-6">
                <h2 class="text-lg font-black text-slate-800 uppercase italic tracking-tighter">Fluxo de Produção <span class="text-blue-600 ml-2 text-xs not-italic tracking-normal">● LIVE</span></h2>
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    <input type="text" id="filtroBusca" placeholder="PESQUISAR CLIENTE OU ARTIGO..." 
                        class="bg-slate-100 border-none rounded-full py-2 pl-10 pr-6 text-[10px] font-bold w-64 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
            </div>
            <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-black shadow-lg transition-all flex items-center text-sm transform hover:scale-105 active:scale-95">
                <i class="fas fa-plus mr-2"></i> NOVO REGISTO
            </button>
        </header>

        <div class="flex-1 overflow-auto p-6 bg-slate-50/50">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/80 border-b border-slate-200 text-slate-500">
                        <tr>
                            <th class="p-4 text-[10px] font-black uppercase tracking-widest w-32">Status/Prio</th>
                            <th class="p-4 text-[10px] font-black uppercase tracking-widest">Entrega</th>
                            <th class="p-4 text-[10px] font-black uppercase tracking-widest w-1/4">Cliente & Artigo</th>
                            <th class="p-4 text-[10px] font-black uppercase tracking-widest text-center">Qtd</th>
                            <th class="p-4 text-[10px] font-black uppercase tracking-widest">Operação</th>
                            <th class="p-4 text-[10px] font-black uppercase tracking-widest">Observações</th>
                            <th class="p-4 text-[10px] font-black uppercase tracking-widest text-right px-6">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
                <div id="loading" class="p-20 text-center text-slate-400 italic font-bold uppercase text-xs">
                    <i class="fas fa-circle-notch fa-spin mr-2"></i> Sincronizando com Gamil Cloud...
                </div>
            </div>
        </div>
    </main>

    <div id="modal-add" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xl font-black text-slate-800 uppercase italic ml-4">Novo Planeamento</h3>
                <button onclick="toggleModal(false)" class="text-slate-300 hover:text-red-500 transition-colors text-3xl mr-4 font-light">&times;</button>
            </div>
            <form id="form-planeamento" class="p-10 grid grid-cols-2 gap-5">
                <div>
                    <label class="label-gamil">Prioridade</label>
                    <select id="in-prio" class="input-gamil">
                        <option value="baixa">BAIXA (Verde)</option>
                        <option value="media">MÉDIA (Laranja)</option>
                        <option value="alta">ALTA (Vermelho)</option>
                    </select>
                </div>
                <div>
                    <label class="label-gamil">Estado Atual</label>
                    <select id="in-estado" class="input-gamil">
                        <option>EM FALTA</option>
                        <option>EM CURSO</option>
                        <option>CONCLUÍDO</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="label-gamil">Nome do Cliente</label>
                    <input id="in-cliente" required type="text" class="input-gamil" placeholder="EX: TEXTIL MINHO">
                </div>
                <div class="col-span-1">
                    <label class="label-gamil">Artigo / Referência</label>
                    <input id="in-artigo" required type="text" class="input-gamil" placeholder="EX: REF 500 - CAPAS">
                </div>
                <div class="col-span-1">
                    <label class="label-gamil">Data de Entrega</label>
                    <input id="in-data" type="date" required class="input-gamil">
                </div>
                <div class="col-span-1">
                    <label class="label-gamil">Quantidade</label>
                    <input id="in-qtd" type="number" required class="input-gamil" placeholder="0">
                </div>
                <div class="col-span-1">
                    <label class="label-gamil">Operação / Fase</label>
                    <input id="in-op" type="text" class="input-gamil" placeholder="EX: CORTE">
                </div>
                <div class="col-span-2">
                    <label class="label-gamil">Observações Importantes</label>
                    <textarea id="in-obs" class="input-gamil h-24 resize-none" placeholder="NOTAS ADICIONAIS..."></textarea>
                </div>
                <button type="submit" id="btnSalvar" class="col-span-2 bg-gamil text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-all mt-4 flex justify-center items-center">
                    GRAVAR NO SISTEMA
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlvGJKZdMCNopDKoXMcUTuvHa5E9GqIHA",
            authDomain: "planeamento-cf642.firebaseapp.com",
            projectId: "planeamento-cf642",
            storageBucket: "planeamento-cf642.firebasestorage.app",
            messagingSenderId: "438224213205",
            appId: "1:438224213205:web:2205b5a879ec384c62be5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "planeamentos");

        window.toggleModal = (s) => document.getElementById('modal-add').classList.toggle('hidden', !s);

        // GRAVAR DADOS
        document.getElementById('form-planeamento').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-sync fa-spin mr-2"></i> ENVIANDO PARA CLOUD...';

            try {
                await addDoc(colRef, {
                    prio: document.getElementById('in-prio').value,
                    estado: document.getElementById('in-estado').value,
                    data: document.getElementById('in-data').value,
                    cliente: document.getElementById('in-cliente').value.toUpperCase(),
                    qtd: document.getElementById('in-qtd').value,
                    artigo: document.getElementById('in-artigo').value.toUpperCase(),
                    op: document.getElementById('in-op').value.toUpperCase(),
                    obs: document.getElementById('in-obs').value,
                    timestamp: new Date()
                });
                
                e.target.reset();
                toggleModal(false);
            } catch (err) {
                alert("Erro ao gravar! Verifique as regras do Firebase.");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "GRAVAR NO SISTEMA";
            }
        };

        // RENDERIZAR TABELA COM FILTRO
        const render = (snapshot) => {
            const corpo = document.getElementById('tabela-corpo');
            const termo = document.getElementById('filtroBusca').value.toUpperCase();
            document.getElementById('loading').classList.add('hidden');
            corpo.innerHTML = "";

            snapshot.forEach(docSnap => {
                const item = docSnap.data();
                if (item.cliente.includes(termo) || item.artigo.includes(termo)) {
                    const row = document.createElement('tr');
                    row.className = `prioridade-${item.prio} hover:bg-slate-50 transition-colors`;
                    
                    const badge = { 
                        alta: 'bg-red-50 text-red-600 border-red-100', 
                        media: 'bg-orange-50 text-orange-600 border-orange-100', 
                        baixa: 'bg-green-50 text-green-600 border-green-100' 
                    };
                    
                    row.innerHTML = `
                        <td class="p-4">
                            <span class="px-2 py-1 rounded-md text-[9px] font-black uppercase border ${badge[item.prio]}">${item.prio}</span>
                            <div class="text-[9px] font-bold text-slate-400 mt-1 uppercase">${item.estado}</div>
                        </td>
                        <td class="p-4 font-bold text-slate-600 italic">${item.data}</td>
                        <td class="p-4">
                            <div class="font-black text-slate-800 uppercase leading-tight">${item.cliente}</div>
                            <div class="text-[10px] text-blue-500 font-bold uppercase mt-0.5">${item.artigo}</div>
                        </td>
                        <td class="p-4 text-center font-black text-slate-700">${item.qtd}</td>
                        <td class="p-4 font-bold text-slate-400 text-[10px] uppercase">${item.op}</td>
                        <td class="p-4 text-xs italic text-slate-400 max-w-xs truncate">${item.obs || '-'}</td>
                        <td class="p-4 text-right px-6">
                            <button onclick="confirmarDelecao('${docSnap.id}')" class="text-slate-200 hover:text-red-500 p-2 transition-colors">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>`;
                    corpo.appendChild(row);
                }
            });
        };

        // ESCUTA REAL-TIME
        const q = query(colRef, orderBy("timestamp", "desc"));
        let currentSnapshot = null;
        onSnapshot(q, (s) => { currentSnapshot = s; render(s); });
        
        // FILTRO DE BUSCA
        document.getElementById('filtroBusca').oninput = () => render(currentSnapshot);

        // FUNÇÃO DE APAGAR
        window.confirmarDelecao = async (id) => {
            if(confirm("Deseja apagar permanentemente este registo?")) {
                await deleteDoc(doc(db, "planeamentos", id));
            }
        };

    </script>
</body>
</html>
