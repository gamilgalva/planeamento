<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamil - Hub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <script src="clientes_base.js"></script>
</head>
<body>
    <div id="modal-login" class="no-print">
        <div class="login-container">
            <h1 class="login-title">Gamil Login</h1>
            <div class="flex flex-col space-y-3">
                <select id="login-user" class="login-select">
                    <option value="Visitante">Consulta</option>
                    <option value="Sofia">Sofia Meira</option>
                    <option value="Eduardo Pereira">Eduardo Pereira</option>
                    <option value="José Pedro">José Pedro</option>
                    <option value="José Castro">José Castro</option>
                    <option value="Luís Silva">Luís Silva</option>
                    <option value="Paulo Abreu">Paulo Abreu</option>
                </select>
                <input type="password" id="login-pass" placeholder="PASSWORD" class="login-input-field">
                <button onclick="tentarLogin()" class="btn-login-main">Entrar</button>
            </div>
        </div>
    </div>

    <aside class="sidebar no-print">
        <div class="sidebar-header">
            <img src="logo-gamil.png" alt="Gamil" class="logo-img" onerror="this.style.display='none'">
            <h1 class="version-tag">Hub v9.9</h1>
        </div>
        <nav class="nav-container">
            <div id="user-info" class="user-card">
                <p id="nome-logado">Visitante</p>
                <button onclick="logout()" class="btn-logout">Sair</button>
            </div>
            <button onclick="abrirModalPedido()" class="auth-element btn-action-blue"><i class="fas fa-plus"></i> <span>Novo Registo</span></button>
            <button onclick="window.print()" class="btn-action-ghost"><i class="fas fa-print"></i> <span>Imprimir</span></button>
            <button onclick="abrirModalCliente()" class="auth-element btn-action-ghost"><i class="fas fa-users"></i> <span>Clientes</span></button>
        </nav>
    </aside>

    <main class="main-container">
        <header class="header-desktop no-print">
            <h2>R.030.01 - Planeamento Geral</h2>
            <div class="live-tag">Live Sync Master</div>
        </header>
        <div class="main-content">
            <div class="table-responsive">
                <table class="gamil-table">
                    <thead class="gamil-thead">
                        <tr>
                            <th style="width: 55px">Pos</th>
                            <th style="width: 15px"></th>
                            <th style="width: 140px">Ref / Pedido</th>
                            <th style="width: 380px">Cliente Gamil</th>
                            <th class="text-center" style="width: 110px">Entrada</th>
                            <th class="text-center" style="width: 90px">Peso</th>
                            <th class="text-center" style="width: 120px">Serviços</th>
                            <th class="text-center encarregado-view admin-view" style="width: 120px">Montagem</th>
                            <th class="text-center encarregado-view admin-view sofia-view" style="width: 120px">Entrega</th>
                            <th class="text-center" style="width: 180px">Progresso / Log</th>
                            <th class="admin-view" style="width: 250px">Observações</th>
                            <th class="text-right pr-6 no-print" style="width: 120px">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="container-pedidos"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
